<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>SCORCHED EARTH</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  html,body { margin:0; padding:0; height:100%; overflow:hidden; background:#0a0a12; }
  canvas { display:block; width:100vw; height:100vh; cursor:crosshair; }
  #hud {
    position:fixed; top:14px; left:18px; color:#f2ede2; z-index:5;
    font-family:Georgia,'Times New Roman',serif; user-select:none; pointer-events:none;
    text-shadow:0 2px 6px rgba(0,0,0,.8);
  }
  #kills { font-size:30px; font-weight:bold; letter-spacing:1px; }
  #dmg { font-size:16px; color:#7fe08a; margin-top:1px; }
  #streak { font-size:15px; color:#ffb340; margin-top:2px; height:20px; }
  #title {
    position:fixed; top:12px; left:50%; transform:translateX(-50%);
    color:rgba(242,237,226,.9); font-family:Georgia,serif; font-weight:bold;
    font-size:17px; letter-spacing:5px; z-index:5; user-select:none; pointer-events:none;
    text-shadow:0 2px 8px rgba(0,0,0,.9);
  }
  #hint {
    position:fixed; bottom:16px; left:50%; transform:translateX(-50%);
    color:rgba(242,237,226,.75); background:rgba(10,10,20,.45);
    padding:7px 16px; border-radius:8px; font-family:Georgia,serif; font-size:12.5px;
    letter-spacing:.4px; z-index:5; user-select:none; pointer-events:none;
    transition:opacity 1.5s; white-space:nowrap;
  }
</style>
</head>
<body>
<div id="title">SCORCHED EARTH</div>
<div id="hud"><div id="kills">0 KILLS</div><div id="dmg">$0 DAMAGE</div><div id="streak"></div></div>
<div id="hint">WASD/ARROWS fly (speed builds) · MOUSE aim · HOLD CLICK laser · DOUBLE-TAP dir DASH (hold a 2nd dir = diagonal) · dash DOWN into street = SLAM · SPACE thunderclap · M mute · P pause</div>
<canvas id="cv"></canvas>
<script>
'use strict';
// ═══════════════════ SCORCHED EARTH v3 ═══════════════════
// Granular destructible city with structural collapse, traffic,
// jetpack troopers, hostile rockets, physical thunderclap.

const cv = document.getElementById('cv');
const cx = cv.getContext('2d');
let VW = 0, VH = 0;
function resize() { VW = cv.width = window.innerWidth; VH = cv.height = window.innerHeight; }
window.addEventListener('resize', resize); resize();

// ─── World constants ───
// zone layout, left to right: city streets 0..CITY_W, working dock CITY_W..WATER_X,
// then open water out to the world edge. GROUND_Y doubles as the water surface level.
const WORLD_W = 40000;
const CITY_W = 32000;
const WATER_X = 34000;
const GROUND_Y = 1660;
const WATER_FLOOR = GROUND_Y + 520;   // the sea here is shallow — you can dip under, not dive
const CW = 17, CH = 23;              // structural cell (windows sit on 2x2 blocks)
const rand = (a,b) => a + Math.random()*(b-a);
const randi = (a,b) => Math.floor(rand(a,b+1));
const clamp = (v,a,b) => v<a?a:v>b?b:v;
const dist2 = (ax,ay,bx,by) => { const dx=ax-bx, dy=ay-by; return dx*dx+dy*dy; };
function segDist(px,py,ax,ay,bx,by) {
  const abx=bx-ax, aby=by-ay;
  const t = clamp(((px-ax)*abx + (py-ay)*aby) / (abx*abx + aby*aby || 1), 0, 1);
  return Math.sqrt(dist2(px,py, ax+abx*t, ay+aby*t));
}

// ─── Permanent gore: baked decal canvas ───
// only covers land (city + dock) — nothing bakes onto water; blood out there is the
// transient drifting-cloud system instead, which is also what keeps the 40K world affordable
const DS = 0.5;
const decalCv = document.createElement('canvas');
decalCv.width = Math.ceil(WATER_X*DS); decalCv.height = Math.ceil((GROUND_Y+140)*DS);
const dcx = decalCv.getContext('2d');
function bakeSplat(x, y, r, color, alpha) {
  if (x > WATER_X - 4) return;
  dcx.globalAlpha = alpha;
  dcx.fillStyle = color;
  dcx.beginPath(); dcx.ellipse(x*DS, (y+1)*DS, r*DS, r*0.34*DS, 0, 0, 7); dcx.fill();
  dcx.globalAlpha = 1;
}
function bakeScorch(x, y, r) {
  if (x > WATER_X - 4) return;
  dcx.globalAlpha = 0.5; dcx.fillStyle = '#0c0a0a';
  dcx.beginPath(); dcx.arc(x*DS, y*DS, r*DS, 0, 7); dcx.fill();
  dcx.globalAlpha = 1;
}
// ─── Water FX: splashes, drifting blood clouds, rising bubbles ───
let waterBloods = [], bubbles = [];
function splash(x, mag) {
  const n = Math.round(clamp(6 + mag*0.02, 6, 18));
  for (let i=0;i<n;i++) sparks.push({ x: x+rand(-14,14), y: GROUND_Y+2,
    vx: rand(-90,90), vy: -rand(80, 140 + mag*0.5), life: rand(0.25,0.55),
    c: Math.random()<0.5 ? '#bfe2f2' : '#e8f6fc' });
  rings.push({ x, y: GROUND_Y, r: 6, life: 0.4, w: 3 });
  if (mag > 300) thump(70, 0.25, 0.2);
}
function waterBlood(x, y, r) {
  waterBloods.push({ x, y: Math.max(y, GROUND_Y+8), r, vr: rand(3,7),
    vx: rand(-9,9), vy: rand(3,10), life: rand(8,14), maxLife: 12 });
}
function bubbleAt(x, y) {
  bubbles.push({ x, y, vy: -rand(35,85), vx: rand(-10,10), r: rand(1.2,3), life: rand(0.6,1.6) });
}
// transient scorch: for heli/rocket/car blasts — fades out instead of staying baked forever
let scorchFx = [];
function flashScorch(x, y, r) { if (x > WATER_X) return; scorchFx.push({x, y, r, life: 1.3, maxLife: 1.3}); }

// ─── City generation ───
const fgBuildings = [];
(function genCity(){
  let x = -100;
  while (x < CITY_W - 500) {
    const cols = 2*randi(5, 11), rows = 2*randi(7, 20);
    const w = cols*CW, h = rows*CH;
    const cells = new Float32Array(cols*rows);
    const wins = [];
    const bigCols = cols/2, bigRows = rows/2;
    for (let c=0;c<bigCols;c++) for (let r=0;r<bigRows;r++)
      if (Math.random()<0.55) wins.push({c, r, warm:Math.random()<0.75, civ:Math.random()<0.22});
    fgBuildings.push({x, w, h, cols, rows, roofY: GROUND_Y-h, shade: randi(0,2), wins, cells,
      destroyed: 0, collapsed: false, rubbleSeed: Math.random(), dirty: false, supT: 0,
      ant: Math.random()<0.4, ac: Math.random()<0.6 ? rand(20,w-50) : -1, burning: Math.random()<0.07});
    x += w + rand(180, 460);
  }
})();
// ─── The docked ship: three adjacent "buildings" (stern hull, bridge tower, bow hull) pushed
// after the city so fgBuildings stays sorted — all the laser/cell/collapse physics come free.
const SHIP_X = 34400;
const shipPieces = [];
function makeShipPiece(x, cols, rows, opts) {
  const w = cols*CW, h = rows*CH;
  const wins = [];
  for (let c=0;c<cols/2;c++) for (let r=0;r<rows/2;r++)
    if (Math.random()<0.6) wins.push({c, r, warm:Math.random()<0.7, civ:Math.random()<0.3});
  const b = {x, w, h, cols, rows, roofY: GROUND_Y-h, shade: 0, wins, cells: new Float32Array(cols*rows),
    destroyed: 0, collapsed: false, rubbleSeed: Math.random(), dirty: false, supT: 0,
    ant: !!(opts&&opts.ant), ac: -1, burning: false, ship: true, bow: !!(opts&&opts.bow)};
  fgBuildings.push(b); shipPieces.push(b);
  return b;
}
(function genShip(){
  let sx = SHIP_X;
  const stern = makeShipPiece(sx, 36, 12); sx += stern.w;
  const tower = makeShipPiece(sx, 14, 26, {ant:true}); sx += tower.w;
  makeShipPiece(sx, 34, 12, {bow:true});
})();
function resetShip() {
  for (const b of shipPieces) {
    b.cells.fill(0); b.destroyed = 0; b.collapsed = false; b.collapsing = false;
    b.dirty = false; b.supT = 0; b.burning = false;
    b.wins = [];
    for (let c=0;c<b.cols/2;c++) for (let r=0;r<b.rows/2;r++)
      if (Math.random()<0.6) b.wins.push({c, r, warm:Math.random()<0.7, civ:Math.random()<0.3});
  }
}
// ─── Dock containers: destructible stacked props — cuttable, dashable, topple and crush ───
const containers = [];
(function genDock(){
  let x = CITY_W + 140;
  while (x < WATER_X - 300) {
    if (Math.random() < 0.55) {
      const stack = randi(1, 3);
      for (let s=0;s<stack;s++) containers.push({ x, y: GROUND_Y - (s+1)*46, w: 118, h: 46,
        c: ['#8a3a2a','#2f6b8a','#3d7a46','#8a7a2f','#5d5d66'][randi(0,4)], dead: false, vy: 0 });
      x += 158;
    } else x += rand(100, 240);
  }
})();
function containerBoom(ct) {
  if (ct.dead) return;
  ct.dead = true;
  addDamage(35000);
  for (let i=0;i<10;i++) debris.push({ x: ct.x+rand(0,ct.w), y: ct.y+rand(0,ct.h),
    vx: rand(-200,200), vy: rand(-260,-40), rot: rand(0,7), vr: rand(-7,7),
    r: rand(3,7), c: ct.c, life: rand(1.2,2.4) });
  for (let i=0;i<8;i++) sparks.push({ x: ct.x+ct.w/2, y: ct.y+ct.h/2, vx: rand(-160,160), vy: rand(-180,-20),
    life: rand(0.15,0.35), c: ['#ffdd66','#ff8833'][randi(0,1)] });
  sfxCrack(); shake(4);
}
function makeLayer(minH, maxH, minW, maxW) {
  const arr = []; let x = -300;
  while (x < CITY_W + 200) {
    const w = rand(minW,maxW), h = rand(minH,maxH);
    arr.push({x,w,h}); x += w + rand(10,80);
  }
  return arr;
}
const farLayer = makeLayer(500, 1100, 120, 260);
const midLayer = makeLayer(350, 850, 140, 300);
const clouds = [];
const N_CLOUDS = Math.round(14 * WORLD_W/7000);
for (let i=0;i<N_CLOUDS;i++) clouds.push({x:rand(0,WORLD_W), y:rand(60,600), s:rand(0.6,1.8), v:rand(3,10)});

function cellIdx(b, wx, wy) {
  const ci = Math.floor((wx - b.x)/CW), cj = Math.floor((wy - b.roofY)/CH);
  if (ci<0||ci>=b.cols||cj<0||cj>=b.rows) return -1;
  return cj*b.cols + ci;
}
// fgBuildings is generated left-to-right with gaps and never overlaps, so both
// b.x and b.x+b.w are monotonically increasing across the array — binary search
// beats a linear scan once the world (and building count) gets large.
function findBuildingAt(x) {
  let lo = 0, hi = fgBuildings.length - 1;
  while (lo <= hi) {
    const mid = (lo+hi) >> 1;
    const b = fgBuildings[mid];
    if (x < b.x) hi = mid - 1;
    else if (x > b.x + b.w) lo = mid + 1;
    else return b;
  }
  return null;
}
function findBuildingIndexAt(x) {
  let lo = 0, hi = fgBuildings.length - 1;
  while (lo <= hi) {
    const mid = (lo+hi) >> 1;
    const b = fgBuildings[mid];
    if (x < b.x) hi = mid - 1;
    else if (x > b.x + b.w) lo = mid + 1;
    else return mid;
  }
  return -1;
}
function firstBuildingIndexEndingAtOrAfter(xMin) {
  let lo = 0, hi = fgBuildings.length;
  while (lo < hi) {
    const mid = (lo+hi) >> 1;
    if (fgBuildings[mid].x + fgBuildings[mid].w < xMin) lo = mid + 1; else hi = mid;
  }
  return lo;
}
function cellIntactAt(wx, wy) {
  const b = findBuildingAt(wx);
  if (!b || b.collapsed || b.collapsing || wy < b.roofY || wy > GROUND_Y) return null;
  const i = cellIdx(b, wx, wy);
  return (i >= 0 && b.cells[i] < 1) ? b : null;
}
function surfaceBelow(x, y) {
  const b = findBuildingAt(x);
  if (b && !b.collapsed && !b.collapsing) {
    const ci = Math.floor((x - b.x)/CW);
    if (ci >= 0 && ci < b.cols) {
      const startJ = Math.max(0, Math.floor((y - b.roofY)/CH));
      for (let cj = startJ; cj < b.rows; cj++) {
        if (b.cells[cj*b.cols+ci] < 1) {
          const top = b.roofY + cj*CH;
          if (top >= y) return top;
          break;
        }
      }
    }
  }
  return GROUND_Y;
}

// ─── HUD ───
let kills = 0, streak = 0, streakT = 0, damage$ = 0;
function fmt$(v) {
  if (v >= 1e9) return '$' + (v/1e9).toFixed(2) + 'B';
  if (v >= 1e6) return '$' + (v/1e6).toFixed(1) + 'M';
  if (v >= 1e3) return '$' + Math.round(v/1e3) + 'K';
  return '$' + Math.round(v);
}
function addDamage(v) { damage$ += v; document.getElementById('dmg').textContent = fmt$(damage$) + ' DAMAGE'; }
function addKill() {
  kills++; streak++; streakT = 2.6;
  document.getElementById('kills').textContent = kills + ' KILLS';
}

// ─── Input ───
const keys = {};
const DIRKEYS = {
  KeyA:'left', ArrowLeft:'left', KeyD:'right', ArrowRight:'right',
  KeyW:'up', ArrowUp:'up', KeyS:'down', ArrowDown:'down'
};
const lastTap = {};
let mouseSX = VW/2, mouseSY = VH/2, firing = false, paused = false, freezeT = 0;

window.addEventListener('keydown', e => {
  if (e.code==='Space' || e.code.slice(0,5)==='Arrow') e.preventDefault();
  if (e.repeat) { keys[e.code] = true; return; }
  keys[e.code] = true;
  audioBoot();
  const dir = DIRKEYS[e.code];
  if (dir) {
    const now = performance.now();
    const rapid = lastTap[dir] && now - lastTap[dir] < 270;
    if (dir === 'up' && rapid && P.dashT > 0 && P.dashDir.x === 0 && P.dashDir.y < 0) {
      // a fast 3rd tap of Up while the regular up-punch is still playing — upgrade it into the
      // big launch that clears even the tallest building, instead of firing a second dash
      P.dashT = 0.92; P.bigLaunch = true;
      shake(10); sfxDash();
    } else if (rapid) startDash(dir);
    lastTap[dir] = now;
  }
  if (e.code === 'Space') thunderclap();
  if (e.code === 'KeyM') muted = !muted;
  if (e.code === 'KeyP' || e.code === 'Escape') paused = !paused;
});
window.addEventListener('keyup', e => { keys[e.code] = false; });
window.addEventListener('mousemove', e => { mouseSX = e.clientX; mouseSY = e.clientY; });
window.addEventListener('mousedown', e => { if (e.button===0){ firing = true; audioBoot(); } });
window.addEventListener('mouseup',   e => { if (e.button===0) firing = false; });
window.addEventListener('blur', () => { firing=false; for (const k in keys) keys[k]=false; });
window.addEventListener('contextmenu', e => e.preventDefault());

// ─── Audio ───
let AC = null, muted = false, master = null, laserGain = null;
function audioBoot() {
  if (AC) return;
  try {
    AC = new (window.AudioContext||window.webkitAudioContext)();
    master = AC.createGain(); master.gain.value = 0.4; master.connect(AC.destination);
    const osc = AC.createOscillator(); osc.type='triangle'; osc.frequency.value=68;
    const lfo = AC.createOscillator(); lfo.frequency.value=17;
    const lfoG = AC.createGain(); lfoG.gain.value=10;
    lfo.connect(lfoG); lfoG.connect(osc.frequency); lfo.start();
    const filt = AC.createBiquadFilter(); filt.type='lowpass'; filt.frequency.value=380;
    laserGain = AC.createGain(); laserGain.gain.value=0;
    osc.connect(filt); filt.connect(laserGain); laserGain.connect(master);
    osc.start();
  } catch(e) { AC = null; }
}
function noiseBurst(dur, freq, vol, type) {
  if (!AC || muted) return;
  const n = AC.sampleRate * dur, buf = AC.createBuffer(1, n, AC.sampleRate);
  const d = buf.getChannelData(0);
  for (let i=0;i<n;i++) d[i] = (Math.random()*2-1) * (1 - i/n);
  const src = AC.createBufferSource(); src.buffer = buf;
  const f = AC.createBiquadFilter(); f.type = type||'lowpass'; f.frequency.value = freq;
  const g = AC.createGain(); g.gain.value = vol;
  src.connect(f); f.connect(g); g.connect(master); src.start();
}
function thump(freq, dur, vol) {
  if (!AC || muted) return;
  const o = AC.createOscillator(); o.type='sine'; o.frequency.setValueAtTime(freq, AC.currentTime);
  o.frequency.exponentialRampToValueAtTime(Math.max(28,freq*0.4), AC.currentTime+dur);
  const g = AC.createGain(); g.gain.setValueAtTime(vol, AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime+dur);
  o.connect(g); g.connect(master); o.start(); o.stop(AC.currentTime+dur);
}
const sfxSplat = () => { noiseBurst(0.14, 420, 0.16); thump(110, 0.12, 0.12); };
const sfxDash  = () => noiseBurst(0.25, 1200, 0.14, 'bandpass');
const sfxHit   = () => noiseBurst(0.04, 2200, 0.05, 'highpass');
const sfxBoom  = () => { noiseBurst(0.5, 240, 0.35); thump(52, 0.45, 0.3); };
const sfxCrack = () => noiseBurst(0.08, 900, 0.07);

// ─── Player ───
const P = {
  x: 800, y: 900, vx: 0, vy: 0, facing: 1,
  dashT: 0, dashCd: 0, dashDir: {x:1,y:0},
  hurtFlash: 0, bank: 0, boost: 0, clapCd: 0, stunT: 0,
  grounded: false, hopping: false, dashCoastT: 0, knockT: 0, vertDash: null, bigLaunch: false,
  underwaterT: 0, wasUnder: false, carried: false,
};
const inWater = (x, y) => x > WATER_X && y > GROUND_Y;
// world-space street lamp positions (matches the visual spacing in drawCity) — used as light-ball spawn points
const streetLamps = [];
for (let lx = 35; lx < CITY_W; lx += 160) streetLamps.push(lx);
function pickLightSource(nearX) {
  if (Math.random() < 0.5) {
    const cands = streetLamps.filter(lx => Math.abs(lx-nearX) < 700);
    if (cands.length) return { x: cands[randi(0,cands.length-1)], y: GROUND_Y-46 };
  }
  const cands = fgBuildings.filter(b => !b.collapsed && !b.collapsing && Math.abs(b.x-nearX) < 700 && b.wins.some(w=>w.warm));
  if (cands.length) {
    const b = cands[randi(0,cands.length-1)];
    const warms = b.wins.filter(w=>w.warm);
    const w = warms[randi(0,warms.length-1)];
    return { x: b.x + 17 + w.c*CW*2, y: b.roofY + 23 + w.r*CH*2 };
  }
  return null;
}
function startDash(dir) {
  if (paused || P.stunT > 0) return;
  // while a continuous down-slam is in progress, double-tapping up cancels it instead of
  // starting a new dash
  if (P.dashT > 0 && P.vertDash === 'down' && dir === 'up') {
    P.dashT = 0; P.vertDash = null; P.dashCoastT = 0.5;
    return;
  }
  if (P.dashCd > 0) return;
  const V = {left:{x:-1,y:0}, right:{x:1,y:0}, up:{x:0,y:-1}, down:{x:0,y:1}}[dir];
  let dx = V.x, dy = V.y;
  if (dx !== 0) {
    if (keys.KeyW||keys.ArrowUp) dy = -1;
    else if (keys.KeyS||keys.ArrowDown) dy = 1;
  } else {
    if (keys.KeyA||keys.ArrowLeft) dx = -1;
    else if (keys.KeyD||keys.ArrowRight) dx = 1;
  }
  const m = Math.hypot(dx,dy);
  P.dashDir = {x:dx/m, y:dy/m};
  // double-tapping straight down is always a full continuous slam to the ground, no matter the
  // altitude — give it a generous duration cap instead of the normal short dash window, and let the
  // ground-proximity check below end it the instant it actually gets there. Straight up is just the
  // regular dash-punch, held a hair longer than normal for a bit of extra height.
  P.vertDash = (dir === 'down') ? dir : null;
  P.dashT = P.vertDash ? 3 : (dir === 'up' ? 0.38 : 0.30);
  P.bigLaunch = false;   // a fast 3rd tap of Up (see keydown handler) upgrades this into the big launch
  P.dashCd = 0.55;
  P.grounded = false; P.hopping = false;   // any dash-punch launches him back into flight
  shake(6); sfxDash();
}
function thunderclap() {
  if (P.clapCd > 0 || paused || P.stunT > 0) return;
  P.clapCd = 2.4;
  freezeT = 0.06;
  const R = 320;
  rings.push({x:P.x, y:P.y, r:14, life:0.5, w:6});
  rings.push({x:P.x, y:P.y, r:2, life:0.7, w:3});
  // dust torus
  for (let i=0;i<14;i++) {
    const a = rand(0,7);
    smokes.push({ x:P.x+Math.cos(a)*60, y:P.y+Math.sin(a)*60, r:rand(10,20), vr:rand(60,110),
      vy:Math.sin(a)*40, life:rand(0.5,0.9), c:'rgba(150,140,150,' });
  }
  shake(14); sfxBoom(); thump(40, 0.5, 0.4);
  // physical blast: shove every loose thing outward
  const shoveAll = (arr, mult) => { for (const g of arr) {
    const d = Math.hypot(g.x-P.x, g.y-P.y);
    if (d < R*1.4 && d > 1) { const f = (1 - d/(R*1.4)) * mult;
      g.vx += (g.x-P.x)/d * f; g.vy += (g.y-P.y)/d * f - f*0.25; }
  }};
  shoveAll(gibs, 900); shoveAll(debris, 900); shoveAll(bloods, 700); shoveAll(sparks, 500);
  // kills fly AWAY from you
  for (const g of grunts) if (!g.dead && dist2(g.x,g.y-16,P.x,P.y) < R*R) {
    g.dead=true; const d=Math.hypot(g.x-P.x,g.y-P.y)||1;
    gibBurst(g.x, g.y-16, 1.3, false, (g.x-P.x)/d*420, (g.y-16-P.y)/d*420 - 120); addKill();
  }
  for (const c of civs) if (!c.dead && dist2(c.x,c.y-14,P.x,P.y) < R*R) {
    c.dead=true; const d=Math.hypot(c.x-P.x,c.y-P.y)||1;
    gibBurst(c.x, c.y-14, 1.1, false, (c.x-P.x)/d*420, (c.y-14-P.y)/d*420 - 120); addKill();
  }
  for (const car of cars) if (!car.dead && dist2(car.x,car.y-10,P.x,P.y) < R*R) carBoom(car);
  for (const s of supes) if (s.hp>0 && dist2(s.x,s.y,P.x,P.y) < R*R) {
    s.hp -= 70; const d=Math.hypot(s.x-P.x,s.y-P.y)||1;
    s.vx += (s.x-P.x)/d*900; s.vy += (s.y-P.y)/d*900;
    if (s.hp<=0) { gibBurst(s.x,s.y,1.6,true); addKill(); if (s.boss) { starlightTimer = rand(140, 190); announceBossKill('STARLIGHT', s.x, s.y); } }
  }
  for (const h of helis) if (!h.dead && dist2(h.x,h.y,P.x,P.y) < R*R) { h.hp -= 130; h.vx += (h.x-P.x)>0?300:-300; if (h.hp<=0) heliDeath(h); }
  for (const a of atrains) if (!a.dead && dist2(a.x,a.y-16,P.x,P.y) < R*R) {
    a.hp -= 90;

  }
  for (const a of maeves) if (!a.dead && dist2(a.x,a.y-16,P.x,P.y) < R*R) {

  }
  for (const tk of tanks) if (!tk.dead && dist2(tk.x,tk.y-20,P.x,P.y) < R*R) {

const CELL_COST = 2200;   // smaller cells, smaller price each
const LASER_CELL_RATE = 16.5;   // fill-per-second on a cell the beam (or player) is drilling through
const JET_SCALE = 2.3;
function destroyCell(b, i, wx, wy, quiet) {
  if (b.cells[i] >= 1) return;
  b.cells[i] = 1; b.destroyed++; b.dirty = true;
  addDamage(CELL_COST);
  const ci = i % b.cols, cj = Math.floor(i / b.cols);
  killWindowCiv(b, ci, cj);
  for (let k=0;k<2;k++) debris.push({ x: wx+rand(-8,8), y: wy+rand(-8,8),
    vx: rand(-140,140), vy: rand(-200,30), rot: rand(0,7), vr: rand(-7,7),
    r: rand(2.5,5.5), c: ['#2e2638','#241e2e','#3a3346'][randi(0,2)], life: rand(1.5,3) });
  if (!quiet) sfxCrack();
  if (!b.collapsed && b.destroyed > b.cols*b.rows*0.62) collapseBuilding(b);
}
function killWindowCiv(b, ci, cj) {
  const bc = ci >> 1, br = cj >> 1;
  for (const w of b.wins) if (w.c===bc && w.r===br && w.civ && !w.civDead) {
    w.civDead = true;
    gibBurst(b.x + bc*CW*2 + CW, b.roofY + br*CH*2 + CH, 1);
    addKill();
  }
}
function damageCellsInRadius(x, y, r, frac) {
  const start = firstBuildingIndexEndingAtOrAfter(x - r);
  for (let bi = start; bi < fgBuildings.length; bi++) {
    const b = fgBuildings[bi];
    if (b.x > x + r) break;
    if (b.collapsed || y+r < b.roofY || y-r > GROUND_Y) continue;
    for (let cj=0; cj<b.rows; cj++) for (let ci=0; ci<b.cols; ci++) {
      const i = cj*b.cols+ci;
      if (b.cells[i] >= 1) continue;
      const cxw = b.x + ci*CW + CW/2, cyw = b.roofY + cj*CH + CH/2;
      if (dist2(cxw,cyw,x,y) < r*r) {
        if (frac >= 1 || Math.random() < frac) destroyCell(b, i, cxw, cyw, true);
      }
    }
  }
}
// Structural support: cells hold on via the cell below them (or its diagonal
// neighbors). Unsupported masonry breaks off and falls as chunks.
function runSupport(b) {
  const sup = new Uint8Array(b.cols * b.rows);
  const last = b.rows - 1;
  for (let ci=0; ci<b.cols; ci++) if (b.cells[last*b.cols+ci] < 1) sup[last*b.cols+ci] = 1;
  for (let cj=last-1; cj>=0; cj--) {
    for (let ci=0; ci<b.cols; ci++) {
      const i = cj*b.cols+ci;
      if (b.cells[i] >= 1) continue;
      const bl = cj+1;
      if (sup[bl*b.cols+ci] ||
          (ci>0 && sup[bl*b.cols+ci-1]) ||
          (ci<b.cols-1 && sup[bl*b.cols+ci+1])) sup[i] = 1;
    }
  }
  let fell = false;
  for (let cj=0; cj<b.rows && !b.collapsed; cj++) for (let ci=0; ci<b.cols; ci++) {
    const i = cj*b.cols+ci;
    if (b.cells[i] < 1 && !sup[i]) {
      b.cells[i] = 1; b.destroyed++; fell = true;
      addDamage(CELL_COST);
      killWindowCiv(b, ci, cj);
      const wx = b.x + ci*CW + CW/2, wy = b.roofY + cj*CH + CH/2;
      debris.push({ x: wx, y: wy, vx: rand(-30,30), vy: rand(-20,40), rot: rand(0,7), vr: rand(-4,4),
        r: rand(6,11), c: ['#2e2638','#241e2e','#3a3346'][randi(0,2)], life: rand(2.5,4), heavy: true });
    }
  }
  if (fell) { sfxCrack(); if (!b.collapsed && b.destroyed > b.cols*b.rows*0.62) collapseBuilding(b); }
  b.dirty = fell;   // cascades keep checking
}
function collapseBuilding(b) {
  // don't swap to rubble instantly — sink/crumble over collapseDur, then finalize
  b.collapsing = true; b.collapseT = 0; b.collapseDur = 0.9; b.collapseFromH = b.h;
  b.cells.fill(1);   // structurally gone now — beam/player/blood pass through the crumbling shell
  addDamage(18e6);

    r: rand(4,12), c: ['#2e2638','#241e2e','#3a3346'][randi(0,2)], life: rand(2,4), heavy: Math.random()<0.4 });

  for (let k=0;k<40;k++) bloods.push({ x: rand(b.x, b.x+b.w), y: rand(b.roofY, GROUND_Y-80),

    // scorch disc that just read as a grey blob sitting over the building's footprint
    dcx.fillStyle = '#141018';
    for (let k=0;k<22;k++) {
      const cxw = (b.x + rand(-14, b.w+14)) * DS, cyw = (GROUND_Y - rand(0, 26)) * DS;
      const rw = rand(10,30)*DS, rh = rand(6,16)*DS;

      dcx.fillRect(-rw/2, -rh/2, rw, rh);

}
// hostile=true → enemy ordnance: wrecks buildings + knocks YOU, no kill credit / no friendly fire
// scale (0-1) trims the particle-heavy visuals for frequent/small blasts (cars) without touching gameplay radius
function explode(x, y, r, cellFrac, hostile, scale) {
  scale = scale === undefined ? 1 : scale;
  rings.push({x, y, r: 6, life: 0.45, w: 4});
  const nSparks = Math.round(26*scale);
  for (let i=0;i<nSparks;i++) {
    const a = rand(0,7), sp = rand(60, 420);
    sparks.push({ x, y, vx: Math.cos(a)*sp, vy: Math.sin(a)*sp - 60, life: rand(0.15,0.5),
      c: ['#ffdd66','#ff8833','#ff4422'][randi(0,2)] });
  }
  const nSmoke = Math.round(8*scale);
  for (let i=0;i<nSmoke;i++) smokes.push({ x: x+rand(-14,14), y: y+rand(-14,14), r: rand(10,22),
    vr: rand(26,50), vy: rand(-50,-15), life: rand(0.5,1.0), c: 'rgba(105,94,106,' });
  if (!hostile) {
    for (const g of grunts) if (!g.dead && dist2(g.x,g.y-16,x,y) < r*r) { g.dead=true; gibBurst(g.x,g.y-16,1.2); addKill(); }
    for (const c of civs) if (!c.dead && dist2(c.x,c.y-14,x,y) < r*r) { c.dead=true; gibBurst(c.x,c.y-14,1.1); addKill(); }
    for (const car of cars) if (!car.dead && dist2(car.x,car.y-10,x,y) < r*r) carBoom(car);
    for (const s of supes) if (s.hp>0 && dist2(s.x,s.y,x,y) < r*r) { s.hp -= 55; if (s.hp<=0) { gibBurst(s.x,s.y,1.5,true); addKill(); if (s.boss) { starlightTimer = rand(140, 190); announceBossKill('STARLIGHT', s.x, s.y); } } }
  }
  if (dist2(P.x,P.y,x,y) < (r+30)*(r+30)) {
    const d = Math.hypot(P.x-x,P.y-y)||1;
    P.vx += (P.x-x)/d*520; P.vy += (P.y-y)/d*520;
    P.hurtFlash = 1; shake(10);
  }
  damageCellsInRadius(x, y, r*0.85, cellFrac === undefined ? 1 : cellFrac);
  flashScorch(x, Math.min(y, GROUND_Y), r*0.5);
  if (x > WATER_X && y > GROUND_Y - r) { splash(x, r*6); for (let i=0;i<8;i++) bubbleAt(x+rand(-r,r)*0.6, Math.max(y, GROUND_Y+10)+rand(-20,20)); }
  shake(8); sfxBoom();
  panicNear(x, 800);
}
function carBoom(car) {
  if (car.dead) return;
  car.dead = true;
  addDamage(car.police ? 65000 : car.kind==='truck' ? 48000 : 22000);
  addKill();  // driver
  const big = car.kind === 'truck';
  gibBurst(car.x, car.y-12, big ? 1.1 : 0.85);
  // no fireball for cars — just a quick spark pop, no AOE/splash, no smoke/ring particles
  for (let i=0;i<6;i++) sparks.push({ x: car.x, y: car.y-8, vx: rand(-120,120), vy: rand(-160,-20),
    life: rand(0.15,0.35), c: ['#ffdd66','#ff8833'][randi(0,1)] });
  flashScorch(car.x, GROUND_Y, big ? 34 : 24);
  if (car.kind === 'boat') { splash(car.x, 500); waterBlood(car.x, GROUND_Y+16, 12); }
  shake(big ? 6 : 4); sfxBoom();
}
function heliDeath(h) {
  if (h.dead) return;
  h.dead = true; h.falling = true; h.hp = 0;
  addKill(); addDamage(3.2e6);
  // no explosion at the kill — it catches fire and drops; the explosion is the crash
  for (let i=0;i<10;i++) sparks.push({ x: h.x+rand(-20,20), y: h.y+rand(-10,10),
    vx: rand(-160,160), vy: rand(-140,40), life: rand(0.2,0.5), c: ['#ffdd66','#ff8833','#ff4422'][randi(0,2)] });
  for (let i=0;i<5;i++) smokes.push({ x: h.x+rand(-14,14), y: h.y, r: rand(8,16),
    vr: rand(20,36), vy: rand(-30,0), life: rand(0.5,0.9), c: 'rgba(80,72,84,' });
  noiseBurst(0.3, 700, 0.18, 'bandpass'); shake(6);
  h.vy = -60; h.vx = rand(-80,80);
}

// ─── Gore ───
const GIB_COLORS = ['#a01818','#7d1010','#b32222','#5e0c0c'];
function gibBurst(x, y, power, big, bvx, bvy) {
  bvx = bvx||0; bvy = bvy||0;
  const n = big ? 14 : randi(7,10);
  for (let i=0;i<n;i++) {
    const a = rand(0, Math.PI*2), sp = rand(80, 280)*power;
    gibs.push({ x, y, vx: Math.cos(a)*sp + rand(-40,40) + bvx, vy: Math.sin(a)*sp - rand(60,220) + bvy,
      rot: rand(0,Math.PI*2), vr: rand(-9,9), r: rand(3, big?9:6.5),
      c: GIB_COLORS[randi(0,3)], life: rand(2.5,4), head: i===0 && Math.random()<0.7 });
  }
  const bn = big ? 42 : 26;
  for (let i=0;i<bn;i++) {
    const a = rand(0, Math.PI*2), sp = rand(60, 420)*power;
    bloods.push({ x, y, vx: Math.cos(a)*sp + bvx*0.7, vy: Math.sin(a)*sp - rand(0,150) + bvy*0.7, life: rand(0.5,1.6) });
  }
  // instant splat right at the kill point only makes sense near a surface — for an airborne kill
  // (jetpack grunt, flying supe) the real surface is far below, and the falling blood particles
  // above already land and bake there naturally, so don't also bake one floating at the death point
  if (x > WATER_X && y > GROUND_Y - 45) {
    // in the water OR right at the surface (swimmer heads, boat gunners sit a few px above the
    // waterline) — bloom the lingering cloud straight away rather than waiting for droplets to land
    waterBlood(x, Math.max(y, GROUND_Y + 14), rand(10,18));
    splash(x, 200);
    waterMayhem++;   // The Deep is counting
  } else {
    const groundS = surfaceBelow(x, y);
    if (groundS - y < 60) bakeSplat(x, groundS, rand(8,16), '#5e0c0c', 0.55);
  }
  shake(big ? 8 : 3);
  if (big) sfxBoom(); else sfxSplat();
  panicNear(x, 480);
}

// ─── Update ───
function update(dt) {
  gameT += dt;
  P.dashCd = Math.max(0, P.dashCd - dt);
  P.clapCd = Math.max(0, P.clapCd - dt);
  P.stunT = Math.max(0, P.stunT - dt);
  boltLockout = Math.max(0, boltLockout - dt);
  P.hurtFlash = Math.max(0, P.hurtFlash - dt*3);
  if (streakT > 0) { streakT -= dt; if (streakT <= 0) streak = 0; }
  document.getElementById('streak').textContent = streak >= 2 ? ('⚔ STREAK x' + streak) : '';
  if (bossBanner) { bossBanner.life -= dt; if (bossBanner.life <= 0) bossBanner = null; }
  bossFlashT = Math.max(0, bossFlashT - dt*2.2);

  const mWX = mouseSX + camX, mWY = mouseSY + camY;

  // ── movement ──
  let ix = 0, iy = 0;
  if (P.stunT <= 0) {
    if (keys.KeyA||keys.ArrowLeft) ix -= 1;
    if (keys.KeyD||keys.ArrowRight) ix += 1;
    if (keys.KeyW||keys.ArrowUp) iy -= 1;
    if (keys.KeyS||keys.ArrowDown) iy += 1;
  }
  const moving = (ix!==0 || iy!==0);
  P.boost = clamp(P.boost + (moving ? dt/1.3 : -dt*1.9), 0, 1);

  if (P.dashT > 0) {
    P.dashT -= dt;
    if (P.dashT <= 0) P.dashCoastT = 0.5;   // dash just ended — coast out gradually instead of snapping to a stop
    const dspd = P.bigLaunch ? 1150 : 1650;   // triple-tap-up launch travels slower but for much longer, clearing the tallest building
    P.vx = P.dashDir.x * dspd; P.vy = P.dashDir.y * dspd;
    afterimages.push({x:P.x, y:P.y, f:P.facing, a:0.5});
    for (const g of grunts) if (!g.dead && dist2(P.x,P.y,g.x,g.y-16) < 62*62) { g.dead=true; gibBurst(g.x,g.y-16,1.3,false,P.dashDir.x*300,P.dashDir.y*300); addKill(); }
    for (const c of civs) if (!c.dead && dist2(P.x,P.y,c.x,c.y-14) < 58*58) { c.dead=true; gibBurst(c.x,c.y-14,1.1,false,P.dashDir.x*300,P.dashDir.y*300); addKill(); }
    for (const car of cars) if (!car.dead && dist2(P.x,P.y,car.x,car.y-10) < 64*64) carBoom(car);
    for (const s of supes) if (s.hp>0 && dist2(P.x,P.y,s.x,s.y) < 72*72) {
      s.hp = s.boss ? s.hp - 380 : 0;
      s.vx += P.dashDir.x*400; s.vy += P.dashDir.y*400;
      rings.push({x:s.x,y:s.y,r:10,life:0.4,w:3});
      if (s.hp<=0) { gibBurst(s.x,s.y,1.6,true,P.dashDir.x*350,P.dashDir.y*350); addKill(); if (s.boss) { starlightTimer = rand(140, 190); announceBossKill('STARLIGHT', s.x, s.y); } }
    }
    for (const h of helis) if (!h.dead && dist2(P.x,P.y,h.x,h.y) < 105*105) heliDeath(h);
    for (const a of atrains) if (!a.dead && dist2(P.x,P.y,a.x,a.y-16) < 72*72) {
      a.hp -= 260;
      rings.push({x:a.x,y:a.y-16,r:10,life:0.4,w:3});
      if (a.hp<=0) atrainDeath(a);
    }
    for (const a of maeves) if (!a.dead && dist2(P.x,P.y,a.x,a.y-16) < 72*72) {
      a.hp -= 260;
      rings.push({x:a.x,y:a.y-16,r:10,life:0.4,w:3});
      if (a.hp<=0) maeveDeath(a);
    }
    for (const dp of deeps) if (!dp.dead && dist2(P.x,P.y,dp.x,dp.y-10) < 72*72) {
      dp.hp -= 260;
      rings.push({x:dp.x,y:dp.y-10,r:10,life:0.4,w:3});
      if (dp.hp<=0) deepDeath(dp);
    }
    for (const ct of containers) if (!ct.dead && dist2(P.x,P.y,ct.x+ct.w/2,ct.y+ct.h/2) < 82*82) containerBoom(ct);
    for (const tk of tanks) if (!tk.dead && dist2(P.x,P.y,tk.x,tk.y-20) < 78*78) {
      tk.hp -= 400;
      rings.push({x:tk.x,y:tk.y-20,r:10,life:0.4,w:3});
      if (tk.hp <= 0) tankDeath(tk);
    }
    for (const s of sharks) if (!s.dead && dist2(P.x,P.y,s.x,s.y) < 70*70) sharkDeath(s);
    for (const r of rescues) if (!r.falling && !r.gone && dist2(P.x,P.y,r.x,r.y) < 95*95) rescueDown(r);
    damageCellsInRadius(P.x + P.dashDir.x*24, P.y + P.dashDir.y*24, 46, 1);
    // slamming over open water: punch through the surface with a splash, bottom out at the sea floor
    if (P.dashDir.y > 0.5 && P.x > WATER_X) {
      if (P.y <= GROUND_Y && P.y + 1650*dt > GROUND_Y) splash(P.x, 900);
      if (P.y >= WATER_FLOOR - 70) {
        P.dashT = 0; P.vertDash = null; P.y = WATER_FLOOR - 50; P.vy = 0;
        for (let i=0;i<12;i++) bubbleAt(P.x + rand(-40,40), P.y + rand(-10,10));
        thump(40, 0.4, 0.3); shake(8);
      }
    } else if (P.dashDir.y > 0.5 && P.y >= GROUND_Y - 60) {
      P.dashT = 0; P.vertDash = null; P.y = GROUND_Y - 40; P.vy = 0; P.grounded = true; P.hopping = false;
      rings.push({x:P.x, y:GROUND_Y-8, r:12, life:0.55, w:6});
      bakeScorch(P.x, GROUND_Y, 60);
      for (let i=0;i<14;i++) smokes.push({ x:P.x+rand(-60,60), y:GROUND_Y-rand(0,26), r:rand(12,26), vr:rand(30,55), vy:rand(-40,-10), life:rand(0.7,1.4), c:'rgba(110,95,105,' });
      shake(16); sfxBoom(); thump(36, 0.6, 0.45);
      const R = 300;
      for (const g of grunts) if (!g.dead && g.y > GROUND_Y-140 && Math.abs(g.x-P.x) < R) { g.dead=true; gibBurst(g.x,g.y-16,1.4,false,(g.x<P.x?-1:1)*300,-260); addKill(); }
      for (const c of civs) if (!c.dead && Math.abs(c.x-P.x) < R) { c.dead=true; gibBurst(c.x,c.y-14,1.2,false,(c.x<P.x?-1:1)*300,-260); addKill(); }
      for (const car of cars) if (!car.dead && Math.abs(car.x-P.x) < R) carBoom(car);

    }
  } else if (P.grounded) {

    // any dash-punch (see startDash) clears P.grounded and launches him back into full flight.
    const RACC = 3400, RDRAG = 6.0, RMAX = 650;
    P.vx += ix*RACC*dt;
    P.vx -= P.vx*RDRAG*dt;
    const rsp = Math.abs(P.vx);
    if (rsp > RMAX) P.vx *= RMAX/rsp;
    const surf = surfaceBelow(P.x, P.y - 4) - 26;
    if (P.hopping) {
      P.vy += 2100*dt;
      P.y += P.vy*dt;
      if (P.y >= surf) { P.y = surf; P.vy = 0; P.hopping = false; }
    } else if (iy < 0) {

    } else {

    if (P.knockT > 0) P.knockT -= dt;
    const swim = inWater(P.x, P.y);
    const ACC = (2600 + 1900*P.boost) * (swim ? 0.45 : 1);
    const DRAG = swim ? 6.5 : (P.dashCoastT > 0 ? 1.7 : 5.0);
    const MAX = (480 + 620*Math.pow(P.boost, 1.35)) * (swim ? 0.55 : 1);
    let nx = ix, ny = iy;
    if (nx&&ny) { nx*=0.7071; ny*=0.7071; }
    P.vx += nx*ACC*dt; P.vy += ny*ACC*dt;
    P.vx -= P.vx*DRAG*dt; P.vy -= P.vy*DRAG*dt;
    if (swim) {
      P.vy -= 230*dt;   // buoyancy — he drifts back toward the surface unless he swims down
      if (Math.random() < dt*14) bubbleAt(P.x + rand(-10,10), P.y - rand(0,20));
    }
    const sp = Math.hypot(P.vx,P.vy);
    // a big knockback (Maeve's lunge) is exempt from the normal max-speed clamp while it plays out —
    // otherwise it gets capped back down to ordinary flight speed within a single frame and the extra
    // power is never actually felt
    if (P.knockT <= 0 && sp > MAX) { P.vx *= MAX/sp; P.vy *= MAX/sp; }
    if (!moving && sp < 40) P.vy += Math.sin(gameT*2.2)*14*dt*20;
    if (sp > 620 && !swim) afterimages.push({x:P.x, y:P.y, f:P.facing, a:0.22});
  }
  P.x = clamp(P.x + P.vx*dt, 30, WORLD_W-30);
  if (P.grounded && P.x > WATER_X) { P.grounded = false; P.hopping = false; }   // ran off the dock edge
  if (!P.grounded) {
    const wasAbove = P.y <= GROUND_Y;
    const maxY = P.x > WATER_X ? WATER_FLOOR - 30 : GROUND_Y - 26;
    P.y = clamp(P.y + P.vy*dt, 60, maxY);
    // splash crossing the water surface in either direction
    if (P.x > WATER_X && wasAbove !== (P.y <= GROUND_Y) && Math.abs(P.vy) > 120) splash(P.x, Math.abs(P.vy));
    // touched down at street level under his own power (not mid-dash) — land and start running
    if (P.x <= WATER_X && P.dashT <= 0 && P.vy >= 0 && P.y >= GROUND_Y - 26 - 0.5) { P.grounded = true; P.hopping = false; P.vy = 0; }
  }
  // The Deep watches for anyone lingering below the surface
  if (inWater(P.x, P.y) && P.y > GROUND_Y + 30) P.underwaterT += dt; else P.underwaterT = 0;

  if (P.dashT <= 0) {
    const hitB = cellIntactAt(P.x, P.y);
    if (hitB) {
      const leftD = P.x - hitB.x, rightD = hitB.x + hitB.w - P.x, topD = P.y - hitB.roofY;
      if (topD < 30) {
        const wasFalling = P.vy >= 0;
        P.y = hitB.roofY - 27; P.vy = Math.min(0, P.vy);
        if (!P.grounded && wasFalling) { P.grounded = true; P.hopping = false; P.vy = 0; }
      }
      else {
        // clamp (don't teleport) to the outer edge — a hard reset every frame is what caused the backward "glitch"
        let cwx;
        if (leftD < rightD) { cwx = hitB.x + 8; P.x = Math.min(P.x, hitB.x - 16); P.vx = Math.min(0, P.vx); }
        else { cwx = hitB.x + hitB.w - 8; P.x = Math.max(P.x, hitB.x + hitB.w + 16); P.vx = Math.max(0, P.vx); }
        // drilling in by hand does the same damage-per-second as the laser, continuously, not a one-off impact crack
        const ci = cellIdx(hitB, cwx, P.y);
        if (ci >= 0 && hitB.cells[ci] < 1) {
          hitB.cells[ci] += dt * LASER_CELL_RATE;
          if (hitB.cells[ci] >= 1) { hitB.cells[ci] = 0.999; destroyCell(hitB, ci, cwx, P.y); }
          else if (Math.random() < 0.4) debris.push({ x: cwx, y: P.y, vx: rand(-60,60), vy: rand(-120,0),
            rot: rand(0,7), vr: rand(-6,6), r: rand(2,4), c: '#2e2638', life: rand(0.8,1.6) });
        }
      }
    }
  }
  P.facing = (mWX >= P.x) ? 1 : -1;
  P.bank += ((P.dashT>0 ? P.dashDir.x*0.5 : P.vx*0.0006) - P.bank) * Math.min(1, dt*8);

  camX += (clamp(P.x + P.vx*0.22 - VW/2, 0, WORLD_W - VW) - camX) * Math.min(1, dt*5);
  const camBot = Math.max(-100, (P.x > WATER_X - 300 ? WATER_FLOOR + 140 : GROUND_Y + 120) - VH);
  camY += (clamp(P.y + P.vy*0.15 - VH/2, -100, camBot) - camY) * Math.min(1, dt*5);
  shakeMag = Math.max(0, shakeMag - dt*30);

  // ── structural checks / collapse animation ──
  for (const b of fgBuildings) {
    if (b.collapsing) {
      b.collapseT += dt;
      const p = b.collapseT / b.collapseDur;
      if (Math.random() < dt*30) smokes.push({ x: rand(b.x,b.x+b.w), y: GROUND_Y - rand(0, b.collapseFromH*(1-p)),
        r: rand(14,30), vr: rand(20,40), vy: rand(-30,-10), life: rand(0.5,1), c:'rgba(120,110,124,' });
      if (b.collapseT >= b.collapseDur) { b.collapsing = false; b.collapsed = true; }
      continue;
    }
    if (b.collapsed || !b.dirty) continue;
    b.supT -= dt;
    if (b.supT <= 0) { b.supT = 0.13; runSupport(b); }
  }

  // ── falling bodies (ejected from collapsing buildings) ──
  for (const f of fallers) {
    if (f.dead) continue;
    f.vy += 1400*dt;
    f.x += f.vx*dt; f.y += f.vy*dt; f.life -= dt;
    const s = surfaceBelow(f.x, f.y - 10);
    if (f.y >= s || f.life <= 0) {
      // splashing down in the water gibs just under the surface so the blood clouds out there
      gibBurst(f.x, f.x > WATER_X ? GROUND_Y + 30 : s, 1.1, false, f.vx*0.3, 0);
      addKill(); f.dead = true;
    }
  }
  fallers = fallers.filter(f => !f.dead);

  // ── laser (stops on buildings AND on tanky enemies; pierces fodder) ──
  const canFire = firing && P.stunT <= 0;
  if (laserGain) laserGain.gain.value = (canFire && !muted) ? 0.05 : 0;
  let beamEndX = mWX, beamEndY = mWY;
  if (canFire) {
    const ex = P.x + P.facing*6, ey = P.y - 24;
    const tdx = mWX - ex, tdy = mWY - ey;
    const tlen = Math.hypot(tdx,tdy) || 1;
    const ux = tdx/tlen, uy = tdy/tlen;
    // nearest building cell along the beam
    let stopD = tlen, hitB = null, hitI = -1;
    if (uy > 0.001) {                     // ground is solid — beam can't pass through it
      const groundD = (GROUND_Y - ey) / uy;
      // ...but only on land. Over the water the surface just sizzles and the beam keeps going,
      // stopping at the sea floor instead.
      if (groundD > 0 && groundD < stopD && ex + ux*groundD < WATER_X) stopD = groundD;
      const floorD = (WATER_FLOOR - ey) / uy;
      if (floorD > 0 && floorD < stopD && ex + ux*floorD >= WATER_X) stopD = floorD;
    }
    for (let d = 30; d < stopD; d += 9) {
      const px = ex + ux*d, py = ey + uy*d;
      const b = cellIntactAt(px, py);
      if (b) { stopD = d; hitB = b; hitI = cellIdx(b, px, py); break; }
    }
    // a supe or heli in the way blocks the beam before the wall does
    let hitSupe = null, hitHeli = null;
    for (const s of supes) {
      if (s.hp <= 0) continue;
      const t = clamp((s.x-ex)*ux + (s.y-ey)*uy, 0, tlen);
      if (t < stopD && Math.hypot(ex+ux*t - s.x, ey+uy*t - s.y) < 22) {
        stopD = t; hitSupe = s; hitHeli = null; hitB = null;
      }
    }
    for (const h of helis) {
      if (h.dead) continue;
      const t = clamp((h.x-ex)*ux + (h.y-ey)*uy, 0, tlen);
      if (t < stopD && Math.hypot(ex+ux*t - h.x, ey+uy*t - h.y) < 42) {
        stopD = t; hitHeli = h; hitSupe = null; hitB = null;
      }
    }
    beamEndX = ex + ux*stopD; beamEndY = ey + uy*stopD;
    const DPS = 315;
    if (hitB && hitI >= 0) {
      hitB.cells[hitI] += dt * LASER_CELL_RATE;
      if (hitB.cells[hitI] >= 1) { hitB.cells[hitI] = 0.999; destroyCell(hitB, hitI, beamEndX, beamEndY); }
      if (Math.random()<0.3) smokes.push({ x:beamEndX, y:beamEndY, r:rand(4,9), vr:rand(14,26), vy:rand(-40,-15), life:rand(0.4,0.8), c:'rgba(80,72,84,' });
    } else if (hitSupe) {
      const s = hitSupe;
      s.hp -= DPS*dt; s.smokeT = 0.1; s.flash = 0.1;
      if (Math.random()<0.7) sparks.push({ x:beamEndX+rand(-5,5), y:beamEndY+rand(-6,6), vx:rand(-140,140), vy:rand(-180,20), life:rand(0.12,0.3), c:Math.random()<0.5?'#ffbb44':'#ff5533' });
      if (Math.random()<0.35) smokes.push({ x:s.x+rand(-8,8), y:s.y+rand(-10,6), r:rand(4,8), vr:rand(12,22), vy:rand(-50,-20), life:rand(0.35,0.7), c:'rgba(70,62,74,' });
      if (s.hp <= 0) { gibBurst(s.x, s.y, 1.5, true); addKill(); if (s.boss) { starlightTimer = rand(140, 190); announceBossKill('STARLIGHT', s.x, s.y); } }
    } else if (hitHeli) {
      const h = hitHeli;
      h.hp -= 450*dt; h.hurt = 0.1;
      if (Math.random()<0.7) sparks.push({ x:beamEndX+rand(-6,6), y:beamEndY+rand(-6,6), vx:rand(-160,160), vy:rand(-180,20), life:rand(0.12,0.3), c:Math.random()<0.5?'#ffdd66':'#ff5533' });
      if (h.hp <= 0) heliDeath(h);
    }
    // fodder caught anywhere along the (possibly shortened) beam still melts
    for (const g of grunts) if (!g.dead && segDist(g.x, g.y-16, ex, ey, beamEndX, beamEndY) < 16) {
      g.dead = true; gibBurst(g.x, g.y-16, 1); addKill();
    }
    for (const c of civs) if (!c.dead && segDist(c.x, c.y-14, ex, ey, beamEndX, beamEndY) < 14) {
      c.dead = true; gibBurst(c.x, c.y-14, 1); addKill();
    }
    for (const car of cars) if (!car.dead && segDist(car.x, car.y-10, ex, ey, beamEndX, beamEndY) < 20) carBoom(car);
    for (const r of rockets) if (!r.gone && segDist(r.x, r.y, ex, ey, beamEndX, beamEndY) < 16) {
      r.gone = true; explode(r.x, r.y, 46, 0, true);
    }
    for (const j of jets) if (!j.dead && segDist(j.x, j.y, ex, ey, beamEndX, beamEndY) < 40*JET_SCALE) {
      // same durability as a helicopter — the beam burns it down rather than instantly detonating it
      j.hp -= 450*dt;
      if (Math.random()<0.7) sparks.push({ x:j.x+rand(-30,30), y:j.y+rand(-8,8), vx:rand(-160,160), vy:rand(-120,40), life:rand(0.12,0.3), c:Math.random()<0.5?'#ffdd66':'#ff5533' });
      if (j.hp <= 0) jetDeath(j);
    }
    for (const f of fallers) if (!f.dead && segDist(f.x, f.y-10, ex, ey, beamEndX, beamEndY) < 14) {
      f.dead = true; gibBurst(f.x, f.y-10, 1); addKill();
    }
    for (const ct of containers) if (!ct.dead && segDist(ct.x+ct.w/2, ct.y+ct.h/2, ex, ey, beamEndX, beamEndY) < 56) containerBoom(ct);
    for (const f of fishes) if (segDist(f.x, f.y, ex, ey, beamEndX, beamEndY) < 14) f.life = 0;
    for (const t of trains) for (let i=0;i<t.cars.length;i++) {
      const c = t.cars[i]; if (c.dead) continue;
      const cxw = trainCarX(t, i);
      if (segDist(cxw, RAIL_Y-16, ex, ey, beamEndX, beamEndY) < 52) {
        c.hp -= 450*dt;
        if (Math.random()<0.6) sparks.push({x:cxw+rand(-30,30),y:RAIL_Y-16+rand(-8,8),vx:rand(-140,140),vy:rand(-160,20),life:rand(0.12,0.3),c:'#ffdd66'});
        if (c.hp <= 0) trainCarDeath(t, i, cxw);
      }
    }
    for (const tk of tanks) if (!tk.dead && segDist(tk.x, tk.y-20, ex, ey, beamEndX, beamEndY) < 34) {
      tk.hp -= 450*dt;
      if (Math.random()<0.6) sparks.push({x:tk.x+rand(-16,16),y:tk.y-20,vx:rand(-140,140),vy:rand(-160,20),life:rand(0.12,0.3),c:'#ffbb44'});
      if (tk.hp <= 0) tankDeath(tk);
    }
    for (const s of sharks) if (!s.dead && segDist(s.x, s.y, ex, ey, beamEndX, beamEndY) < 20) {
      s.hp -= 450*dt;
      if (Math.random()<0.6) bubbleAt(s.x+rand(-10,10), s.y-rand(0,10));
      if (s.hp <= 0) sharkDeath(s);
    }
    for (const r of rescues) if (!r.falling && !r.gone) {
      if (segDist(r.x, r.y, ex, ey, beamEndX, beamEndY) < 38) {
        r.hp -= 450*dt;
        if (Math.random()<0.6) sparks.push({x:r.x+rand(-14,14),y:r.y+rand(-8,8),vx:rand(-140,140),vy:rand(-160,20),life:rand(0.12,0.3),c:'#ffdd66'});
        if (r.hp <= 0) rescueDown(r);
      } else if (r.cable > 24) {
        // check the winch cable itself — one clean cut drops whoever's on it
        for (let cy = 20; cy < r.cable; cy += 26) {
          if (segDist(r.x, r.y + cy, ex, ey, beamEndX, beamEndY) < 7) {
            sparks.push({x:r.x, y:r.y+cy, vx:rand(-80,80), vy:rand(-80,80), life:0.3, c:'#ffdd66'});
            if (r.target && r.target.rescued) { r.target.rescued = false; r.target.rescueFall = true; r.target = null; }
            r.cable = 0; r.state = 'leave'; sfxCrack();
            break;
          }
        }
      }
    }
    for (const a of atrains) if (!a.dead && segDist(a.x, a.y-20, ex, ey, beamEndX, beamEndY) < 20) {
      a.hp -= 380*dt;
      a.laserHitT += dt; a.hitFlag = true;
      if (a.laserHitT > 1) a.fleeing = true;   // held on him too long — he bolts off-screen
      if (Math.random()<0.5) sparks.push({x:a.x,y:a.y-20,vx:rand(-100,100),vy:rand(-140,20),life:rand(0.15,0.3),c:'#ffbb44'});
      if (a.hp <= 0) atrainDeath(a);
    }
    for (const a of maeves) if (!a.dead && segDist(a.x, a.y-20, ex, ey, beamEndX, beamEndY) < 20) {
      a.hp -= 380*dt;
      if (Math.random()<0.5) sparks.push({x:a.x,y:a.y-20,vx:rand(-100,100),vy:rand(-140,20),life:rand(0.15,0.3),c:'#ffbb44'});
      if (a.hp <= 0) maeveDeath(a);
    }
    for (const dp of deeps) if (!dp.dead && segDist(dp.x, dp.y-12, ex, ey, beamEndX, beamEndY) < 24) {
      dp.hp -= 380*dt;
      if (inWater(dp.x, dp.y)) { if (Math.random()<0.7) bubbleAt(dp.x+rand(-10,10), dp.y-rand(0,16)); }
      else if (Math.random()<0.5) sparks.push({x:dp.x,y:dp.y-12,vx:rand(-100,100),vy:rand(-140,20),life:rand(0.15,0.3),c:'#ffbb44'});
      if (dp.hp <= 0) deepDeath(dp);
    }
    if (Math.random() < 0.8) sparks.push({ x: beamEndX+rand(-4,4), y: beamEndY+rand(-4,4),
      vx: rand(-160,160), vy: rand(-200,40), life: rand(0.1,0.35), c: Math.random()<0.5?'#ffdd66':'#ff5533' });
    // beam crossing the water surface boils it — steam burst at the crossing, bubbles below
    if (Math.abs(uy) > 0.001) {
      const surfD = (GROUND_Y - ey) / uy;
      if (surfD > 0 && surfD < stopD) {
        const sxw = ex + ux*surfD;
        if (sxw > WATER_X) {
          if (Math.random() < 0.5) smokes.push({ x: sxw+rand(-6,6), y: GROUND_Y-4, r: rand(5,10),
            vr: rand(16,30), vy: rand(-60,-30), life: rand(0.4,0.8), c: 'rgba(220,230,235,' });
          if (Math.random() < 0.6) bubbleAt(ex + ux*rand(surfD, stopD), ey + uy*rand(surfD, stopD));
        }
      }
    }
  }
  P.beamEndX = beamEndX; P.beamEndY = beamEndY;

  // ── spawn director (packed city) ──
  const groundTarget = Math.min(34, 18 + Math.floor(kills/8));
  const airTarget = Math.min(10, 4 + Math.floor(kills/25));
  const nAir = grunts.filter(g=>g.air).length;
  if (grunts.length - nAir < groundTarget && Math.random() < dt*5) spawnGrunt(false);
  if (nAir < airTarget && Math.random() < dt*2.5) spawnGrunt(true);
  if (civs.length < 90 && Math.random() < dt*14) spawnCiv();
  if (cars.filter(c=>!c.dead).length < 26 && Math.random() < dt*6) spawnCar();
  supeTimer -= dt;
  const supeCap = Math.min(6, 1 + Math.floor(kills/25));
  if (supeTimer <= 0 && supes.filter(s=>!s.boss).length < supeCap) { spawnSupe(); supeTimer = rand(8, 13); }
  heliTimer -= dt;
  const heliCap = Math.min(3, 1 + Math.floor(kills/50));
  if (heliTimer <= 0 && helis.filter(h=>!h.dead).length < heliCap) { spawnHeli(); heliTimer = rand(8, 14); }
  // villain timers only start ticking once their kill threshold is reached — hitting the
  // milestone kicks off the countdown, it isn't running quietly since the start of the game
  if (kills > 150) {
    starlightTimer -= dt;
    if (starlightTimer <= 0 && !supes.some(s=>s.boss)) { spawnStarlight(); starlightTimer = rand(55, 85); }
  }
  jetTimer -= dt;
  if (jetTimer <= 0 && jets.filter(j=>!j.dead).length < 2) { spawnJet(); jetTimer = rand(18, 30); }
  if (kills > 50) {
    atrainTimer -= dt;
    if (atrainTimer <= 0 && atrains.length === 0) { spawnATrain(); atrainTimer = rand(60, 90); }
  }
  if (kills > 250) {
    maeveTimer -= dt;
    if (maeveTimer <= 0 && maeves.length === 0) { spawnMaeve(); maeveTimer = rand(65, 95); }
  }
  // The Deep has no kill gate — he stirs once you've made enough carnage in HIS water
  if (waterMayhem > 25) {
    deepTimer -= dt;
    if (deepTimer <= 0 && deeps.length === 0 && P.x > WATER_X - VW*0.6) { spawnDeep(); deepTimer = rand(50, 80); }
  }

  // ── grunts (ground + jetpack) ──
  for (const g of grunts) {
    if (g.dead) continue;
    g.stepT += dt;
    if (g.air) {
      g.bobT += dt;
      const want = P.x + (g.x > P.x ? rand(180,420) : -rand(180,420));
      g.vx += clamp(want - g.x, -120, 120)*dt*0.8;
      g.vx -= g.vx*1.2*dt;
      g.x += g.vx*dt;
      g.y = clamp(g.anchor + Math.sin(g.bobT*1.7)*26, 200, GROUND_Y-120);
      if (Math.random() < dt*0.2) g.anchor = clamp(g.anchor + rand(-90,90), GROUND_Y-800, GROUND_Y-240);
    } else if (g.boatG) {
      // patrol-boat gunner: drifts on the swell, stays in open water
      g.bobT += dt;
      g.x += g.vx * dt;
      g.y = GROUND_Y - 2 + Math.sin(g.bobT*2.1)*3;
      if (g.x < WATER_X + 50) { g.x = WATER_X + 50; g.vx = Math.abs(g.vx); }
      if (g.x > WORLD_W - 40) g.vx = -Math.abs(g.vx);
      if (Math.random() < dt*0.3) g.vx = rand(-40,40);
    } else {
      g.x += g.vx * dt;
      if (g.x > WATER_X - 30) { g.x = WATER_X - 30; g.vx = -Math.abs(g.vx); }   // dock ends here
      const s = surfaceBelow(g.x, g.y - 30);
      if (s !== g.surfY || g.x < 30 || g.x > WORLD_W-30) { g.vx = -g.vx; g.x += g.vx*dt*2; }
      if (Math.random() < dt*0.4) g.vx = rand(-50,50);
    }
    g.fireCd -= dt;
    if (g.fireCd <= 0 && dist2(g.x, g.y-16, P.x, P.y) < 1000*1000) {
      g.fireCd = rand(1.1, 2.3);
      const a = Math.atan2(P.y - (g.y-22), P.x - g.x) + rand(-0.06,0.06);
      bullets.push({ x: g.x, y: g.y-22, vx: Math.cos(a)*760, vy: Math.sin(a)*760, life: 1.4 });
      g.muzzle = 0.06;
    }
    if (g.muzzle) g.muzzle -= dt;
  }
  grunts = grunts.filter(g => !g.dead && Math.abs(g.x - P.x) < VW*2);

  // ── civilians ──
  for (const c of civs) {
    if (c.dead) continue;
    c.stepT += dt;
    if (c.rescued) continue;   // dangling from the coast-guard winch — the chopper moves them
    if (c.rescueFall) {
      // the cable got cut (or the chopper died) — long way down
      c.rescueVy = (c.rescueVy || 0) + 1400*dt;
      c.y += c.rescueVy*dt;
      if (c.y >= GROUND_Y + 8) { c.dead = true; splash(c.x, 400); gibBurst(c.x, GROUND_Y+24, 1.1); addKill(); }
      continue;
    }
    if (c.swim) {
      // swimmer: slow paddle, bobbing on the surface; panicked swimmers thrash away fast
      const spd = c.panic > 0 ? 75 : c.sp;
      if (c.panic > 0) {
        c.panic -= dt; c.x += c.dir * spd * dt;
        if (Math.random() < dt*6) sparks.push({ x: c.x+rand(-8,8), y: GROUND_Y+2, vx: rand(-40,40), vy: -rand(40,90), life: rand(0.2,0.4), c: '#cfe9f5' });
      } else {
        c.x += c.dir * spd * dt;
        if (Math.random() < dt*0.2) c.dir = -c.dir;
      }
      c.y = GROUND_Y + 10 + Math.sin(c.stepT*2.4)*3;
      if (c.x < WATER_X + 25) { c.x = WATER_X + 25; c.dir = 1; }
      if (c.x > WORLD_W - 30) c.dir = -1;
      continue;
    }
    if (c.panic > 0) { c.panic -= dt; c.x += c.dir * 170 * dt; }
    else {
      c.x += c.dir * c.sp * dt;
      if (Math.random() < dt*0.15) c.dir = -c.dir;
    }
    if (c.x > WATER_X - 20) { c.x = WATER_X - 20; c.dir = -1; }   // walkers stop at the dock edge
    if (c.x < 30 || c.x > WORLD_W-30) c.dir = -c.dir;
  }
  civs = civs.filter(c => !c.dead && Math.abs(c.x - P.x) < VW*2.2);

  // ── cars (and boats — water-zone traffic) ──
  for (const car of cars) {
    if (car.dead) continue;
    car.t += dt;
    if (car.panic > 0) car.panic -= dt;
    car.x += car.dir * car.sp * (car.panic>0 ? 2.4 : 1) * dt;
    if (car.kind === 'boat') {
      car.y = GROUND_Y + 2 + Math.sin(car.t*1.8)*3;
      if (car.x < WATER_X + 70) { car.x = WATER_X + 70; car.dir = 1; }
      if (Math.random() < dt*3) sparks.push({ x: car.x - car.dir*26, y: GROUND_Y+2, vx: -car.dir*rand(10,40), vy: -rand(15,45), life: rand(0.15,0.35), c: '#cfe9f5' });
    } else if (car.x > WATER_X - 60) { car.x = WATER_X - 60; car.dir = -1; }
    if (car.x < 50 || car.x > WORLD_W-50) car.dir = -car.dir;
  }
  cars = cars.filter(c => !c.dead && Math.abs(c.x - P.x) < VW*2.2);

  // ── supes ──
  for (const s of supes) {
    if (s.hp <= 0) continue;
    s.t -= dt; s.smokeT -= dt; s.flash -= dt;
    if (s.smokeT > 0 && Math.random()<0.5)
      sparks.push({x:s.x+rand(-10,10), y:s.y+rand(-14,14), vx:rand(-30,30), vy:rand(-80,-20), life:rand(0.3,0.7), c:'#555560'});
    const dx = P.x - s.x, dy = P.y - s.y, d = Math.hypot(dx,dy) || 1;
    if (s.boss) {
      const desired = 420;
      const closeF = (d - desired)/400;
      s.vx += (dx/d) * closeF * 700*dt;
      s.vy += (dy/d) * closeF * 700*dt;
      s.vx += (-dy/d) * s.orbitDir * 260*dt;
      s.vy += (dx/d) * s.orbitDir * 260*dt;
      s.vx -= s.vx*1.2*dt; s.vy -= s.vy*1.2*dt;
      const spB = Math.hypot(s.vx,s.vy), mxB = 520;
      if (spB > mxB) { s.vx *= mxB/spB; s.vy *= mxB/spB; }
      // actively dodge the laser: juke perpendicular if the beam is aimed near her
      if (firing && P.beamEndX !== undefined) {
        const bex = P.x + P.facing*6, bey = P.y - 24;
        const bux = P.beamEndX - bex, buy = P.beamEndY - bey;
        const blen = Math.hypot(bux,buy) || 1;
        const nux = bux/blen, nuy = buy/blen;
        const toSx = s.x-bex, toSy = s.y-bey;
        const proj = toSx*nux + toSy*nuy;
        if (proj > 0 && proj < blen+50) {
          const perpX = toSx - nux*proj, perpY = toSy - nuy*proj;
          const perpDist = Math.hypot(perpX,perpY) || 1;
          if (perpDist < 100) { s.vx += (perpX/perpDist)*900*dt; s.vy += (perpY/perpDist)*900*dt; }
        }
      }
      s.x = clamp(s.x + s.vx*dt, 60, WORLD_W-60);
      s.y = clamp(s.y + s.vy*dt, 120, GROUND_Y-200);
      s.atkCd -= dt;
      if (s.atkCd <= 0) {
        const fireBolt = (s.atkType === 0 && boltLockout <= 0);
        if (fireBolt) {
          const a = Math.atan2(P.y-s.y, P.x-s.x);
          electroBolts.push({ x: s.x, y: s.y, vx: Math.cos(a)*1088, vy: Math.sin(a)*1088, life: 2.2 });
          noiseBurst(0.15, 1400, 0.12, 'highpass');
          s.atkType = 1;
          s.atkCd = rand(1.3, 1.9);   // bolts a bit less frequent than before
        } else {
          for (let k=0;k<3;k++) {
            const src = pickLightSource(s.x);
            if (!src) continue;
            const a = Math.atan2(P.y-src.y, P.x-src.x);
            lightBalls.push({ x: src.x, y: src.y, vx: Math.cos(a)*380, vy: Math.sin(a)*380, life: 3 });
          }
          if (s.atkType === 1) s.atkType = 0;   // only advance when it was genuinely her light-ball turn
          s.atkCd = rand(0.8, 1.3);
        }
      }
      continue;
    }
    if (s.state === 'seek') {
      s.vx += (dx/d)*900*dt; s.vy += (dy/d)*900*dt;
      const sp = Math.hypot(s.vx,s.vy); const mx = 380;
      if (sp > mx) { s.vx *= mx/sp; s.vy *= mx/sp; }
      if (d < 110) { s.state='windup'; s.t=0.32; s.vx*=0.2; s.vy*=0.2; }
    } else if (s.state === 'windup') {
      if (s.t <= 0) { s.state='lunge'; s.t=0.18; s.vx=(dx/d)*1300; s.vy=(dy/d)*1300; }
    } else if (s.state === 'lunge') {
      if (d < 55) {
        P.vx += s.vx*0.7; P.vy += s.vy*0.7;
        P.hurtFlash = 1; shake(11); thump(85, 0.22, 0.28);
        s.state='back'; s.t=rand(0.7,1.2); s.vx*=-0.4; s.vy*=-0.4;
      }
      if (s.t <= 0) { s.state='back'; s.t=rand(0.6,1); }
    } else {
      s.vx -= s.vx*2.5*dt; s.vy -= s.vy*2.5*dt;
      if (s.t <= 0) s.state='seek';
    }
    s.x = clamp(s.x + s.vx*dt, 40, WORLD_W-40);
    s.y = clamp(s.y + s.vy*dt, 80, GROUND_Y-40);
  }
  // keep supes from stacking on top of each other — they all independently seek the same
  // point near the player with no awareness of each other, so left alone they pile up
  for (let i=0;i<supes.length;i++) {
    const s1 = supes[i]; if (s1.hp<=0) continue;
    for (let j=i+1;j<supes.length;j++) {
      const s2 = supes[j]; if (s2.hp<=0) continue;
      const ddx=s2.x-s1.x, ddy=s2.y-s1.y, dd=Math.hypot(ddx,ddy)||1, minD=100;
      if (dd < minD) {
        const push=(minD-dd)*4, nxp=ddx/dd, nyp=ddy/dd;
        s1.x -= nxp*push*dt; s1.y -= nyp*push*dt;
        s2.x += nxp*push*dt; s2.y += nyp*push*dt;
      }
    }
  }
  supes = supes.filter(s => s.hp > 0);

  // ── helicopters ──
  for (const h of helis) {
    h.t += dt;
    if (h.falling) {
      h.vy += 900*dt; h.rot += dt*7;
      h.x += h.vx*dt; h.y += h.vy*dt;
      h.smokeCd -= dt;
      if (h.smokeCd <= 0) { h.smokeCd = 0.05; smokes.push({x:h.x, y:h.y, r:rand(8,16), vr:rand(20,40), vy:rand(-30,0), life:rand(0.5,0.9), c:'rgba(96,90,100,'}); }
      const s = surfaceBelow(h.x, h.y - 40);
      if (h.y >= s - 20) { h.gone = true; explode(h.x, s-10, 95, 0.8); flashScorch(h.x, s, 60); }
      continue;
    }
    const want = P.x + (h.x > P.x ? h.holdDist : -h.holdDist);
    h.vx += clamp(want - h.x, -300, 300)*dt*1.6;
    h.vy += clamp((P.y - 140 + h.altOffset) - h.y, -200, 200)*dt*1.4 + Math.sin(h.t*2.2)*24*dt;
    h.vx -= h.vx*1.6*dt; h.vy -= h.vy*1.8*dt;
    h.x = clamp(h.x + h.vx*dt, 80, WORLD_W-80);
    h.y = clamp(h.y + h.vy*dt, 160, GROUND_Y-260);
    if (h.hp < 220 && Math.random() < dt*6)
      smokes.push({x:h.x+rand(-12,12), y:h.y-8, r:rand(5,10), vr:rand(14,24), vy:rand(-55,-25), life:rand(0.4,0.8), c:'rgba(88,80,92,'});
    h.fireCd -= dt;
    if (h.fireCd <= 0 && Math.abs(h.x-P.x) < VW*0.7) {
      h.fireCd = rand(2.2, 3.4);
      const a = Math.atan2(P.y - h.y, P.x - h.x);
      rockets.push({ x: h.x, y: h.y+14, vx: Math.cos(a)*560, vy: Math.sin(a)*560, life: 3, t:0 });
      noiseBurst(0.2, 800, 0.1, 'bandpass');
    }
  }
  // same deal as supes — multiple helis targeting the same side of the player collapse onto
  // the same spot otherwise, since "want" doesn't account for other helis already there
  for (let i=0;i<helis.length;i++) {
    const h1 = helis[i]; if (h1.dead || h1.falling) continue;
    for (let j=i+1;j<helis.length;j++) {
      const h2 = helis[j]; if (h2.dead || h2.falling) continue;
      const ddx=h2.x-h1.x, ddy=h2.y-h1.y, dd=Math.hypot(ddx,ddy)||1, minD=160;
      if (dd < minD) {
        const push=(minD-dd)*3, nxp=ddx/dd, nyp=ddy/dd;
        h1.x -= nxp*push*dt; h1.y -= nyp*push*dt;
        h2.x += nxp*push*dt; h2.y += nyp*push*dt;
      }
    }
  }
  helis = helis.filter(h => !h.gone);

  // ── commercial jets (high-altitude scenery — plow into them or laser them down) ──
  for (const j of jets) {
    if (j.dead) continue;
    j.t += dt;
    j.x += j.vx*dt;
    if (Math.random() < dt*8) smokes.push({ x: j.x - Math.sign(j.vx)*46*JET_SCALE, y: j.y+4, r: rand(10,20),
      vr: rand(8,16), vy: rand(-6,6), life: rand(1.4,2.4), c: 'rgba(225,228,232,' });
    if (j.hp < 200 && Math.random() < dt*7)
      smokes.push({ x: j.x+rand(-24,24), y: j.y-4, r: rand(6,12), vr: rand(14,26), vy: rand(-40,-15), life: rand(0.5,1.0), c: 'rgba(70,62,70,' });
    if (dist2(P.x,P.y,j.x,j.y) < (80*JET_SCALE)*(80*JET_SCALE)) jetDeath(j);
  }
  jets = jets.filter(j => !j.dead && Math.abs(j.x-P.x) < VW*3);

  // ── dock containers: gravity-settle onto the stack (or dock) below, crush on landing ──
  for (const ct of containers) {
    if (ct.dead) continue;
    let restY = GROUND_Y - ct.h;
    for (const o of containers) {
      if (o === ct || o.dead) continue;
      if (Math.abs(o.x - ct.x) < ct.w*0.7 && o.y > ct.y) restY = Math.min(restY, o.y - ct.h);
    }
    if (ct.y < restY - 0.5) {
      ct.vy += 1500*dt;
      ct.y += ct.vy*dt;
      if (ct.y >= restY) {
        ct.y = restY;
        if (ct.vy > 240) {
          thump(80, 0.2, 0.2); shake(4);
          for (const c of civs) if (!c.dead && !c.swim && c.x > ct.x-8 && c.x < ct.x+ct.w+8 && Math.abs(c.y - (ct.y+ct.h)) < 30) { c.dead=true; gibBurst(c.x,c.y-14,1.2); addKill(); }
          for (const g of grunts) if (!g.dead && !g.air && !g.boatG && g.x > ct.x-8 && g.x < ct.x+ct.w+8 && Math.abs(g.y - (ct.y+ct.h)) < 30) { g.dead=true; gibBurst(g.x,g.y-16,1.2); addKill(); }
        }
        ct.vy = 0;
      }
    }
  }

  // ── A-Train (ground/rooftop speedster boss) ──
  for (const a of atrains) {
    if (a.dead) continue;
    a.blurT += dt;
    const d = Math.hypot(P.x-a.x, P.y-a.y) || 1;

    if (a.fleeing) {
      // held on him with the laser too long — full override, sprint hard off-screen and stay away
      const away = a.x < P.x ? -1 : 1;
      a.x = clamp(a.x + away*2600*dt, 40, WORLD_W-40);
      a.facing = away;
      if (Math.abs(a.x-P.x) > VW*1.15) { a.fleeing = false; a.state = 'run'; a.stateT = rand(0.6,1.1); a.wanderX = a.x; }
    } else if (a.state === 'charge') {
      a.stateT -= dt;
      a.x += a.chargeVx*dt;
      if (dist2(a.x,a.y,P.x,P.y) < 46*46) {
        P.grounded = false; P.hopping = false;   // un-ground him so the knockback actually sends him flying
        P.vx += a.chargeVx>0?520:-520; P.vy -= 160;
        P.hurtFlash = 1; P.stunT = Math.max(P.stunT, 1); shake(16); thump(70,0.25,0.3); sfxHit();
        a.state = 'skid'; a.stateT = rand(0.5,0.8);
      } else if (a.stateT <= 0 || a.x < 40 || a.x > WORLD_W-40) {
        a.state = 'skid'; a.stateT = rand(0.5,0.8);
      }
    } else if (a.state === 'wind') {
      a.stateT -= dt;
      if (a.stateT <= 0) {
        a.chargeVx = (P.x > a.x ? 1 : -1) * 2000;
        a.state = 'charge'; a.stateT = 0.35;
      }
    } else if (a.state === 'skid') {
      a.stateT -= dt;
      if (a.stateT <= 0) { a.state = 'run'; a.stateT = rand(0.6,1.2); }
    } else { // 'run'
      a.stateT -= dt;
      a.fleeCd -= dt;
      // evasion: if you're dashing at him or lasering nearby, dart hard away — long sprint,
      // often clean off the edge of the screen and back, not just a sidestep
      const threatened = (P.dashT > 0 && dist2(P.x,P.y,a.x,a.y) < 320*320) ||
                          (firing && dist2(P.x,P.y,a.x,a.y) < 280*280);
      if (threatened && a.fleeCd <= 0) {
        a.wanderX = clamp(a.x + (a.x < P.x ? -1 : 1) * rand(700,1300), 60, WORLD_W-60);
        a.stateT = rand(0.7,1.2); a.fleeCd = 0.5;
      } else if (a.stateT <= 0) {
        // long, fast sweeps that carry him well past the edges of the screen and back
        a.wanderX = clamp(P.x + (Math.random()<0.5?-1:1)*rand(500,1300), 60, WORLD_W-60);
        a.stateT = rand(0.5,1.1);
      }
      const vx = clamp((a.wanderX - a.x)*6, -2400, 2400);
      a.x += vx*dt;
      a.facing = vx >= 0 ? 1 : -1;
      a.atkCd -= dt;
      // only charge when he's actually near the player's altitude — no more wasted charges
      // while you're safely flying well above the streets/rooftops
      if (a.atkCd <= 0 && d < 480 && Math.abs(P.y - a.y) < 170) {
        a.state = 'wind'; a.stateT = 0.3; a.atkCd = rand(1.8,2.8);
      }
      a.roofCd -= dt;
      if (a.roofCd <= 0) {
        a.roofCd = rand(0.7, 1.6);   // checks in more often, so he's climbing/wall-running far more of the time
        // bias ground/rooftop choice toward whichever surface is closer to the player's height —
        // he's trying to get to your altitude, not just coin-flipping — but generally favors rooftops
        if (a.mode === 'ground') {
          const idx = findBuildingIndexAt(a.x);
          if (idx >= 0) {

            if (Math.random() < (roofDist < groundDist ? 0.95 : 0.55)) { a.mode = 'roof'; a.buildingIdx = idx; }
          }
        } else {
          const b = fgBuildings[a.buildingIdx];
          const roofDist = b ? Math.abs(P.y - b.roofY) : Infinity, groundDist = Math.abs(P.y - GROUND_Y);
          if (Math.random() < (groundDist < roofDist ? 0.4 : 0.1)) { a.mode = 'ground'; a.buildingIdx = -1; }
        }
      }
    }

    if (!a.hitFlag) a.laserHitT = 0;   // only counts consecutive frames actually under the beam
    a.hitFlag = false;

    // keep a rooftop-attached A-Train on a valid building — hop to the next one (if the gap's
    // jumpable) or drop off and run down the side otherwise
    if (a.mode === 'roof') {
      const b = fgBuildings[a.buildingIdx];
      if (!b || b.collapsed || b.collapsing || a.x < b.x-10 || a.x > b.x+b.w+10) {
        const exitedRight = !b || a.x > b.x+b.w;
        const searchIdx = a.buildingIdx + (exitedRight ? 1 : -1);
        const nb = fgBuildings[searchIdx];
        let hopped = false;
        if (b && nb && !nb.collapsed && !nb.collapsing) {
          const gap = exitedRight ? nb.x - (b.x+b.w) : (b.x - (nb.x+nb.w));
          if (gap < 260) { a.buildingIdx = searchIdx; a.x = exitedRight ? nb.x+12 : nb.x+nb.w-12; hopped = true; }
        }
        if (!hopped) a.mode = 'ground';
      }
    }
    const targetY = (a.mode === 'roof' && fgBuildings[a.buildingIdx]) ? fgBuildings[a.buildingIdx].roofY - 4 : GROUND_Y - 4;
    a.y += clamp(targetY - a.y, -2600*dt, 2600*dt);   // fast wall-run transition, not a teleport
    a.x = clamp(a.x, 40, WORLD_W-40);

    if (a.x > WATER_X && a.y > GROUND_Y - 30 && Math.random() < dt*24)
      sparks.push({ x: a.x - a.facing*rand(4,22), y: GROUND_Y+1, vx: -a.facing*rand(30,100),
        vy: -rand(40,120), life: rand(0.2,0.4), c: '#cfe9f5' });
  }
  atrains = atrains.filter(a => !a.dead);

  // ── Queen Maeve (ground/rooftop grappler boss) ──
  for (const a of maeves) {
    if (a.dead) continue;

    if (a.state === 'jump') {
      // a lunge at the (led) target with mild in-flight tracking — she can't fly, so the trade for
      // her much longer reach is that she keeps steering toward you a little instead of committing
      // to one fixed line like a shorter, close-range hop would
      a.stateT -= dt;
      const tdx = P.x-a.x, tdy = P.y-a.y, tdd = Math.hypot(tdx,tdy) || 1;
      const desVx = (tdx/tdd)*1400, desVy = (tdy/tdd)*1400;
      const turn = Math.min(1, dt*2.0);   // strong enough correction to reliably connect, still reads as a pounce not a homing missile
      a.jumpVx += (desVx - a.jumpVx)*turn; a.jumpVy += (desVy - a.jumpVy)*turn;
      a.x += a.jumpVx*dt; a.y += a.jumpVy*dt;
      a.facing = a.jumpVx >= 0 ? 1 : -1;
      if (dist2(a.x,a.y,P.x,P.y) < 80*80) {

        P.vx += (P.x-a.x)/kd * 3900; P.vy += (P.y-a.y)/kd * 3900;

      } else if (a.stateT <= 0) {
        a.state = 'skid'; a.stateT = rand(0.4,0.7);

        const tx = P.x + P.vx*leadT, ty = P.y + P.vy*leadT;
        const dx = tx-a.x, dy = ty-a.y, dd = Math.hypot(dx,dy) || 1;
        a.jumpVx = (dx/dd)*1400; a.jumpVy = (dy/dd)*1400 - 260;   // launches a bit higher than the direct line — reads as an actual leap, then the in-flight correction pulls her back down onto target
        a.state = 'jump'; a.stateT = 0.7;   // a touch longer to give the arc time to come back down onto target
      }
    } else if (a.state === 'skid') {
      a.stateT -= dt;
      if (a.stateT <= 0) { a.state = 'run'; a.stateT = rand(0.6,1.2); }
    } else { // 'run'
      a.stateT -= dt;
      if (a.stateT <= 0) { a.wanderX = clamp(P.x + rand(-220,220), 60, WORLD_W-60); a.stateT = rand(0.5,1.1); }
      const vx = clamp((a.wanderX - a.x)*2.6, -740, 740);
      a.x += vx*dt;
      a.facing = vx >= 0 ? 1 : -1;
      a.atkCd -= dt;
      const vertGap = a.y - P.y;   // positive when the player is above her — that's when she jumps
      // much more reach than a flying supe's lunge needs — she has to close a real gap from the ground
      if (a.atkCd <= 0 && Math.abs(P.x-a.x) < 460 && vertGap > 0 && vertGap < 900) {
        a.state = 'crouch'; a.stateT = 0.3; a.atkCd = rand(2.6,3.8);
      }
      a.roofCd -= dt;
      if (a.roofCd <= 0) {
        a.roofCd = rand(1.2, 2.4);
        if (a.mode === 'ground') {
          const idx = findBuildingIndexAt(a.x);
          if (idx >= 0) {
            const roofDist = Math.abs(P.y - fgBuildings[idx].roofY), groundDist = Math.abs(P.y - GROUND_Y);
            if (Math.random() < (roofDist < groundDist ? 0.85 : 0.3)) { a.mode = 'roof'; a.buildingIdx = idx; }
          }
        } else {
          const b = fgBuildings[a.buildingIdx];
          const roofDist = b ? Math.abs(P.y - b.roofY) : Infinity, groundDist = Math.abs(P.y - GROUND_Y);
          if (Math.random() < (groundDist < roofDist ? 0.6 : 0.2)) { a.mode = 'ground'; a.buildingIdx = -1; }
        }
