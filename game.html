      g.x += g.vx * dt;
      g.y = GROUND_Y - 2 + Math.sin(g.bobT*2.1)*3;
      if (g.x < WATER_X + 50) { g.x = WATER_X + 50; g.vx = Math.abs(g.vx); }
      if (g.x > WORLD_W - 40) g.vx = -Math.abs(g.vx);
      if (Math.random() < dt*0.3) g.vx = rand(-40,40);
    } else {
      g.x += g.vx * dt;
      if (g.x > WATER_X - 30) { g.x = WATER_X - 30; g.vx = -Math.abs(g.vx); }   // dock ends here
      const s = surfaceBelow(g.x, g.y - 30);
      if (s !== g.surfY || g.x < 30 || g.x > WORLD_W-30) { g.vx = -g.vx; g.x += g.vx*dt*2; }
      if (Math.random() < dt*0.4) g.vx = rand(-50,50);
    }
    g.fireCd -= dt;
    if (g.fireCd <= 0 && dist2(g.x, g.y-16, P.x, P.y) < 1000*1000) {
      g.fireCd = rand(1.1, 2.3);
      const a = Math.atan2(P.y - (g.y-22), P.x - g.x) + rand(-0.06,0.06);
      bullets.push({ x: g.x, y: g.y-22, vx: Math.cos(a)*760, vy: Math.sin(a)*760, life: 1.4 });
      g.muzzle = 0.06;
    }
    if (g.muzzle) g.muzzle -= dt;
  }
  grunts = grunts.filter(g => !g.dead && Math.abs(g.x - P.x) < VW*2);

  // ── civilians ──
  for (const c of civs) {
    if (c.dead) continue;
    c.stepT += dt;
    if (c.panic > 0) { c.panic -= dt; c.x += c.dir * 170 * dt; }
    else {
      c.x += c.dir * c.sp * dt;
      if (Math.random() < dt*0.15) c.dir = -c.dir;
    }
    if (c.x > WATER_X - 20) { c.x = WATER_X - 20; c.dir = -1; }   // walkers stop at the dock edge
    if (c.x < 30 || c.x > WORLD_W-30) c.dir = -c.dir;
  }
  civs = civs.filter(c => !c.dead && Math.abs(c.x - P.x) < VW*2.2);

  // ── cars (and boats — water-zone traffic) ──
  for (const car of cars) {
    if (car.dead) continue;
    car.t += dt;
    if (car.panic > 0) car.panic -= dt;
    car.x += car.dir * car.sp * (car.panic>0 ? 2.4 : 1) * dt;
    if (car.kind === 'boat') {
      car.y = GROUND_Y + 2 + Math.sin(car.t*1.8)*3;
      if (car.x < WATER_X + 70) { car.x = WATER_X + 70; car.dir = 1; }
      if (Math.random() < dt*3) sparks.push({ x: car.x - car.dir*26, y: GROUND_Y+2, vx: -car.dir*rand(10,40), vy: -rand(15,45), life: rand(0.15,0.35), c: '#cfe9f5' });
    } else if (car.x > WATER_X - 60) { car.x = WATER_X - 60; car.dir = -1; }
    if (car.x < 50 || car.x > WORLD_W-50) car.dir = -car.dir;
  }
  cars = cars.filter(c => !c.dead && Math.abs(c.x - P.x) < VW*2.2);

  // ── supes ──
  for (const s of supes) {
    if (s.hp <= 0) continue;
    s.t -= dt; s.smokeT -= dt; s.flash -= dt;
    if (s.launchedT > 0) s.launchedT -= dt;
    if (s.smokeT > 0 && Math.random()<0.5)
      sparks.push({x:s.x+rand(-10,10), y:s.y+rand(-14,14), vx:rand(-30,30), vy:rand(-80,-20), life:rand(0.3,0.7), c:'#555560'});
    const dx = P.x - s.x, dy = P.y - s.y, d = Math.hypot(dx,dy) || 1;
    if (s.boss) {
      if (s.dashing) {
        // a committed close-range dash — connects for a solid shove, never a stun (only the
        // bolts stun); half the knockback of Maeve's lunge since this is the cheaper, faster attack
        s.dashT -= dt;
        s.x += s.dashVx*dt; s.y += s.dashVy*dt;
        s.facing = s.dashVx >= 0 ? 1 : -1;
        if (d < 50) {
          const kd = Math.max(d, 20);   // floored — see the matching note on Maeve's brace-bounce
          P.knockT = Math.max(P.knockT, 0.4);
          P.vx += (P.x-s.x)/kd*1950; P.vy += (P.y-s.y)/kd*1950;
          P.hurtFlash = 1; shake(14); sfxHit(); thump(60,0.25,0.3);
          s.dashing = false; s.dashCd = rand(2.6,3.8);
        } else if (s.dashT <= 0) {
          s.dashing = false; s.dashCd = rand(2.6,3.8);
        }
        s.x = clamp(s.x, 60, WORLD_W-60);
        s.y = clamp(s.y, 120, GROUND_Y-200);
        continue;
      }
      const desired = 420;
      const closeF = (d - desired)/400;
      s.vx += (dx/d) * closeF * 700*dt;
      s.vy += (dy/d) * closeF * 700*dt;
      s.vx += (-dy/d) * s.orbitDir * 260*dt;
      s.vy += (dx/d) * s.orbitDir * 260*dt;
      s.vx -= s.vx*1.2*dt; s.vy -= s.vy*1.2*dt;
      const spB = Math.hypot(s.vx,s.vy), mxB = 660;   // a bit faster still
      if (spB > mxB) { s.vx *= mxB/spB; s.vy *= mxB/spB; }
      // actively dodge the laser: juke perpendicular if the beam is aimed near her
      if (firing && P.beamEndX !== undefined) {
        const bex = P.x + P.facing*6, bey = P.y - 24;
        const bux = P.beamEndX - bex, buy = P.beamEndY - bey;
        const blen = Math.hypot(bux,buy) || 1;
        const nux = bux/blen, nuy = buy/blen;
        const toSx = s.x-bex, toSy = s.y-bey;
        const proj = toSx*nux + toSy*nuy;
        if (proj > 0 && proj < blen+90) {
          const perpX = toSx - nux*proj, perpY = toSy - nuy*proj;
          const perpDist = Math.hypot(perpX,perpY) || 1;
          if (perpDist < 150) { s.vx += (perpX/perpDist)*1250*dt; s.vy += (perpY/perpDist)*1250*dt; }
        }
      }
      s.x = clamp(s.x + s.vx*dt, 60, WORLD_W-60);
      s.y = clamp(s.y + s.vy*dt, 120, GROUND_Y-200);
      s.dashCd -= dt;
      if (s.dashCd <= 0 && d < 260) {
        s.dashing = true; s.dashT = 0.35;
        s.dashVx = (dx/d)*1500; s.dashVy = (dy/d)*1500;
      }
      s.atkCd -= dt;
      // light-ball/hail attack pulled for now, revisit later — bolts only in the meantime
      if (s.atkCd <= 0 && boltLockout <= 0) {
        const a = Math.atan2(P.y-s.y, P.x-s.x);
        electroBolts.push({ x: s.x, y: s.y, vx: Math.cos(a)*1088, vy: Math.sin(a)*1088, life: 2.2 });
        noiseBurst(0.15, 1100, 0.08, 'highpass');
        s.atkCd = rand(1.3, 1.9);   // a touch slower than before
      }
      continue;
    }
    if (s.state === 'seek') {
      s.vx += (dx/d)*900*dt; s.vy += (dy/d)*900*dt;
      const sp = Math.hypot(s.vx,s.vy); const mx = 380;
      if (sp > mx) { s.vx *= mx/sp; s.vy *= mx/sp; }
      if (d < 110) { s.state='windup'; s.t=0.32; s.vx*=0.2; s.vy*=0.2; }
    } else if (s.state === 'windup') {
      if (s.t <= 0) { s.state='lunge'; s.t=0.18; s.vx=(dx/d)*1300; s.vy=(dy/d)*1300; }
    } else if (s.state === 'lunge') {
      if (d < 55) {
        P.vx += s.vx*0.7; P.vy += s.vy*0.7;
        P.hurtFlash = 1; shake(11); thump(85, 0.22, 0.28);
        s.state='back'; s.t=rand(0.7,1.2); s.vx*=-0.4; s.vy*=-0.4;
      }
      if (s.t <= 0) { s.state='back'; s.t=rand(0.6,1); }
    } else {
      s.vx -= s.vx*2.5*dt; s.vy -= s.vy*2.5*dt;
      if (s.t <= 0) s.state='seek';
    }
    s.x = clamp(s.x + s.vx*dt, 40, WORLD_W-40);
    s.y = clamp(s.y + s.vy*dt, 80, GROUND_Y-40);
  }
  // keep supes from stacking on top of each other — they all independently seek the same
  // point near the player with no awareness of each other, so left alone they pile up
  for (let i=0;i<supes.length;i++) {
    const s1 = supes[i]; if (s1.hp<=0) continue;
    for (let j=i+1;j<supes.length;j++) {
      const s2 = supes[j]; if (s2.hp<=0) continue;
      const ddx=s2.x-s1.x, ddy=s2.y-s1.y, dd=Math.hypot(ddx,ddy)||1, minD=100;
      if (dd < minD) {
        const push=(minD-dd)*4, nxp=ddx/dd, nyp=ddy/dd;
        s1.x -= nxp*push*dt; s1.y -= nyp*push*dt;
        s2.x += nxp*push*dt; s2.y += nyp*push*dt;
      }
    }
  }
  supes = supes.filter(s => s.hp > 0);
  // Starlight and Lamplighter both orbit the player independently with no awareness of each
  // other — same stacking problem as regular supes above, just at boss scale, which is why they
  // were reading as gravitating toward each other whenever both were up. Wider radius since
  // they're each already orbiting 300+ units out from the player.
  for (const s of supes) {
    if (!s.boss) continue;
    for (const l of lamplighters) {
      if (l.dead) continue;
      const ddx=l.x-s.x, ddy=l.y-s.y, dd=Math.hypot(ddx,ddy)||1, minD=380;
      if (dd < minD) {
        const push=(minD-dd)*3, nxp=ddx/dd, nyp=ddy/dd;
        s.x -= nxp*push*dt; s.y -= nyp*push*dt;
        l.x += nxp*push*dt; l.y += nyp*push*dt;
      }
    }
  }

  // ── helicopters ──
  for (const h of helis) {
    h.t += dt;
    if (h.falling) {
      h.vy += 900*dt; h.rot += dt*7;
      h.x += h.vx*dt; h.y += h.vy*dt;
      h.smokeCd -= dt;
      if (h.smokeCd <= 0) { h.smokeCd = 0.05; smokes.push({x:h.x, y:h.y, r:rand(8,16), vr:rand(20,40), vy:rand(-30,0), life:rand(0.5,0.9), c:'rgba(96,90,100,'}); }
      const s = surfaceBelow(h.x, h.y - 40);
      if (h.y >= s - 20) { h.gone = true; explode(h.x, s-10, 95, 0.8); flashScorch(h.x, s, 60); freezeT = Math.max(freezeT, 0.05); }
      continue;
    }
    const want = P.x + (h.x > P.x ? h.holdDist : -h.holdDist);
    h.vx += clamp(want - h.x, -300, 300)*dt*1.6;
    h.vy += clamp((P.y - 140 + h.altOffset) - h.y, -200, 200)*dt*1.4 + Math.sin(h.t*2.2)*24*dt;
    h.vx -= h.vx*1.6*dt; h.vy -= h.vy*1.8*dt;
    h.x = clamp(h.x + h.vx*dt, 80, WORLD_W-80);
    h.y = clamp(h.y + h.vy*dt, 160, GROUND_Y-260);
    if (h.hp < 220 && Math.random() < dt*6)
      smokes.push({x:h.x+rand(-12,12), y:h.y-8, r:rand(5,10), vr:rand(14,24), vy:rand(-55,-25), life:rand(0.4,0.8), c:'rgba(88,80,92,'});
    h.fireCd -= dt;
    if (h.fireCd <= 0 && Math.abs(h.x-P.x) < VW*0.7) {
      h.fireCd = rand(2.2, 3.4);
      const a = Math.atan2(P.y - h.y, P.x - h.x);
      rockets.push({ x: h.x, y: h.y+14, vx: Math.cos(a)*560, vy: Math.sin(a)*560, life: 3, t:0 });
      noiseBurst(0.2, 800, 0.1, 'bandpass');
    }
  }
  // same deal as supes — multiple helis targeting the same side of the player collapse onto
  // the same spot otherwise, since "want" doesn't account for other helis already there
  for (let i=0;i<helis.length;i++) {
    const h1 = helis[i]; if (h1.dead || h1.falling) continue;
    for (let j=i+1;j<helis.length;j++) {
      const h2 = helis[j]; if (h2.dead || h2.falling) continue;
      const ddx=h2.x-h1.x, ddy=h2.y-h1.y, dd=Math.hypot(ddx,ddy)||1, minD=160;
      if (dd < minD) {
        const push=(minD-dd)*3, nxp=ddx/dd, nyp=ddy/dd;
        h1.x -= nxp*push*dt; h1.y -= nyp*push*dt;
        h2.x += nxp*push*dt; h2.y += nyp*push*dt;
      }
    }
  }
  // helicopters and flying supes share the same airspace with no awareness of each other either
  // — same fix, applied across the two types so they don't stack the same way
  for (const h of helis) {
    if (h.dead || h.falling) continue;
    for (const s of supes) {
      if (s.hp <= 0) continue;
      const ddx=s.x-h.x, ddy=s.y-h.y, dd=Math.hypot(ddx,ddy)||1, minD=140;
      if (dd < minD) {
        const push=(minD-dd)*3, nxp=ddx/dd, nyp=ddy/dd;
        h.x -= nxp*push*dt; h.y -= nyp*push*dt;
        s.x += nxp*push*dt; s.y += nyp*push*dt;
      }
    }
  }
  helis = helis.filter(h => !h.gone);

  // ── commercial jets (high-altitude scenery — plow into them or laser them down) ──
  for (const j of jets) {
    if (j.dead) continue;
    j.t += dt;
    j.x += j.vx*dt;
    if (Math.random() < dt*8) smokes.push({ x: j.x - Math.sign(j.vx)*46*JET_SCALE, y: j.y+4, r: rand(10,20),
      vr: rand(8,16), vy: rand(-6,6), life: rand(1.4,2.4), c: 'rgba(225,228,232,' });
    if (j.hp < 200 && Math.random() < dt*7)
      smokes.push({ x: j.x+rand(-24,24), y: j.y-4, r: rand(6,12), vr: rand(14,26), vy: rand(-40,-15), life: rand(0.5,1.0), c: 'rgba(70,62,70,' });
    if (dist2(P.x,P.y,j.x,j.y) < (80*JET_SCALE)*(80*JET_SCALE)) jetDeath(j);
  }
  jets = jets.filter(j => !j.dead && Math.abs(j.x-P.x) < VW*3);

  // ── broken hydrants: a lingering water geyser instead of an instant one-off splash ──
  for (const p of streetProps) if (p.type === 'hydrant' && p.geyserT > 0) {
    p.geyserT -= dt;
    if (Math.random() < dt*30) sparks.push({ x: p.x+rand(-4,4), y: GROUND_Y-8, vx: rand(-30,30), vy: -rand(160,320),
      life: rand(0.3,0.6), c: Math.random()<0.5 ? '#bfe2f2' : '#e8f6fc' });
    if (p.geyserT <= 0) p.dead = true;
  }
  // ── dock containers: gravity-settle onto the stack (or dock) below, crush on landing ──
  // this used to re-scan every OTHER container to find a rest height on every single container,
  // every single frame, unconditionally — an O(n^2) check that ran at full cost even for
  // containers that had been sitting still the entire game. that's the real source of the
  // dock-area frame stutter now that stacks are this dense. `settled` skips the scan entirely
  // once a container is actually at rest, and only gets cleared when something could plausibly
  // have changed underneath it (a laser shove, or whatever it was resting on getting destroyed —
  // see containerBoom).
  for (const ct of containers) {
    if (ct.dead) continue;
    if (ct.vx) {
      ct.x += ct.vx*dt; ct.vx -= ct.vx*3*dt;
      ct.x = clamp(ct.x, CITY_W + 20, WATER_X - ct.w - 20);
    }
    if (ct.settled) continue;
    // restY tracks the nearest support below, but that support might itself still be mid-fall
    // (e.g. the container directly under it was just destroyed) — if we lock `settled` onto a
    // support that hasn't finished sinking yet, this container freezes hovering right above the
    // gap and never re-checks, since `settled` short-circuits the whole loop above. only allow
    // settling once the thing we're actually resting on (or the ground, which never moves) is stable.
    let restY = GROUND_Y - ct.h, restStable = true;
    for (const o of containers) {
      if (o === ct || o.dead) continue;
      if (Math.abs(o.x - ct.x) < ct.w*0.7 && o.y > ct.y) {
        const cand = o.y - ct.h;
        if (cand < restY) { restY = cand; restStable = o.settled; }
      }
    }
    if (ct.y < restY - 0.5) {
      ct.vy += 1500*dt;
      ct.y += ct.vy*dt;
      if (ct.y >= restY) {
        ct.y = restY; ct.vy = 0;
        if (restStable) {
          thump(80, 0.2, 0.2); shake(4);
          for (const c of civs) if (!c.dead && !c.swim && c.x > ct.x-8 && c.x < ct.x+ct.w+8 && Math.abs(c.y - (ct.y+ct.h)) < 30) { c.dead=true; gibBurst(c.x,c.y-14,1.2); addKill(); }
          for (const g of grunts) if (!g.dead && !g.air && !g.boatG && g.x > ct.x-8 && g.x < ct.x+ct.w+8 && Math.abs(g.y - (ct.y+ct.h)) < 30) { g.dead=true; gibBurst(g.x,g.y-16,1.2); addKill(); }
          ct.settled = true;
        }
      }
    } else if (ct.y > restY + 0.5) {
      // ended up embedded in whatever it should be resting on — e.g. a laser shove landed it
      // sideways on top of a taller neighboring stack, so its rest height just got higher. gravity
      // should never leave something floating OR sunk into its own support; pop it up onto the
      // surface instead of leaving it visibly clipped, which is what "not following normal
      // gravity physics" actually was
      ct.y = restY; ct.vy = 0;
      if (restStable) ct.settled = true;
    } else if (restStable) {
      ct.settled = true;
    }
  }

  // ── A-Train (ground/rooftop speedster boss) ──
  for (const a of atrains) {
    if (a.dead) continue;
    a.blurT += dt;
    const d = Math.hypot(P.x-a.x, P.y-a.y) || 1;

    if (a.fleeing) {
      // held on him with the laser too long — full override, sprint hard off-screen and stay away
      const away = a.x < P.x ? -1 : 1;
      a.x = clamp(a.x + away*2600*dt, 40, WORLD_W-40);
      a.facing = away;
      if (Math.abs(a.x-P.x) > VW*1.15) { a.fleeing = false; a.state = 'run'; a.stateT = rand(0.6,1.1); a.wanderX = a.x; }
    } else if (a.state === 'charge') {
      a.stateT -= dt;
      a.x += a.chargeVx*dt;
      if (dist2(a.x,a.y,P.x,P.y) < 46*46) {
        P.grounded = false; P.hopping = false;   // un-ground him so the knockback actually sends him flying
        P.vx += a.chargeVx>0?520:-520; P.vy -= 160;
        P.hurtFlash = 1; P.stunT = Math.max(P.stunT, 1); shake(16); thump(70,0.25,0.3); sfxHit();
        a.state = 'skid'; a.stateT = rand(0.5,0.8);
      } else if (a.stateT <= 0 || a.x < 40 || a.x > WORLD_W-40) {
        a.state = 'skid'; a.stateT = rand(0.5,0.8);
      }
    } else if (a.state === 'wind') {
      a.stateT -= dt;
      if (a.stateT <= 0) {
        if (a.windTarget === 'throw') {
          const tx = P.x + P.vx*0.3, ty = P.y + P.vy*0.3;   // lead the throw a little
          const tdist = Math.max(120, Math.hypot(tx-a.x, ty-a.y));
          const air = clamp(tdist/900, 0.55, 1.15);          // further throws arc higher and longer
          atrainDebris.push({ x: a.x, y: a.y-20,
            vx: (tx-a.x)/air, vy: -rand(520,620)*air, life: 2.2 });
          for (let i=0;i<6;i++) debris.push({ x: a.x+rand(-10,10), y: GROUND_Y-4, vx: rand(-60,60), vy: -rand(40,120), rot: rand(0,7), vr: rand(-6,6), r: rand(2,5), c: '#2e2638', life: rand(0.4,0.8) });
          sfxCrack();
          a.state = 'skid'; a.stateT = rand(0.4,0.6);
        } else {
          a.chargeVx = (P.x > a.x ? 1 : -1) * 2000;
          a.state = 'charge'; a.stateT = 0.35;
        }
      }
    } else if (a.state === 'skid') {
      a.stateT -= dt;
      if (a.stateT <= 0) { a.state = 'run'; a.stateT = rand(0.6,1.2); }
    } else if (a.state === 'stumble') {
      // no evasion, no charge — just stumbling to a stop, a clean window to actually hit him
      a.stateT -= dt;
      a.x += a.facing * 260 * dt * clamp(a.stateT/0.5, 0, 1);
      if (a.stateT <= 0) { a.state = 'run'; a.stateT = rand(0.5,0.9); }
    } else if (a.state === 'climb') {
      // locked to the pylon's x, working his way up or down it — a beat where he's committed
      // and predictable instead of just popping between ground level and the track
      a.climbT += dt;
      const cp = clamp(a.climbT / a.climbDur, 0, 1);
      a.x = a.climbX;
      a.y = a.climbY0 + (a.climbY1 - a.climbY0) * cp;
      if (Math.random() < dt*24) sparks.push({ x: a.x+rand(-6,6), y: a.y, vx: rand(-25,25), vy: rand(10,40), life: rand(0.15,0.3), c: '#7d7488' });
      if (cp >= 1) {
        a.mode = a.climbTarget; a.buildingIdx = -1;
        a.state = 'run'; a.stateT = rand(0.4,0.8);
      }
      a.x = clamp(a.x, 40, WORLD_W-40);
    } else { // 'run'
      a.stateT -= dt;
      a.fleeCd -= dt;
      // evasion: reacts to the laser only when it's actually aimed near him (same beam-proximity
      // projection Starlight's juke uses), not just "is the player somewhere nearby holding click"
      // — a flat radius meant he was flinching on every frame the player fired at all, anywhere
      // near him, which read as twitchy rather than reactive. fleeCd is also much longer now, so a
      // dart-away commits to a real sprint instead of re-picking a new target every 0.3s.
      let laserThreat = false;
      if (firing && P.beamEndX !== undefined) {
        const bex = P.x + P.facing*6, bey = P.y - 24;
        const bux = P.beamEndX - bex, buy = P.beamEndY - bey;
        const blen = Math.hypot(bux,buy) || 1;
        const nux = bux/blen, nuy = buy/blen;
        const toAx = a.x-bex, toAy = a.y-bey;
        const proj = toAx*nux + toAy*nuy;
        if (proj > 0 && proj < blen+50) {
          const perpX = toAx - nux*proj, perpY = toAy - nuy*proj;
          if (Math.hypot(perpX,perpY) < 110) laserThreat = true;
        }
      }
      const threatened = (P.dashT > 0 && dist2(P.x,P.y,a.x,a.y) < 320*320) || laserThreat;
      if (threatened && a.fleeCd <= 0) {
        a.wanderX = clamp(a.x + (a.x < P.x ? -1 : 1) * rand(800,1500), 60, WORLD_W-60);
        a.stateT = rand(0.9,1.5); a.fleeCd = 1.1;
      } else if (a.stateT <= 0) {
        // long, fast sweeps that carry him well past the edges of the screen and back — both the
        // distance and how long he commits to one sprint before re-picking a target are up a bit,
        // so a single burst genuinely covers more ground instead of re-targeting as often
        a.wanderX = clamp(P.x + (Math.random()<0.5?-1:1)*rand(700,1600), 60, WORLD_W-60);
        a.stateT = rand(0.8,1.6);
      }
      const vx = clamp((a.wanderX - a.x)*6, threatened ? -3400 : -2700, threatened ? 3400 : 2700);
      a.x += vx*dt;
      a.facing = vx >= 0 ? 1 : -1;
      a.atkCd -= dt;
      // only charge when he's actually near the player's altitude — no more wasted charges
      // while you're safely flying well above the streets/rooftops
      if (a.atkCd <= 0 && d < 480 && Math.abs(P.y - a.y) < 170) {
        a.state = 'wind'; a.stateT = 0.3; a.atkCd = rand(1.8,2.8); a.windTarget = 'charge';
      } else if (a.atkCd <= 0 && d < 1300 && P.y < a.y - 170) {
        // he never flies and his charge is horizontal-only, so a player who just sits above him
        // used to get zero engagement — same telegraphed wind-up as the charge, but it resolves
        // into ripping up a chunk of the street and hurling it in an arc instead, so staying
        // airborne isn't a free pass anymore
        a.state = 'wind'; a.stateT = 0.3; a.atkCd = rand(2.2,3.2); a.windTarget = 'throw';
      }
      // running at full speed through a building he himself just leveled trips him — a fair, earned
      // opening that punishes running a straight line through the wreckage you two have made together
      a.stumbleCd -= dt;
      if (a.mode === 'ground' && a.stumbleCd <= 0 && Math.abs(vx) > 900) {
        const idx = findBuildingIndexAt(a.x);
        if (idx >= 0 && fgBuildings[idx].collapsed && idx !== a.lastRubbleIdx) {
          a.state = 'stumble'; a.stateT = rand(0.45, 0.65); a.stumbleCd = rand(2.5, 4);
          a.lastRubbleIdx = idx;
          for (let i=0;i<8;i++) debris.push({ x: a.x+rand(-16,16), y: GROUND_Y-4, vx: rand(-120,120),
            vy: -rand(60,180), rot: rand(0,7), vr: rand(-6,6), r: rand(3,7), c: '#2e2638', life: rand(0.5,1) });
          shake(6); sfxCrack();
        }
      }
      a.roofCd -= dt;
      if (a.roofCd <= 0) {
        a.roofCd = rand(0.4, 0.9);   // checks in nearly twice as often — more restless, less content to sit on one surface
        // bias ground/rooftop/rail choice toward whichever surface is closer to the player's height —
        // he's trying to get to your altitude, not just coin-flipping — but generally favors rooftops.
        // the elevated rail only exists over the city, so it's only ever an option there.
        const railDist = Math.abs(P.y - RAIL_Y);
        const railInPlay = a.x < CITY_W - 100;
        if (a.mode === 'ground') {
          const idx = findBuildingIndexAt(a.x);
          const roofDist = idx >= 0 ? Math.abs(P.y - fgBuildings[idx].roofY) : Infinity, groundDist = Math.abs(P.y - GROUND_Y);
          if (railInPlay && railDist < roofDist && railDist < groundDist && Math.random() < 0.8) {
            startRailClimb(a, 'rail');   // up the nearest support pylon rather than teleporting onto the deck
          } else if (idx >= 0 && Math.random() < (roofDist < groundDist ? 0.95 : 0.75)) { a.mode = 'roof'; a.buildingIdx = idx; }
        } else if (a.mode === 'roof') {
          const b = fgBuildings[a.buildingIdx];
          const roofDist = b ? Math.abs(P.y - b.roofY) : Infinity, groundDist = Math.abs(P.y - GROUND_Y);
          if (railInPlay && railDist < roofDist && railDist < groundDist && Math.random() < 0.65) {
            a.mode = 'rail';   // hopping down from a rooftop onto the deck — still a leap, not a pole climb
          } else if (Math.random() < (groundDist < roofDist ? 0.55 : 0.2)) { a.mode = 'ground'; a.buildingIdx = -1; }
        } else { // 'rail'
          const groundDist = Math.abs(P.y - GROUND_Y);
          if (!railInPlay || (railDist > groundDist && Math.random() < 0.65)) { startRailClimb(a, 'ground'); }
        }
      }
    }

    if (!a.hitFlag) a.laserHitT = 0;   // only counts consecutive frames actually under the beam
    a.hitFlag = false;

    // keep a rooftop-attached A-Train on a valid building — hop to the next one (if the gap's
    // jumpable) or drop off and run down the side otherwise
    if (a.mode === 'roof') {
      const b = fgBuildings[a.buildingIdx];
      if (!b || b.collapsed || b.collapsing || a.x < b.x-10 || a.x > b.x+b.w+10) {
        const exitedRight = !b || a.x > b.x+b.w;
        const searchIdx = a.buildingIdx + (exitedRight ? 1 : -1);
        const nb = fgBuildings[searchIdx];
        let hopped = false;
        if (b && nb && !nb.collapsed && !nb.collapsing) {
          const gap = exitedRight ? nb.x - (b.x+b.w) : (b.x - (nb.x+nb.w));
          if (gap < 260) { a.buildingIdx = searchIdx; a.x = exitedRight ? nb.x+12 : nb.x+nb.w-12; hopped = true; }
        }
        if (!hopped) a.mode = 'ground';
      }
    }
    if (a.state !== 'climb') {   // climbing manages its own x/y locked to the pylon, above
      const targetY = (a.mode === 'roof' && fgBuildings[a.buildingIdx]) ? fgBuildings[a.buildingIdx].roofY - 4
                    : a.mode === 'rail' ? RAIL_Y - 4
                    : GROUND_Y - 4;
      a.y += clamp(targetY - a.y, -2600*dt, 2600*dt);   // fast wall-run transition, not a teleport
      a.x = clamp(a.x, 40, a.mode === 'rail' ? CITY_W - 60 : WORLD_W-40);   // the rail ends at the dock
      // speedsters run on water — spray a wake behind him when he's sprinting the surface
      if (a.x > WATER_X && a.y > GROUND_Y - 30 && Math.random() < dt*24)
        sparks.push({ x: a.x - a.facing*rand(4,22), y: GROUND_Y+1, vx: -a.facing*rand(30,100),
          vy: -rand(40,120), life: rand(0.2,0.4), c: '#cfe9f5' });
    }
  }
  atrains = atrains.filter(a => !a.dead);

  // ── Queen Maeve (ground/rooftop grappler boss) ──
  for (const a of maeves) {
    if (a.dead) continue;
    if (!a.hitFlag) a.laserHitT = 0;   // only counts consecutive frames actually under the beam
    a.hitFlag = false;

    // sniped from out past the shallows she can wade into — she can't ever close that gap, so
    // rather than just standing at the waterline eating free damage forever she gives up and
    // retreats into the city, off-screen, instead of being a stationary punching bag
    if (firing && P.x > WATER_X + 260 + 300 && !a.fleeing) { a.fleeing = true; a.fleeT = 3; }
    if (a.fleeing) {
      a.x -= 2200*dt; a.facing = -1; a.fleeT -= dt;
      // same fix as Deep's mirrored retreat below: this triggers from the player being far out in
      // the water already, so an off-screen distance check was true instantly and cancelled the
      // flee before she moved
      if (a.fleeT <= 0 || P.x < WATER_X - 100) {
        a.fleeing = false; a.state = 'run'; a.stateT = rand(0.6,1.1); a.wanderX = a.x;
      }
      a.x = clamp(a.x, 40, WATER_X + 260);
      a.y += clamp(GROUND_Y - 4 - a.y, -2600*dt, 2600*dt);
      continue;
    }

    if (a.state === 'jump') {
      // a lunge at the (led) target with mild in-flight tracking — she can't fly, so the trade for
      // her much longer reach is that she keeps steering toward you a little instead of committing
      // to one fixed line like a shorter, close-range hop would
      a.stateT -= dt;
      const tdx = P.x-a.x, tdy = P.y-a.y, tdd = Math.hypot(tdx,tdy) || 1;
      const desVx = (tdx/tdd)*1400, desVy = (tdy/tdd)*1400;
      const turn = Math.min(1, dt*2.0);   // strong enough correction to reliably connect, still reads as a pounce not a homing missile
      a.jumpVx += (desVx - a.jumpVx)*turn; a.jumpVy += (desVy - a.jumpVy)*turn;
      a.x += a.jumpVx*dt; a.y += a.jumpVy*dt;
      a.facing = a.jumpVx >= 0 ? 1 : -1;
      if (dist2(a.x,a.y,P.x,P.y) < 80*80) {
        // connects — sends Homelander flying back harder than a regular supe hit, no stun. floored,
        // not just zero-guarded — see the note on Maeve's brace-bounce
        const kd = Math.max(Math.hypot(P.x-a.x, P.y-a.y), 20);
        P.grounded = false; P.hopping = false;   // un-ground him so the knockback actually sends him flying
        P.knockT = 0.5;                          // exempt from the normal max-speed clamp for a moment
        P.vx += (P.x-a.x)/kd * 3900; P.vy += (P.y-a.y)/kd * 3900;
        P.hurtFlash = 1; shake(20); sfxHit(); thump(65,0.3,0.35);
        a.state = 'skid'; a.stateT = rand(0.6,0.9);
      } else if (a.stateT <= 0) {
        a.state = 'skid'; a.stateT = rand(0.4,0.7);
      }
      a.x = clamp(a.x, 40, WATER_X + 260);   // can't swim, but she'll wade into the shallows to stay a threat
      a.y = clamp(a.y, 80, GROUND_Y-20);
      continue;   // under her own lunge velocity — skip the surface-tracking pull below
    }

    if (a.state === 'dodge') {
      // an actual evasive read instead of just tanking it or standing still — a jump biased toward
      // the nearest building wall and off it, arcing up and away rather than a straight vertical hop
      a.stateT -= dt;
      a.x += a.dodgeVx*dt; a.y += a.dodgeVy*dt; a.dodgeVy += 1100*dt;
      a.facing = a.dodgeVx >= 0 ? 1 : -1;
      if (Math.random()<dt*30) sparks.push({x:a.x,y:a.y,vx:rand(-60,60),vy:rand(-40,40),life:rand(0.15,0.3),c:'#e0e8ff'});
      if (a.y >= GROUND_Y - 4 || a.stateT <= 0) {
        a.y = Math.min(a.y, GROUND_Y - 4);
        a.state = 'run'; a.stateT = rand(0.5,0.9); a.wanderX = a.x;
      }
      a.x = clamp(a.x, 40, WATER_X + 260);
      continue;   // under her own dodge velocity — skip the surface-tracking pull below
    }

    if (a.state === 'railjump') {
      // locked to the pylon's x, arcing up (or down) to the rail deck — a leap, not a climb
      a.climbT += dt;
      const cp = clamp(a.climbT / a.climbDur, 0, 1);
      a.x = a.climbX;
      a.y = a.climbY0 + (a.climbY1 - a.climbY0) * cp - Math.sin(cp*Math.PI) * 50;
      if (Math.random() < dt*20) sparks.push({ x: a.x+rand(-8,8), y: a.y, vx: rand(-40,40), vy: rand(10,40), life: rand(0.15,0.3), c: '#e0e8ff' });
      if (cp >= 1) {
        a.mode = a.climbTarget; a.buildingIdx = -1;
        a.state = 'run'; a.stateT = rand(0.4,0.8);
      }
      a.x = clamp(a.x, 40, CITY_W - 60);
    } else if (a.state === 'crouch') {
      a.stateT -= dt;
      if (a.stateT <= 0) {
        // lead the lunge toward where you're actually headed, not just where you are right now
        const leadT = 0.35;
        const tx = P.x + P.vx*leadT, ty = P.y + P.vy*leadT;
        const dx = tx-a.x, dy = ty-a.y, dd = Math.hypot(dx,dy) || 1;
        a.jumpVx = (dx/dd)*1400; a.jumpVy = (dy/dd)*1400 - 260;   // launches a bit higher than the direct line — reads as an actual leap, then the in-flight correction pulls her back down onto target
        a.state = 'jump'; a.stateT = 0.7;   // a touch longer to give the arc time to come back down onto target
      }
    } else if (a.state === 'skid') {
      a.stateT -= dt;
      if (a.stateT <= 0) { a.state = 'run'; a.stateT = rand(0.6,1.2); }
    } else if (a.state === 'brace') {
      // she just shrugs off whatever you throw at her — telegraphed windup first (still vulnerable,
      // still worth dashing in on), then a stretch where she's untouchable and just walks you down
      a.stateT -= dt;
      if (a.braceTele > 0) { a.braceTele -= dt; }
      else {
        const vx = clamp(P.x - a.x, -1, 1) * 210;
        a.x += vx*dt;
        a.facing = vx >= 0 ? 1 : -1;
      }
      a.x = clamp(a.x, 40, WATER_X + 260);
      if (a.stateT <= 0) { a.state = 'run'; a.stateT = rand(0.5,0.9); }
    } else { // 'run'
      a.stateT -= dt;
      if (a.stateT <= 0) { a.wanderX = clamp(P.x + rand(-220,220), 60, WORLD_W-60); a.stateT = rand(0.5,1.1); }
      // weaves in on an S-curve instead of beelining straight for the target, and every couple
      // seconds kicks off a hard sideways reposition — reads as actively repositioning, not
      // just walking a straight line at you
      a.weaveCd -= dt;
      if (a.weaveCd <= 0) {
        a.weaveCd = rand(1.4, 2.4);
        a.wanderX = clamp(a.x + (Math.random()<0.5?-1:1)*rand(260,460), 40, WATER_X+260);
      }
      const weave = Math.sin(gameT*3.4 + a.weavePhase) * 190;
      const vx = clamp((a.wanderX + weave - a.x)*2.6, -820, 820);
      a.x += vx*dt;
      a.facing = vx >= 0 ? 1 : -1;
      a.atkCd -= dt;
      const vertGap = a.y - P.y;   // positive when the player is above her — that's when she jumps
      // much more reach than a flying supe's lunge needs — she has to close a real gap from the ground;
      // a small negative gap is still fair game so a shallow dip at the shoreline doesn't wave her off
      if (a.atkCd <= 0 && Math.abs(P.x-a.x) < 460 && vertGap > -220 && vertGap < 900) {
        a.state = 'crouch'; a.stateT = 0.3; a.atkCd = rand(2.6,3.8);
      }
      a.braceCd -= dt;
      if (a.braceCd <= 0 && Math.abs(P.x-a.x) < 900) {
        a.state = 'brace'; a.stateT = 1.3; a.braceTele = 0.35; a.braceCd = rand(5.5, 7.5);
      }
      // evasive dodge: a real threat read (laser actually aimed near her, same beam-proximity
      // projection A-Train's evasion uses, or a dash closing in), checked after brace so the two
      // reactions never both try to trigger off the same frame — dodge wins if both would fire
      a.dodgeCd -= dt;
      if (a.dodgeCd <= 0 && a.state === 'run') {
        let laserThreat2 = (P.dashT > 0 && dist2(P.x,P.y,a.x,a.y) < 340*340);
        if (!laserThreat2 && firing && P.beamEndX !== undefined) {
          const bex = P.x + P.facing*6, bey = P.y - 24;
          const bux = P.beamEndX - bex, buy = P.beamEndY - bey;
          const blen = Math.hypot(bux,buy) || 1;
          const nux = bux/blen, nuy = buy/blen;
          const toAx = a.x-bex, toAy = (a.y-16)-bey;
          const proj = toAx*nux + toAy*nuy;
          if (proj > 0 && proj < blen+50) {
            const perpX = toAx - nux*proj, perpY = toAy - nuy*proj;
            if (Math.hypot(perpX,perpY) < 110) laserThreat2 = true;
          }
        }
        if (laserThreat2) {
          const cands = fgBuildings.filter(b => !b.collapsed && !b.collapsing && Math.abs((b.x+b.w/2)-a.x) < 340);
          let wallDir = Math.random()<0.5 ? -1 : 1;
          if (cands.length) { const b = cands[randi(0,cands.length-1)]; wallDir = Math.sign((b.x+b.w/2) - a.x) || 1; }
          a.dodgeVx = wallDir*rand(500,700); a.dodgeVy = -rand(680,820);
          a.state = 'dodge'; a.stateT = 0.7; a.dodgeCd = rand(3, 4.5);
        }
      }
      a.roofCd -= dt;
      if (a.roofCd <= 0) {
        a.roofCd = rand(1.2, 2.4);
        const railDist = Math.abs(P.y - RAIL_Y), railInPlay = a.x < CITY_W - 100;
        if (a.mode === 'ground') {
          const idx = findBuildingIndexAt(a.x);
          const roofDist = idx >= 0 ? Math.abs(P.y - fgBuildings[idx].roofY) : Infinity, groundDist = Math.abs(P.y - GROUND_Y);
          if (railInPlay && railDist < roofDist && railDist < groundDist && Math.random() < 0.55) {
            startMaeveRailJump(a, 'rail');
          } else if (idx >= 0 && Math.random() < (roofDist < groundDist ? 0.85 : 0.3)) { a.mode = 'roof'; a.buildingIdx = idx; }
        } else if (a.mode === 'roof') {
          const b = fgBuildings[a.buildingIdx];
          const roofDist = b ? Math.abs(P.y - b.roofY) : Infinity, groundDist = Math.abs(P.y - GROUND_Y);
          if (railInPlay && railDist < roofDist && railDist < groundDist && Math.random() < 0.45) {
            startMaeveRailJump(a, 'rail');
          } else if (Math.random() < (groundDist < roofDist ? 0.6 : 0.2)) { a.mode = 'ground'; a.buildingIdx = -1; }
        } else { // 'rail'
          const groundDist = Math.abs(P.y - GROUND_Y);
          if (!railInPlay || (railDist > groundDist && Math.random() < 0.55)) { startMaeveRailJump(a, 'ground'); }
        }
      }
    }

    if (a.mode === 'roof') {
      const b = fgBuildings[a.buildingIdx];
      if (!b || b.collapsed || b.collapsing || a.x < b.x-10 || a.x > b.x+b.w+10) {
        const exitedRight = !b || a.x > b.x+b.w;
        const searchIdx = a.buildingIdx + (exitedRight ? 1 : -1);
        const nb = fgBuildings[searchIdx];
        let hopped = false;
        if (b && nb && !nb.collapsed && !nb.collapsing) {
          const gap = exitedRight ? nb.x - (b.x+b.w) : (b.x - (nb.x+nb.w));
          if (gap < 260) { a.buildingIdx = searchIdx; a.x = exitedRight ? nb.x+12 : nb.x+nb.w-12; hopped = true; }
        }
        if (!hopped) a.mode = 'ground';
      }
    }
    if (a.state !== 'railjump') {   // railjump manages its own x/y locked to the pylon, above
      const targetY = (a.mode === 'roof' && fgBuildings[a.buildingIdx]) ? fgBuildings[a.buildingIdx].roofY - 4
                     : a.mode === 'rail' ? RAIL_Y - 4
                     : GROUND_Y - 4;
      a.y += clamp(targetY - a.y, -2600*dt, 2600*dt);
      a.x = clamp(a.x, 40, a.mode === 'rail' ? CITY_W - 60 : WATER_X + 260);   // can't swim, but she'll wade into the shallows to stay a threat
    }
  }
  maeves = maeves.filter(a => !a.dead);

  // ── The Deep (water boss) ──
  for (const dp of deeps) {
    if (dp.dead) continue;
    dp.atkCd -= dt;

    // sniped from deep in the city, well past even the dock he can chase you across — he can't
    // ever close that gap, so he retreats into open water rather than sitting there taking it
    if (firing && P.x < CITY_W - 250 && !dp.fleeing) { dp.fleeing = true; dp.fleeT = 3; }
    if (dp.fleeing) {
      dp.x += 1900*dt; dp.facing = 1; dp.fleeT -= dt;
      // this triggers from a snipe deep in the city, so the gap to the player is already huge from
      // frame one — an off-screen distance check here was satisfied instantly, cancelling the flee
      // before he moved at all and dropping him right back into 'lurk', which chases toward the
      // player and pulled him straight back toward the dock. the fleeT timer alone is enough to
      // bound how long the retreat lasts.
      if (dp.fleeT <= 0 || P.x > WATER_X + 100) {
        dp.fleeing = false; dp.state = 'lurk';
      }
      dp.y += ((GROUND_Y + 55) - dp.y) * Math.min(1, dt*4);
      dp.x = clamp(dp.x, WATER_X + 60, WORLD_W - 60);
      continue;
    }

    if (dp.state === 'lurk') {
      // he doesn't live on the dock — if an attack left him beached there, he scrambles straight
      // back into the water instead of cruising around on land looking for you
      const beached = dp.x <= WATER_X;
      // weaves toward you on an S-curve and every couple seconds retargets the offset a little,
      // instead of just closing the gap on a straight line
      let chaseX = beached ? WATER_X + 120 : P.x;
      if (!beached) {
        chaseX += Math.sin(gameT*2.4 + dp.weavePhase) * 170;
        dp.weaveCd -= dt;
        if (dp.weaveCd <= 0) {
          dp.weaveCd = rand(2.2, 3.4);
          dp.weaveOffset = (Math.random()<0.5?-1:1)*rand(70,150);
        }
        chaseX += dp.weaveOffset;
      }
      // a fixed-speed step that runs at full speed right up until it hits the target and stops
      // dead reads as a snap/teleport, even though it's technically continuous — switched to the
      // same proportional "faster when far, decelerating as it arrives" approach Maeve's chase
      // already uses, so closing distance actually looks like swimming, not a dash-and-halt.
      // also noticeably quicker than before (430/s) — he used to read as absent even once you
      // were right in his water
      const chaseVx = clamp((chaseX - dp.x) * (beached ? 4 : 2.6), beached ? -1300 : -780, beached ? 1300 : 780);
      dp.x += chaseVx*dt;
      const depthY = beached ? GROUND_Y - 4 : GROUND_Y + 55 + Math.sin(gameT*1.7 + dp.weavePhase)*35;
      dp.y += (depthY - dp.y) * Math.min(1, dt*4);
      dp.facing = P.x >= dp.x ? 1 : -1;
      if (beached) continue;   // don't run the (water-only) attack triggers while he's still stranded
      if (P.underwaterT > 3 && inWater(P.x, P.y)) {
        dp.state = 'grabdash'; dp.stateT = 1.5;   // you stayed down too long — he's coming
      } else if (dp.atkCd <= 0 && P.x > WATER_X - 200 && P.y < WATER_FLOOR - 40 && Math.abs(P.x - dp.x) < 760) {
        // he reacts whether you're on the surface or shallowly submerged — only camping deep and
        // still is safe from these, and that's exactly what feeds the 3-second grab check above
        const r = Math.random();
        if (r < 0.45) { dp.state = 'crouch'; dp.stateT = 0.35; }
        else if (r < 0.72) { dp.state = 'volley'; dp.stateT = 0.3; }
        else { dp.state = 'dolphin'; dp.stateT = 0.35; dp.chargeDir = P.x >= dp.x ? 1 : -1; dp.dolphinHp = 220; }
        dp.atkCd = rand(1.7, 2.6);
      }
    } else if (dp.state === 'crouch') {
      dp.stateT -= dt;
      if (Math.random() < dt*30) bubbleAt(dp.x + rand(-20,20), GROUND_Y + rand(6,30));
      if (dp.stateT <= 0) {
        // breach lunge — same led-target pounce as Maeve's, launched out of the water
        const leadT = 0.35;
        const tx = P.x + P.vx*leadT, ty = P.y + P.vy*leadT;
        const dx = tx-dp.x, dy = ty-dp.y, dd = Math.hypot(dx,dy) || 1;
        dp.jumpVx = (dx/dd)*1400; dp.jumpVy = (dy/dd)*1400 - 220;
        dp.state = 'jump'; dp.stateT = 0.7;
        dp.dolphinHp = 220; dp.airFishCd = 0.2;   // riding the dolphin for the leap — shoot it out from under him
        splash(dp.x, 800);
      }
    } else if (dp.state === 'jump') {
      dp.stateT -= dt;
      const tdx = P.x-dp.x, tdy = P.y-dp.y, tdd = Math.hypot(tdx,tdy) || 1;
      const turn = Math.min(1, dt*2.0);
      dp.jumpVx += ((tdx/tdd)*1400 - dp.jumpVx)*turn; dp.jumpVy += ((tdy/tdd)*1400 - dp.jumpVy)*turn;
      dp.x += dp.jumpVx*dt; dp.y += dp.jumpVy*dt;
      dp.facing = dp.jumpVx >= 0 ? 1 : -1;
      // he can fling fish at you mid-leap too, not just from the water
      dp.airFishCd -= dt;
      if (dp.airFishCd <= 0) {
        dp.airFishCd = rand(0.3, 0.45);
        const a = Math.atan2(P.y-dp.y, P.x-dp.x);
        fishes.push({ x: dp.x, y: dp.y, vx: Math.cos(a)*760, vy: Math.sin(a)*760, life: 2, t: rand(0,9) });
      }
      if (dist2(dp.x,dp.y,P.x,P.y) < 75*75) {
        // connects — slightly less force than Maeve's hit, no stun. floored, not just zero-guarded
        const kd = Math.max(Math.hypot(P.x-dp.x, P.y-dp.y), 20);
        P.grounded = false; P.hopping = false; P.knockT = 0.5;
        P.vx += (P.x-dp.x)/kd * 3200; P.vy += (P.y-dp.y)/kd * 3200;
        P.hurtFlash = 1; shake(18); sfxHit(); thump(65,0.3,0.3);
        dp.state = 'fall'; dp.dolphinHp = 0;
      } else if (dp.stateT <= 0) { dp.state = 'fall'; dp.dolphinHp = 0; }
    } else if (dp.state === 'fall') {
      dp.jumpVy += 1500*dt;
      dp.x += dp.jumpVx*0.4*dt; dp.y += dp.jumpVy*dt;
      if (dp.y >= GROUND_Y + 30) {
        // a breach that carried him onto the dock lands as a wet slam on concrete, not a splash
        if (dp.x > WATER_X) splash(dp.x, 600);
        else { for (let i=0;i<8;i++) debris.push({ x: dp.x+rand(-16,16), y: GROUND_Y-2, vx: rand(-100,100), vy: -rand(40,140), rot: rand(0,7), vr: rand(-6,6), r: rand(3,6), c: '#3a333e', life: rand(0.5,0.9) }); shake(6); }
        dp.state = 'lurk'; dp.jumpVx = 0; dp.jumpVy = 0;
      }
    } else if (dp.state === 'grabdash') {
      dp.stateT -= dt;
      const dx = P.x-dp.x, dy = P.y-dp.y, dd = Math.hypot(dx,dy) || 1;
      dp.x += (dx/dd)*1700*dt; dp.y += (dy/dd)*1700*dt;
      dp.facing = dx >= 0 ? 1 : -1;
      if (Math.random() < dt*20) bubbleAt(dp.x, dp.y);
      if (!inWater(P.x, P.y) || dp.stateT <= 0) dp.state = 'lurk';
      else if (dd < 55) { dp.state = 'carry'; P.carried = true; }
    } else if (dp.state === 'carry') {
      // hauls Homelander out of the water diagonally up-left, then hurls him
      dp.x -= 1050*dt; dp.y -= 1400*dt;
      P.x = dp.x + 14; P.y = dp.y - 6; P.vx = -1050; P.vy = -1400;
      P.stunT = Math.max(P.stunT, 0.2); P.dashT = 0; P.grounded = false;
      dp.facing = -1;
      if (dp.y < GROUND_Y && dp.y > GROUND_Y - 60) splash(dp.x, 700);
      if (dp.y <= GROUND_Y - 430) {
        P.carried = false; P.knockT = 0.6; P.stunT = 0.35;
        P.vx = -2400; P.vy = -450;
        P.hurtFlash = 1; shake(20); sfxHit(); thump(60,0.35,0.35);
        dp.state = 'fall'; dp.jumpVx = 300; dp.jumpVy = 200;
      }
    } else if (dp.state === 'volley') {
      dp.stateT -= dt;
      if (dp.stateT <= 0) {
        // a school of fish leaps out of the water in an arcing spread at you
        for (let k=0;k<8;k++) {
          const fx = clamp(dp.x + rand(-90,90), WATER_X+40, WORLD_W-40);
          const a = Math.atan2(P.y - GROUND_Y, P.x - fx);
          const sp = rand(680, 900);
          fishes.push({ x: fx, y: GROUND_Y+4, vx: Math.cos(a)*sp, vy: Math.sin(a)*sp - rand(120,260), life: 3, t: rand(0,9) });
          splash(fx, 150);
        }
        dp.state = 'lurk';
      }
    } else if (dp.state === 'dolphin') {
      dp.stateT -= dt;
      if (dp.stateT > 0) {
        dp.y += ((GROUND_Y - 4) - dp.y)*Math.min(1, dt*8);   // surfacing windup
      } else {
        dp.x += dp.chargeDir*1900*dt;
        dp.y = GROUND_Y - 10 + Math.sin(gameT*14)*4;
        dp.facing = dp.chargeDir;
        if (Math.random() < dt*30) sparks.push({ x: dp.x - dp.chargeDir*rand(10,30), y: GROUND_Y+2,
          vx: -dp.chargeDir*rand(30,110), vy: -rand(40,130), life: rand(0.2,0.45), c: '#cfe9f5' });
        if (dist2(dp.x, dp.y, P.x, P.y) < 62*62) {
          P.grounded = false; P.knockT = 0.45;
          P.vx += dp.chargeDir*2400; P.vy -= 350;
          P.hurtFlash = 1; shake(16); sfxHit(); thump(70,0.25,0.3);
          dp.state = 'lurk'; dp.dolphinHp = 0;
        } else if (dp.x < CITY_W || dp.x > WORLD_W - 90 || Math.abs(dp.x - P.x) > 1400) {
          dp.state = 'lurk'; dp.dolphinHp = 0;
        }
      }
    }
    // committed to an attack (breaching, charging, hauling you out) he'll cross onto the dock to
    // land it — he's just not going to wander up there on his own the way he patrols the water
    const attacking = dp.state === 'crouch' || dp.state === 'jump' || dp.state === 'fall' ||
                       dp.state === 'dolphin' || dp.state === 'grabdash' || dp.state === 'carry';
    // the dock is his zone too, same as the shallows are Maeve's — he'll cross all of it mid-attack
    dp.x = clamp(dp.x, attacking ? CITY_W : WATER_X + 60, WORLD_W - 60);
    dp.y = clamp(dp.y, 120, WATER_FLOOR - 40);
  }
  deeps = deeps.filter(d => !d.dead);

  // ── Lamplighter (flying fire boss) ──
  for (const l of lamplighters) {
    if (l.dead) continue;
    l.smokeT -= dt; l.flash -= dt;
    if (l.launchedT > 0) l.launchedT -= dt;
    const dx = P.x-l.x, dy = P.y-l.y, d = Math.hypot(dx,dy) || 1;

    if (l.breathing) {
      // close-range dragon-breath cone: holds roughly in place and channels toward the player,
      // chip-damaging fodder caught in the cone and periodically shoving/stunning the player —
      // throttled by breatheHitCd so continuous cone contact ticks at a fair rate instead of every
      // single frame (the same "once per swing, not once per frame" lesson as the dash-hit fix)
      l.breatheT -= dt; l.breatheHitCd -= dt;
      l.facing = dx >= 0 ? 1 : -1;
      const ang = Math.atan2(dy,dx);
      if (Math.random() < dt*70) {
        const spread = rand(-0.4,0.4), rr = rand(20,190);
        embers.push({ x: l.x+Math.cos(ang+spread)*rr, y: l.y+Math.sin(ang+spread)*rr,
          vx: Math.cos(ang+spread)*60, vy: Math.sin(ang+spread)*60-20, life: rand(0.2,0.4), r: rand(1.5,3.5) });
      }
      const halfAngle = 0.5, range = 320;   // a bit longer reach so he doesn't have to close all the way in to threaten
      for (const g of grunts) if (!g.dead) {
        const gdx=g.x-l.x, gdy=(g.y-16)-l.y, gd=Math.hypot(gdx,gdy);
        if (gd<range && Math.abs(angDiff(Math.atan2(gdy,gdx),ang))<halfAngle) { g.dead=true; gibBurst(g.x,g.y-16,1); addKill(); }
      }
      for (const c of civs) if (!c.dead) {
        const cdx=c.x-l.x, cdy=(c.y-14)-l.y, cd=Math.hypot(cdx,cdy);
        if (cd<range && Math.abs(angDiff(Math.atan2(cdy,cdx),ang))<halfAngle) { c.dead=true; gibBurst(c.x,c.y-14,1); addKill(); }
      }
      for (const car of cars) if (!car.dead) {
        const kdx=car.x-l.x, kdy=(car.y-10)-l.y, kd=Math.hypot(kdx,kdy);
        if (kd<range && Math.abs(angDiff(Math.atan2(kdy,kdx),ang))<halfAngle) carBoom(car);
      }
      if (d < range && l.breatheHitCd <= 0 && Math.abs(angDiff(Math.atan2(dy,dx),ang)) < halfAngle) {
        l.breatheHitCd = 0.35;
        P.hurtFlash = 1; P.stunT = Math.max(P.stunT, 0.4); shake(8); sfxHit();
        P.vx += (P.x-l.x)/d*500; P.vy += (P.y-l.y)/d*500 - 60;
      }
      if (l.breatheT <= 0 || d > 380) { l.breathing = false; l.breatheCd = rand(4,6); }
      continue;
    }

    if (l.dashing) {
      // same committed close-range shove Starlight's dash is, but leaves a trailing flame line
      l.dashT -= dt;
      l.x += l.dashVx*dt; l.y += l.dashVy*dt;
      l.facing = l.dashVx >= 0 ? 1 : -1;
      if (Math.random() < dt*90) embers.push({ x: l.x+rand(-6,6), y: l.y+rand(-6,6), vx: rand(-20,20), vy: rand(-40,-10), life: rand(0.3,0.55), r: rand(1.5,3) });
      if (d < 50) {
        const kd = Math.max(d, 20);   // floored — see the matching note on Maeve's brace-bounce
        P.knockT = Math.max(P.knockT, 0.4);
        P.vx += (P.x-l.x)/kd*1950; P.vy += (P.y-l.y)/kd*1950;
        P.hurtFlash = 1; shake(14); sfxHit(); thump(60,0.25,0.3);
        l.dashing = false; l.dashCd = rand(2.4,3.4);
      } else if (l.dashT <= 0) { l.dashing = false; l.dashCd = rand(2.4,3.4); }
      l.x = clamp(l.x, 60, WORLD_W-60); l.y = clamp(l.y, 120, GROUND_Y-200);
      continue;
    }

    // orbit-and-approach, same shape as Starlight — desired distance widened close to hers (was a
    // tight 280, which at the same tangential force orbits fast enough to cross directly over/under
    // the player often, flipping his facing constantly; a wider orbit has much lower angular speed
    // for the same push). he still closes in for the dash/breath, this is just the "circling" radius
    const desired = 400;   // a bit further out than before — more room to react to the beam before it's on him
    const closeF = (d - desired)/400;
    l.vx += (dx/d) * closeF * 700*dt; l.vy += (dy/d) * closeF * 700*dt;
    l.vx += (-dy/d) * l.orbitDir * 260*dt; l.vy += (dx/d) * l.orbitDir * 260*dt;
    l.vx -= l.vx*1.2*dt; l.vy -= l.vy*1.2*dt;
    const spL = Math.hypot(l.vx,l.vy), mxL = 710;   // a bit faster again
    if (spL > mxL) { l.vx *= mxL/spL; l.vy *= mxL/spL; }
    if (firing && P.beamEndX !== undefined) {
      // wider catch radius and a harder juke than Starlight's — he was reported gravitating into
      // the beam right alongside her instead of actually dodging it
      const bex = P.x + P.facing*6, bey = P.y - 24;
      const bux = P.beamEndX - bex, buy = P.beamEndY - bey;
      const blen = Math.hypot(bux,buy) || 1;
      const nux = bux/blen, nuy = buy/blen;
      const toLx = l.x-bex, toLy = l.y-bey;
      const proj = toLx*nux + toLy*nuy;
      if (proj > 0 && proj < blen+90) {
        const perpX = toLx - nux*proj, perpY = toLy - nuy*proj;
        const perpDist = Math.hypot(perpX,perpY) || 1;
        if (perpDist < 170) { l.vx += (perpX/perpDist)*1450*dt; l.vy += (perpY/perpDist)*1450*dt; }
      }
    }
    l.x = clamp(l.x + l.vx*dt, 60, WORLD_W-60);
    l.y = clamp(l.y + l.vy*dt, 120, GROUND_Y-200);
    l.facing = l.vx >= 0 ? 1 : -1;
    // ambient flame trail — reads as "on fire" even when he's just flying around, not only mid-dash
    if (Math.random() < dt*18) smokes.push({ x: l.x+rand(-8,8), y: l.y+rand(-8,8), r: rand(4,8), vr: rand(10,18), vy: rand(-30,-10), life: rand(0.3,0.55), c: 'rgba(120,60,20,' });
    if (Math.random() < dt*30) embers.push({ x: l.x+rand(-8,8), y: l.y+rand(-8,8), vx: rand(-15,15), vy: rand(-40,-10), life: rand(0.25,0.45), r: rand(1,2.2) });
    l.dashCd -= dt;
    if (l.dashCd <= 0 && d < 340) { l.dashing = true; l.dashT = 0.35; l.dashVx = (dx/d)*1500; l.dashVy = (dy/d)*1500; }
    l.breatheCd -= dt;
    if (l.breatheCd <= 0 && d < 320) { l.breathing = true; l.breatheT = rand(1,1.5); l.breatheHitCd = 0; l.breatheCd = rand(4,6); }
    l.atkCd -= dt;
    if (l.atkCd <= 0 && fireballLockout <= 0) {
      const a = Math.atan2(dy,dx);
      fireballs.push({ x: l.x, y: l.y, vx: Math.cos(a)*980, vy: Math.sin(a)*980, life: 2.4 });
      sfxDash();
      l.atkCd = rand(1.4, 2);
    }
  }
  lamplighters = lamplighters.filter(l => !l.dead);

  // ── The Deep's leaping fish ──
  for (const f of fishes) {
    f.t += dt; f.life -= dt;
    f.vy += 900*dt;
    f.x += f.vx*dt; f.y += f.vy*dt;
    if (dist2(f.x,f.y,P.x,P.y) < 22*22) {
      f.life = 0;
      const kd = Math.max(Math.hypot(P.x-f.x,P.y-f.y), 20);
      P.vx += (P.x-f.x)/kd*300; P.vy += (P.y-f.y)/kd*300;
      P.hurtFlash = 1; sfxHit();
    } else if (f.vy > 0 && f.y > GROUND_Y+4 && f.x > WATER_X) { splash(f.x, 80); f.life = 0; }
    else if (cellIntactAt(f.x, f.y) || f.y > GROUND_Y+8) f.life = 0;
  }
  fishes = fishes.filter(f => f.life > 0);

  // ── the docked ship: sink → wait → replacement sails in from the far right ──
  // a hull missing two of its three sections is severed, not standing — the last piece goes down with it
  if (shipPieces.filter(p => p.collapsed || p.collapsing).length >= 2) {
    for (const p of shipPieces) if (!p.collapsed && !p.collapsing) collapseBuilding(p);
  }
  if (shipRespawnT === 0 && !sailShip && shipPieces.every(p => p.collapsed)) shipRespawnT = 20;
  if (shipRespawnT > 0) {
    shipRespawnT -= dt;
    if (shipRespawnT <= 0) { sailShip = { x: WORLD_W + 700 }; shipRespawnT = -1; }
  }
  if (sailShip) {
    sailShip.x -= 290*dt;
    if (Math.random() < dt*10) sparks.push({ x: sailShip.x - 20, y: GROUND_Y+2,
      vx: rand(20,80), vy: -rand(20,70), life: rand(0.2,0.4), c: '#cfe9f5' });
    if (sailShip.x <= SHIP_X) {
      resetShip(); sailShip = null; shipRespawnT = 0; shipGraceT = 2.5;
      thump(50, 1.4, 0.45);   // horn as she locks into the berth
    }
  }

  // ── elevated trains ──
  trainTimer -= dt;
  if (trainTimer <= 0 && trains.length < 2) { spawnTrain(); trainTimer = rand(22, 38); }
  for (const t of trains) {
    t.x += t.dir * t.sp * dt; t.t += dt;
    for (let i=0;i<t.cars.length;i++) {
      const c = t.cars[i]; if (c.dead) continue;
      const cxw = trainCarX(t, i);
      // plowing into a car (flying or dashing) wrecks it
      if (dist2(P.x, P.y, cxw, RAIL_Y-CAR_CENTER_OFF) < (66*TRAIN_SCALE)*(66*TRAIN_SCALE)) trainCarDeath(t, i, cxw);
    }
  }
  trains = trains.filter(t => {
    if (!t.cars.some(c => !c.dead)) return false;
    const tail = t.x - t.dir*(t.cars.length-1)*CAR_SPACE;
    return t.dir > 0 ? tail < CITY_W + 300 : tail > -300;
  });

  // ── tanks (late-game armor escalation) ──
  if (kills > 500) {
    tankTimer -= dt;
    if (tankTimer <= 0 && tanks.length < 2) { spawnTank(); tankTimer = rand(20, 32); }
  }
  for (const tk of tanks) {
    if (tk.dead) continue;
    tk.t += dt; tk.fireCd -= dt; tk.muzzle -= dt;
    const dx = P.x - tk.x;
    if (Math.abs(dx) > 460) { tk.x += Math.sign(dx)*tk.sp*dt; tk.facing = Math.sign(dx) || 1; }
    tk.x = clamp(tk.x, 80, WATER_X - 120);
    // turret tracks you, slowly
    const want = Math.atan2(P.y - (tk.y-30*TANK_SCALE), P.x - tk.x);
    let da = want - tk.turA;
    while (da > Math.PI) da -= Math.PI*2; while (da < -Math.PI) da += Math.PI*2;
    tk.turA += clamp(da, -1.6*dt, 1.6*dt);
    if (tk.fireCd <= 0 && Math.abs(tk.x-P.x) < VW*0.75) {
      tk.fireCd = rand(3.2, 4.6); tk.muzzle = 0.08;
      shells.push({ x: tk.x + Math.cos(tk.turA)*44*TANK_SCALE, y: tk.y - 30*TANK_SCALE + Math.sin(tk.turA)*44*TANK_SCALE,
        vx: Math.cos(tk.turA)*1200, vy: Math.sin(tk.turA)*1200, life: 2.2 });
      noiseBurst(0.3, 500, 0.2); thump(60, 0.3, 0.25); shake(4);
    }
  }
  tanks = tanks.filter(t => !t.dead);
  for (const sh of shells) {
    sh.life -= dt; sh.vy += 140*dt;
    sh.x += sh.vx*dt; sh.y += sh.vy*dt;
    if (Math.random() < 0.6) smokes.push({x:sh.x, y:sh.y, r:rand(3,6), vr:rand(8,16), vy:0, life:rand(0.25,0.5), c:'rgba(120,110,116,'});
    let boom = false;
    if (dist2(sh.x,sh.y,P.x,P.y) < 30*30) boom = true;
    if (sh.y >= GROUND_Y - 4) boom = true;
    if (cellIntactAt(sh.x, sh.y)) boom = true;
    if (sh.life <= 0) boom = true;
    // cellFrac 0: tank fire knocks YOU around but never wrecks buildings or kills civilians —
    // the city's destruction stays entirely Homelander's work
    if (boom) {
      const by = Math.min(sh.y, GROUND_Y-4);
      explode(sh.x, by, 78, 0, true);
      // a shell should hit noticeably harder than a generic blast — explode()'s own push is the
      // same flat force every explosion gets, so stack a real punch on top of it here
      if (dist2(P.x,P.y,sh.x,by) < 130*130) {
        const d = Math.max(Math.hypot(P.x-sh.x, P.y-by), 20);
        P.vx += (P.x-sh.x)/d*900; P.vy += (P.y-by)/d*900 - 140;
        P.knockT = Math.max(P.knockT, 0.35);
      }
      sh.life = 0;
    }
  }
  shells = shells.filter(s => s.life > 0);

  // ── sharks: hunt the player the moment he's in the water; blood just draws more of them in ──
  if (sharks.length < 7 && waterBloods.length > 2 && P.x > WATER_X - VW && Math.random() < dt*0.7) spawnShark();
  for (const s of sharks) {
    if (s.dead) continue;
    s.t += dt; s.feedT -= dt; s.biteCd -= dt;
    const huntPlayer = inWater(P.x, P.y) && Math.abs(P.x - s.x) < 1300;
    if (huntPlayer) {
      const dx = P.x - s.x, dy = P.y - s.y, dd = Math.hypot(dx,dy) || 1;
      const dart = dd < 320;
      s.vx += (dx/dd) * (dart ? 900 : 340) * dt; s.vy += (dy/dd) * (dart ? 900 : 340) * dt;
      s.vx = clamp(s.vx, dart ? -560 : -280, dart ? 560 : 280);
      s.vy = clamp(s.vy, dart ? -560 : -280, dart ? 560 : 280);
      s.y += s.vy*dt;
      if (dd < 42 && s.biteCd <= 0) {
        const kd = Math.max(dd, 20);
        P.vx += (P.x-s.x)/kd*420; P.vy += (P.y-s.y)/kd*420 - 60;
        P.hurtFlash = 1; P.knockT = Math.max(P.knockT, 0.3); shake(10); sfxHit();
        s.biteCd = 1.2; s.feedT = 16;
        waterBlood(P.x, P.y, rand(8,14));   // now you're bleeding too — draws the rest of them in
      }
    } else {
      let bx = null, bb = 1e9;
      for (const w of waterBloods) { const d = Math.abs(w.x - s.x); if (d < bb) { bb = d; bx = w; } }
      if (bx) s.vx += Math.sign(bx.x - s.x) * 160 * dt;
      s.vx = clamp(s.vx, -160, 160);
      // settle back to a normal patrol depth just under the surface when not actively diving on you
      s.y += ((GROUND_Y + 40 + Math.sin(s.t*1.4)*10) - s.y) * Math.min(1, dt*3);
    }
    s.x += s.vx*dt;
    s.facing = s.vx >= 0 ? 1 : -1;
    s.x = clamp(s.x, WATER_X+60, WORLD_W-60);
    s.y = clamp(s.y, GROUND_Y+15, WATER_FLOOR-20);
    if (s.feedT <= 0) s.dead = true;   // nothing left to eat — slips back into the deep water
  }
  sharks = sharks.filter(s => !s.dead);


  // ── rockets (fast, mildly homing, hostile) ──
  for (const r of rockets) {
    if (r.gone) continue;   // already detonated mid-air by the laser this frame
    r.t += dt; r.life -= dt;
    const dx = P.x - r.x, dy = P.y - r.y, d = Math.hypot(dx,dy)||1;
    r.vx += (dx/d)*150*dt; r.vy += (dy/d)*150*dt;
    const sp = Math.hypot(r.vx,r.vy), mx = 660;
    if (sp > mx) { r.vx *= mx/sp; r.vy *= mx/sp; }
    r.x += r.vx*dt; r.y += r.vy*dt;
    if (Math.random()<0.9) smokes.push({x:r.x, y:r.y, r:rand(4,8), vr:rand(10,20), vy:0, life:rand(0.35,0.7), c:'rgba(95,88,96,'});
    let boom = false;
    if (d < 34) boom = true;
    if (r.y >= GROUND_Y - 6) boom = true;
    if (cellIntactAt(r.x, r.y)) boom = true;
    if (r.life <= 0) boom = true;
    if (boom) { r.gone = true; explode(r.x, Math.min(r.y, GROUND_Y-4), 46, 0, true); }   // no building/civilian damage
  }
  rockets = rockets.filter(r => !r.gone);

  // ── A-Train's thrown rubble (his answer when the player just stays airborne) ──
  for (const rb of atrainDebris) {
    rb.vy += 1100*dt;
    rb.x += rb.vx*dt; rb.y += rb.vy*dt; rb.life -= dt;
    if (Math.random()<0.7) debris.push({ x: rb.x+rand(-3,3), y: rb.y+rand(-3,3), vx: rand(-15,15), vy: rand(-15,15), rot: rand(0,7), vr: rand(-6,6), r: rand(1.5,3), c: '#2e2638', life: rand(0.2,0.4) });
    let boom = false;
    if (dist2(rb.x,rb.y,P.x,P.y) < 34*34) {
      boom = true;
      P.hurtFlash = 1; P.stunT = Math.max(P.stunT, 0.4); shake(10); sfxHit(); thump(70,0.2,0.25);
      const kd = Math.max(Math.hypot(P.x-rb.x,P.y-rb.y), 20);
      P.vx += (P.x-rb.x)/kd*700; P.vy += (P.y-rb.y)/kd*700 - 120;
    }
    if (rb.y >= GROUND_Y - 4) boom = true;
    if (cellIntactAt(rb.x, rb.y)) boom = true;
    if (rb.life <= 0) boom = true;
    if (boom) {
      rb.gone = true;
      for (let i=0;i<7;i++) debris.push({ x: rb.x+rand(-8,8), y: Math.min(rb.y,GROUND_Y-2), vx: rand(-100,100), vy: -rand(40,140), rot: rand(0,7), vr: rand(-6,6), r: rand(2.5,5), c: '#2e2638', life: rand(0.5,1) });
      shake(4); sfxCrack();
    }
  }
  atrainDebris = atrainDebris.filter(rb => !rb.gone && rb.life > 0);

  // ── bullets ──
  for (const b of bullets) {
    b.x += b.vx*dt; b.y += b.vy*dt; b.life -= dt;
    if (dist2(b.x,b.y,P.x,P.y) < 20*20) {
      b.life = 0; shake(1); sfxHit();
      sparks.push({x:b.x, y:b.y, vx:rand(-100,100), vy:rand(-100,100), life:0.15, c:'#ffe9a0'});
    } else if (cellIntactAt(b.x, b.y)) b.life = 0;
  }
  bullets = bullets.filter(b => b.life > 0);

  // ── Starlight's electric bolts (stun on hit) ──
  for (const eb of electroBolts) {
    eb.x += eb.vx*dt; eb.y += eb.vy*dt; eb.life -= dt;
    if (inWater(eb.x, eb.y) && Math.random() < dt*40) bubbleAt(eb.x, eb.y);   // a visible trail underwater — the bolt used to just seem to vanish at the surface
    if (dist2(eb.x,eb.y,P.x,P.y) < 32*32) {
      eb.life = 0; P.stunT = 1.5; boltLockout = 2; P.hurtFlash = 1; shake(14); sfxHit(); thump(200, 0.3, 0.25);
      for (let i=0;i<10;i++) sparks.push({x:eb.x,y:eb.y,vx:rand(-160,160),vy:rand(-160,160),life:rand(0.2,0.4),c:'#fff35a'});
    // GROUND_Y is also the water surface — a bolt crossing it out in the water zone should keep
    // going (so she can still tag you underwater) instead of fizzling the instant it touches water
    } else if (cellIntactAt(eb.x, eb.y) || (eb.y > GROUND_Y && (eb.x <= WATER_X || eb.y > WATER_FLOOR))) eb.life = 0;
  }
  electroBolts = electroBolts.filter(eb => eb.life > 0);

  // ── Lamplighter's fireballs ──
  for (const fb of fireballs) {
    fb.x += fb.vx*dt; fb.y += fb.vy*dt; fb.life -= dt;
    if (Math.random() < dt*40) embers.push({ x: fb.x, y: fb.y, vx: rand(-15,15), vy: rand(-15,15), life: rand(0.15,0.3), r: rand(1,2) });
    if (dist2(fb.x,fb.y,P.x,P.y) < 30*30) {
      fb.life = 0; P.stunT = Math.max(P.stunT, 0.5); fireballLockout = 1.2; P.hurtFlash = 1; shake(10); sfxHit(); thump(160, 0.25, 0.22);
      const kd = Math.max(Math.hypot(P.x-fb.x,P.y-fb.y), 20);
      P.vx += (P.x-fb.x)/kd*400; P.vy += (P.y-fb.y)/kd*400;
      for (let i=0;i<8;i++) sparks.push({x:fb.x,y:fb.y,vx:rand(-140,140),vy:rand(-140,140),life:rand(0.2,0.4),c:'#ff8a3a'});
    } else if (cellIntactAt(fb.x, fb.y) || (fb.y > GROUND_Y && (fb.x <= WATER_X || fb.y > WATER_FLOOR))) fb.life = 0;
  }
  fireballs = fireballs.filter(fb => fb.life > 0);

  // ── Starlight's light balls (spawned from windows/lamps, weak homing) ──
  for (const lb of lightBalls) {
    const ldx = P.x-lb.x, ldy = P.y-lb.y, ld = Math.hypot(ldx,ldy)||1;
    lb.vx += (ldx/ld)*(lb.hail?150:110)*dt; lb.vy += (ldy/ld)*(lb.hail?150:110)*dt;
    const lsp = Math.hypot(lb.vx,lb.vy), lmx = lb.hail ? 620 : 480;
    if (lsp > lmx) { lb.vx *= lmx/lsp; lb.vy *= lmx/lsp; }
    lb.x += lb.vx*dt; lb.y += lb.vy*dt; lb.life -= dt;
    if (dist2(lb.x,lb.y,P.x,P.y) < 18*18) {
      lb.life = 0; P.hurtFlash = 1; sfxHit();
      const kd = Math.max(Math.hypot(P.x-lb.x,P.y-lb.y), 20);
      if (lb.hail) {
        // hits harder than the ambient potshot, and stings enough to briefly stun — but it's a
        // fraction of a second, not the full lockout her electric bolt gives
        P.vx += (P.x-lb.x)/kd*520; P.vy += (P.y-lb.y)/kd*520;
        P.stunT = Math.max(P.stunT, 0.3); shake(13); thump(90,0.25,0.25);
      } else {
        P.vx += (P.x-lb.x)/kd*260; P.vy += (P.y-lb.y)/kd*260;
        shake(8);
      }
    } else if (cellIntactAt(lb.x, lb.y) || (lb.y > GROUND_Y && (lb.x <= WATER_X || lb.y > WATER_FLOOR))) lb.life = 0;
  }
  lightBalls = lightBalls.filter(lb => lb.life > 0);

  // ── gibs / debris (heavy chunks crush pedestrians) ──
  for (const g of gibs) {
    if (inWater(g.x, g.y)) {
      // underwater: heavy drag, slow sink, thin blood trail — no bouncing off the "surface"
      g.vx -= g.vx*2.6*dt; g.vy += (140 - g.vy)*1.4*dt;
      g.x += g.vx*dt; g.y += g.vy*dt; g.rot += g.vr*0.3*dt; g.life -= dt;
      if (Math.random() < dt*2.5) waterBlood(g.x, g.y, rand(3,7));
      if (g.y > WATER_FLOOR - 6) { g.y = WATER_FLOOR - 6; g.vy = 0; g.vx *= 0.8; }
      continue;
    }
    g.vy += 1500*dt;
    g.x += g.vx*dt; g.y += g.vy*dt; g.rot += g.vr*dt; g.life -= dt;
    if (g.x > WATER_X && g.y > GROUND_Y - 4 && g.vy > 100) splash(g.x, g.vy*0.4);
    if (g.x > WATER_X) continue;   // fell into the water zone — handled by the branch above next frame
    const s = surfaceBelow(g.x, g.y - 20);
    if (g.y > s - g.r) {
      g.y = s - g.r;
      if (Math.abs(g.vy) > 60) bakeSplat(g.x, s, rand(5,12), '#5e0c0c', rand(0.4,0.7));
      g.vy *= -0.35; g.vx *= 0.6; g.vr *= 0.6;
    }
  }
  gibs = gibs.filter(g => g.life > 0);
  if (gibs.length > 280) gibs.splice(0, gibs.length-280);
  for (const g of debris) {
    if (inWater(g.x, g.y)) {
      g.vx -= g.vx*2.6*dt; g.vy += (160 - g.vy)*1.4*dt;
      g.x += g.vx*dt; g.y += g.vy*dt; g.rot += g.vr*0.3*dt; g.life -= dt;
      if (g.y > WATER_FLOOR - 5) { g.y = WATER_FLOOR - 5; g.vy = 0; g.vx *= 0.8; }
      continue;
    }
    g.vy += 1400*dt;
    g.x += g.vx*dt; g.y += g.vy*dt; g.rot += g.vr*dt; g.life -= dt;
    if (g.x > WATER_X && g.y > GROUND_Y - 4 && g.vy > 120 && Math.random() < 0.5) splash(g.x, g.vy*0.3);
    if (g.x > WATER_X) continue;
    if (g.heavy && g.vy > 240) {
      for (const c of civs) if (!c.dead && dist2(g.x,g.y,c.x,c.y-14) < 18*18) { c.dead=true; gibBurst(c.x,c.y-14,1); addKill(); }
      for (const gr of grunts) if (!gr.dead && dist2(g.x,g.y,gr.x,gr.y-16) < 18*18) { gr.dead=true; gibBurst(gr.x,gr.y-16,1); addKill(); }
    }
    const s = surfaceBelow(g.x, g.y - 20);
    if (g.y > s - g.r) { g.y = s - g.r; g.vy *= -0.3; g.vx *= 0.6; }
  }
  debris = debris.filter(g => g.life > 0);
  if (debris.length > 300) debris.splice(0, debris.length-300);

  // ── blood ──
  for (const b of bloods) {
    b.vy += 1400*dt;
    b.x += b.vx*dt; b.y += b.vy*dt; b.life -= dt;
    if (b.x > WATER_X) {
      // hits the water: becomes a drifting cloud that lingers far longer than land blood
      if (b.y > GROUND_Y) { waterBlood(b.x, b.y, rand(5,11)); b.life = 0; }
      continue;
    }
    const s = surfaceBelow(b.x, b.y - 12);
    if (b.y >= s) { bakeSplat(b.x, s, rand(2.5, 9), '#5e0c0c', rand(0.4,0.75)); b.life = 0; }
  }
  bloods = bloods.filter(b => b.life > 0);
  if (bloods.length > 500) bloods.splice(0, bloods.length-500);

  // ── water blood clouds + bubbles ──
  for (const w of waterBloods) {
    w.x += w.vx*dt; w.y += w.vy*dt; w.r = Math.min(w.r + w.vr*dt, 70); w.life -= dt;
    w.y = clamp(w.y, GROUND_Y+6, WATER_FLOOR-10);
  }
  waterBloods = waterBloods.filter(w => w.life > 0);
  if (waterBloods.length > 130) waterBloods.splice(0, waterBloods.length-130);
  for (const b of bubbles) {
    b.x += b.vx*dt; b.y += b.vy*dt; b.life -= dt;
    if (b.y <= GROUND_Y + 3) b.life = 0;   // reached the surface — pop
  }
  bubbles = bubbles.filter(b => b.life > 0);
  if (bubbles.length > 120) bubbles.splice(0, bubbles.length-120);

  // ── fx ──
  for (const s of sparks) { s.x+=s.vx*dt; s.y+=s.vy*dt; s.vy+=800*dt; s.life-=dt; }
  sparks = sparks.filter(s => s.life > 0);
  if (sparks.length > 220) sparks.splice(0, sparks.length-220);
  for (const r of rings) { r.r += 900*dt; r.life -= dt; }
  rings = rings.filter(r => r.life > 0);
  for (const rp of ripples) { rp.r = Math.min(rp.maxR, rp.r + (rp.maxR/rp.maxLife)*dt); rp.life -= dt; }
  ripples = ripples.filter(rp => rp.life > 0);
  if (ripples.length > 60) ripples.splice(0, ripples.length-60);
  for (const a of afterimages) a.a -= dt*3;
  afterimages = afterimages.filter(a => a.a > 0);
  for (const s of smokes) { s.r += s.vr*dt; s.y += s.vy*dt; s.life -= dt*1.6; }
  smokes = smokes.filter(s => s.life > 0);
  if (smokes.length > 180) smokes.splice(0, smokes.length-180);
  for (const s of scorchFx) s.life -= dt;
  scorchFx = scorchFx.filter(s => s.life > 0);
  for (const c of clouds) { c.x += c.v*dt; if (c.x > WORLD_W+300) c.x = -300; }

  // ── city-is-burning ambience: embers + smoke from permanently burning buildings ──
  if (Math.random() < dt*10) embers.push({ x: camX + rand(-100, VW+100), y: GROUND_Y - rand(-50, 1000),
    vx: rand(-15,15), vy: rand(-70,-30), life: rand(2,4), r: rand(1,2.5) });
  for (const e of embers) { e.x += e.vx*dt; e.y += e.vy*dt; e.vx += Math.sin(gameT*2 + e.y*0.01)*8*dt; e.life -= dt; }
  embers = embers.filter(e => e.life > 0);
  if (embers.length > 140) embers.splice(0, embers.length-140);
  for (const b of fgBuildings) {
    if (b.burning && !b.collapsed && !b.collapsing && Math.abs(b.x-P.x) < VW*1.5 && Math.random() < dt*4) {
      smokes.push({ x: b.x + rand(0,b.w), y: b.roofY - rand(0,20), r: rand(14,30), vr: rand(18,36),
        vy: rand(-45,-20), life: rand(1.2,2.2), c: 'rgba(90,80,86,' });
    }
  }
}

// ─── Drawing ───
function drawSky() {
  const g = cx.createLinearGradient(0, -camY*0.3, 0, VH);
  g.addColorStop(0, '#141433');
  g.addColorStop(0.45, '#3d2450');
  g.addColorStop(0.75, '#a8433a');
  g.addColorStop(1, '#e8843c');
  cx.fillStyle = g; cx.fillRect(0,0,VW,VH);
  const sx = VW*0.62 - camX*0.05, sy = VH*0.78 - (camY-800)*0.05;
  const rg = cx.createRadialGradient(sx,sy,10, sx,sy,240);
  rg.addColorStop(0,'rgba(255,230,170,0.95)'); rg.addColorStop(0.25,'rgba(255,170,90,0.55)'); rg.addColorStop(1,'rgba(255,140,60,0)');
  cx.fillStyle = rg; cx.beginPath(); cx.arc(sx,sy,240,0,7); cx.fill();
  cx.fillStyle = 'rgba(90,50,80,0.4)';
  for (const c of clouds) {
    const x = c.x - camX*0.12, y = c.y - camY*0.12;
    if (x < -300 || x > VW+300) continue;
    cx.beginPath();
    cx.ellipse(x, y, 90*c.s, 20*c.s, 0, 0, 7);
    cx.ellipse(x+50*c.s, y-12*c.s, 55*c.s, 16*c.s, 0, 0, 7);
    cx.ellipse(x-55*c.s, y-6*c.s, 45*c.s, 13*c.s, 0, 0, 7);
    cx.fill();
  }
}
function drawLayer(layer, fac, color) {
  cx.fillStyle = color;
  for (const b of layer) {
    const x = b.x - camX*fac;
    if (x + b.w < -50 || x > VW+50) continue;
    cx.fillRect(x, GROUND_Y - b.h - camY*fac - (camY - camY*fac), b.w, b.h + 500);
  }
}
function drawCity() {
  drawLayer(farLayer, 0.25, 'rgba(46,26,58,0.9)');
  drawLayer(midLayer, 0.55, 'rgba(30,18,44,0.95)');
  const shades = ['#1b1626','#20182c','#171322'];
  // archetype palettes give each variant its own color family instead of just the neutral default
  const archShades = { glass: ['#1c2e3a','#223648','#182732'], brick: ['#2e1c18','#3a2420','#28160f'],
    construction: ['#242024','#2a2428','#1e1a1e'], tower: ['#8a6a1e','#a8822a','#6e5216'] };
  for (const b of fgBuildings) {
    const x = b.x - camX, y = b.roofY - camY;
    if (x + b.w < -60 || x > VW+60) continue;
    if (b.collapsed) {
      if (b.ship) continue;   // a sunk ship piece leaves nothing behind — the water closes over it
      cx.fillStyle = '#171220';
      cx.beginPath(); cx.moveTo(x, GROUND_Y - camY);
      const humps = 4 + Math.floor(b.rubbleSeed*3);
      for (let i=0;i<=humps;i++) {
        const hx = x + b.w*i/humps;
        const hh = 26 + 46*Math.abs(Math.sin(b.rubbleSeed*20 + i*2.4));
        cx.lineTo(hx, GROUND_Y - camY - hh);
      }
      cx.lineTo(x+b.w, GROUND_Y - camY); cx.closePath(); cx.fill();
      cx.fillStyle = 'rgba(0,0,0,0.4)';
      cx.fillRect(x, GROUND_Y - camY - 4, b.w, 4);
      continue;
    }
    if (b.collapsing) {
      const p = clamp(b.collapseT / b.collapseDur, 0, 1);
      if (!b.ship) {
        cx.fillStyle = '#171220';
        cx.beginPath(); cx.moveTo(x, GROUND_Y - camY);
        const humps = 4 + Math.floor(b.rubbleSeed*3);
        for (let i=0;i<=humps;i++) {
          const hx = x + b.w*i/humps;
          const hh = (26 + 46*Math.abs(Math.sin(b.rubbleSeed*20 + i*2.4))) * p;
          cx.lineTo(hx, GROUND_Y - camY - hh);
        }
        cx.lineTo(x+b.w, GROUND_Y - camY); cx.closePath(); cx.fill();
      }
      const remH = b.collapseFromH * (1-p);
      if (remH > 2) {
        const jitter = Math.sin(gameT*45 + b.rubbleSeed*9) * p * 8;
        cx.fillStyle = b.ship ? '#323a46' : (archShades[b.archetype] ? archShades[b.archetype][b.shade] : shades[b.shade]);
        // a ship piece slides straight down under the waterline rather than crumbling into a pile
        cx.fillRect(x + jitter, GROUND_Y - camY - remH, b.w, remH);
      }
      continue;
    }
    // facade — flat fill plus two cheap translucent overlay strips instead of a real
    // CanvasGradient. A gradient object gets constructed fresh every frame for every visible
    // building (gradients are defined in screen space, so caching across frames doesn't work
    // while the camera's moving) — that's real per-frame cost for a subtle effect. Flat rects
    // give nearly the same "lit from above" read for a fraction of the cost.
    const baseColor = b.ship ? '#323a46' : (archShades[b.archetype] ? archShades[b.archetype][b.shade] : shades[b.shade]);
    cx.fillStyle = baseColor;
    cx.fillRect(x, y, b.w, b.h);
    cx.fillStyle = 'rgba(255,255,255,0.07)'; cx.fillRect(x, y, b.w, Math.min(60, b.h*0.25));
    cx.fillStyle = 'rgba(0,0,0,0.12)'; cx.fillRect(x, y+b.h-Math.min(70, b.h*0.3), b.w, Math.min(70, b.h*0.3));

    // and most buildings on screen at any moment are still fully intact

      for (let ci=0; ci<=b.cols; ci++) {
        const destroyed = ci < b.cols && b.cells[cj*b.cols+ci] >= 1;
        if (destroyed && runStart < 0) runStart = ci;
        if (!destroyed && runStart >= 0) {

          const ry = y + cj*CH;

          cx.fillRect(rx-1, ry-1, rw+2, CH+2);
          cx.fillStyle = '#241c30';                        // floor slab
          cx.fillRect(rx-1, ry + CH - 3, rw+2, 3);

    }

      if (b.cells[i0] >= 1 || b.cells[i0+1] >= 1 ||
          b.cells[i0+b.cols] >= 1 || b.cells[i0+b.cols+1] >= 1) continue;
      const wx = x + 9 + w.c*CW*2, wy = y + 12 + w.r*CH*2;
      cx.fillStyle = w.warm ? 'rgba(255,190,90,0.85)' : 'rgba(140,200,235,0.5)';
      if (b.ship) {
        cx.beginPath(); cx.arc(wx+8, wy+11, 7, 0, 7); cx.fill();
        cx.strokeStyle = 'rgba(10,10,14,0.6)'; cx.lineWidth = 1.5;
        cx.beginPath(); cx.arc(wx+8, wy+11, 7, 0, 7); cx.stroke();
      } else {
        cx.fillRect(wx, wy, 16, 22);
      }
      if (w.civ && !w.civDead) {
        cx.fillStyle = 'rgba(20,14,24,0.9)';
        cx.beginPath(); cx.arc(wx+8, wy+9, 3.4, 0, 7); cx.fill();
        cx.fillRect(wx+4.6, wy+12, 6.8, 10);
      }
    }
    cx.fillStyle = 'rgba(0,0,0,0.5)';
    cx.fillRect(x, y, b.w, 5);
    if (b.ship) {
      // hull belly: a gentle downward bulge below the waterline so the ship reads as a hull
      // sitting in the water rather than a building that happens to be near the dock
      const gyS = GROUND_Y - camY;
      cx.fillStyle = '#262c36';
      cx.beginPath();
      cx.moveTo(x, gyS - 12);
      cx.quadraticCurveTo(x + b.w/2, gyS + 22, x + b.w, gyS - 12);
      cx.lineTo(x + b.w, gyS - 12); cx.lineTo(x, gyS - 12);
      cx.closePath(); cx.fill();
      // red waterline stripe along the hull
      cx.fillStyle = '#7a1e1e';
      cx.fillRect(x, gyS - 12, b.w, 9);
      // deck rail along the top edge
      cx.strokeStyle = 'rgba(200,200,210,0.35)'; cx.lineWidth = 2;
      cx.beginPath(); cx.moveTo(x, y+2); cx.lineTo(x+b.w, y+2); cx.stroke();
      if (b.bow) {
        cx.fillStyle = '#323a46';
        cx.beginPath();
        cx.moveTo(x + b.w, y + 6);
        cx.quadraticCurveTo(x + b.w + 150, gyS - 90, x + b.w + 175, gyS - 4);
        cx.lineTo(x + b.w, gyS);
        cx.closePath(); cx.fill();
        cx.fillStyle = '#7a1e1e';
        cx.beginPath();
        cx.moveTo(x + b.w, gyS - 12);
        cx.lineTo(x + b.w + 168, gyS - 12);
        cx.lineTo(x + b.w + 175, gyS - 4);
        cx.lineTo(x + b.w, gyS - 3);
        cx.closePath(); cx.fill();
      }
      if (b.stern) {
        // the back end tapers and rounds off too, instead of ending in a flat wall
        cx.fillStyle = '#323a46';
        cx.beginPath();
        cx.moveTo(x, y + 10);
        cx.quadraticCurveTo(x - 70, gyS - 70, x - 85, gyS - 4);
        cx.lineTo(x, gyS);
        cx.closePath(); cx.fill();
        cx.fillStyle = '#7a1e1e';
        cx.beginPath();
        cx.moveTo(x, gyS - 12);
        cx.lineTo(x - 80, gyS - 12);
        cx.lineTo(x - 85, gyS - 4);
        cx.lineTo(x, gyS - 3);
        cx.closePath(); cx.fill();
      }
    }
    if (b.ant) { cx.strokeStyle='#0c0a14'; cx.lineWidth=3; cx.beginPath(); cx.moveTo(x+b.w*0.3, y); cx.lineTo(x+b.w*0.3, y-46); cx.stroke();
      cx.fillStyle='rgba(255,60,60,'+(0.4+0.5*Math.abs(Math.sin(gameT*2)))+')'; cx.beginPath(); cx.arc(x+b.w*0.3, y-48, 3.5, 0, 7); cx.fill(); }
    if (b.ac >= 0) { cx.fillStyle='#2a2438'; cx.fillRect(x+b.ac, y-14, 30, 14); }
    if (b.watertower) {
      const wtx = x + b.w*0.72;
      cx.strokeStyle = '#1a1620'; cx.lineWidth = 2.5;
      cx.beginPath(); cx.moveTo(wtx-14, y); cx.lineTo(wtx-10, y-26); cx.moveTo(wtx+14, y); cx.lineTo(wtx+10, y-26); cx.stroke();
      cx.fillStyle = '#3a3142';
      cx.beginPath(); cx.ellipse(wtx, y-34, 17, 9, 0, 0, 7); cx.fill();

      cx.beginPath(); cx.ellipse(wtx, y-42, 17, 8, 0, 0, 7); cx.fill();

    } else if (b.roofStyle === 'spire' && b.roofChunks.length) {

      cx.fillStyle = archShades[b.archetype] ? archShades[b.archetype][b.shade] : shades[b.shade];
      if (!b.roofChunks[0].dead) { cx.beginPath(); cx.moveTo(sx-10, y); cx.lineTo(sx+10, y); cx.lineTo(sx+2, y-sh*0.5); cx.lineTo(sx-2, y-sh*0.5); cx.closePath(); cx.fill(); }
      if (!b.roofChunks[1].dead) {

        cx.fillStyle = 'rgba(255,60,60,'+(0.4+0.5*Math.abs(Math.sin(gameT*2.4)))+')';
        cx.beginPath(); cx.arc(sx, y-sh-3, 3, 0, 7); cx.fill();
      }
    } else if (b.roofStyle === 'sawtooth' && b.roofChunks.length) {

      const teeth = b.roofChunks.length, tw = b.w/teeth;
      for (let i=0;i<teeth;i++) {
        if (b.roofChunks[i].dead) continue;
        cx.beginPath(); cx.moveTo(x+i*tw, y); cx.lineTo(x+i*tw+tw*0.5, y-14); cx.lineTo(x+(i+1)*tw, y); cx.closePath(); cx.fill();
      }

        cx.fillStyle = g;
        cx.beginPath(); cx.moveTo(apexX, apexY); cx.lineTo(tipLX, tipY); cx.lineTo(tipRX, tipY); cx.closePath(); cx.fill();
        cx.strokeStyle = 'rgba(255,255,255,0.4)'; cx.lineWidth = 1;

          cx.lineTo(apexX + (tipRX-apexX)*t, apexY + (tipY-apexY)*t);
          cx.stroke();
        }
      }
      const bw = 12;
      cx.fillStyle = '#e8c04a';
      cx.beginPath(); cx.moveTo(apexX-bw, apexY); cx.lineTo(tipLX-bw, tipY); cx.lineTo(tipLX+bw, tipY); cx.lineTo(apexX+bw, apexY); cx.closePath(); cx.fill();
      cx.beginPath(); cx.moveTo(apexX-bw, apexY); cx.lineTo(tipRX-bw, tipY); cx.lineTo(tipRX+bw, tipY); cx.lineTo(apexX+bw, apexY); cx.closePath(); cx.fill();
      // a thin brighter inset strip on each beam for a bit of metallic bevel
      cx.fillStyle = 'rgba(255,240,190,0.55)';
      const hb = 3;
      cx.beginPath(); cx.moveTo(apexX-bw+2, apexY-2); cx.lineTo(tipLX-bw+2, tipY+2); cx.lineTo(tipLX-bw+2+hb, tipY+2); cx.lineTo(apexX-bw+2+hb, apexY-2); cx.closePath(); cx.fill();
      cx.beginPath(); cx.moveTo(apexX+bw-2-hb, apexY-2); cx.lineTo(tipRX+bw-2-hb, tipY+2); cx.lineTo(tipRX+bw-2, tipY+2); cx.lineTo(apexX+bw-2, apexY-2); cx.closePath(); cx.fill();
    }
    if (b.burning) {
      const fl = 0.6 + 0.4*Math.abs(Math.sin(gameT*9 + b.rubbleSeed*30));
      const fx = x + b.w*0.5;
      const fg = cx.createRadialGradient(fx,y,2, fx,y,34*fl);
      fg.addColorStop(0,'rgba(255,200,80,0.85)'); fg.addColorStop(0.5,'rgba(255,110,40,0.45)'); fg.addColorStop(1,'rgba(255,80,30,0)');
      cx.fillStyle = fg; cx.beginPath(); cx.arc(fx,y,34*fl,0,7); cx.fill();
    }
  }
  const gy = GROUND_Y - camY;
  const dockL = clamp(CITY_W - camX, 0, VW), waterL = clamp(WATER_X - camX, 0, VW);
  // city streets
  if (dockL > 0) {
    cx.fillStyle = '#141018'; cx.fillRect(0, gy, dockL, VH-gy);
