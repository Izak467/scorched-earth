    }

    if (a.mode === 'roof') {
      const b = fgBuildings[a.buildingIdx];
      if (!b || b.collapsed || b.collapsing || a.x < b.x-10 || a.x > b.x+b.w+10) {
        const exitedRight = !b || a.x > b.x+b.w;
        const searchIdx = a.buildingIdx + (exitedRight ? 1 : -1);
        const nb = fgBuildings[searchIdx];
        let hopped = false;
        if (b && nb && !nb.collapsed && !nb.collapsing) {
          const gap = exitedRight ? nb.x - (b.x+b.w) : (b.x - (nb.x+nb.w));
          if (gap < 260) { a.buildingIdx = searchIdx; a.x = exitedRight ? nb.x+12 : nb.x+nb.w-12; hopped = true; }
        }
        if (!hopped) a.mode = 'ground';
      }
    }
    const targetY = (a.mode === 'roof' && fgBuildings[a.buildingIdx]) ? fgBuildings[a.buildingIdx].roofY - 4 : GROUND_Y - 4;
    a.y += clamp(targetY - a.y, -2600*dt, 2600*dt);
    a.x = clamp(a.x, 40, WATER_X - 50);   // she can't run on water — the dock edge is her limit
  }
  maeves = maeves.filter(a => !a.dead);

  // ── The Deep (water boss) ──
  for (const dp of deeps) {
    if (dp.dead) continue;
    dp.atkCd -= dt; dp.tentCd -= dt;

    if (dp.state === 'lurk') {
      // cruise just under the surface toward the player — only the fin shows
      const step = Math.min(Math.abs(P.x - dp.x), 430*dt);
      dp.x += (P.x >= dp.x ? 1 : -1) * step;
      dp.y += ((GROUND_Y + 55) - dp.y) * Math.min(1, dt*4);
      dp.facing = P.x >= dp.x ? 1 : -1;
      if (P.underwaterT > 3 && inWater(P.x, P.y)) {
        dp.state = 'grabdash'; dp.stateT = 1.5;   // you stayed down too long — he's coming
      } else if (dp.atkCd <= 0 && P.x > WATER_X - 200 && P.y < GROUND_Y - 20 && Math.abs(P.x - dp.x) < 760) {
        const r = Math.random();
        if (r < 0.45) { dp.state = 'crouch'; dp.stateT = 0.35; }
        else if (r < 0.72) { dp.state = 'volley'; dp.stateT = 0.3; }
        else { dp.state = 'dolphin'; dp.stateT = 0.35; dp.chargeDir = P.x >= dp.x ? 1 : -1; }
        dp.atkCd = rand(2.2, 3.4);
      }
      // tentacle from below punishes hovering lazily just over the waves
      if (dp.tentCd <= 0 && P.x > WATER_X + 80 && P.y > GROUND_Y - 170 && P.y < GROUND_Y - 4) {
        tentacles.push({ x: clamp(P.x + P.vx*0.25, WATER_X+60, WORLD_W-60), phase: 'warn', t: 0.45, h: 0, grabbed: false });
        dp.tentCd = rand(5, 8);
      }
    } else if (dp.state === 'crouch') {
      dp.stateT -= dt;
      if (Math.random() < dt*30) bubbleAt(dp.x + rand(-20,20), GROUND_Y + rand(6,30));
      if (dp.stateT <= 0) {
        // breach lunge — same led-target pounce as Maeve's, launched out of the water
        const leadT = 0.35;
        const tx = P.x + P.vx*leadT, ty = P.y + P.vy*leadT;
        const dx = tx-dp.x, dy = ty-dp.y, dd = Math.hypot(dx,dy) || 1;
        dp.jumpVx = (dx/dd)*1400; dp.jumpVy = (dy/dd)*1400 - 220;
        dp.state = 'jump'; dp.stateT = 0.7;
        splash(dp.x, 800);
      }
    } else if (dp.state === 'jump') {
      dp.stateT -= dt;
      const tdx = P.x-dp.x, tdy = P.y-dp.y, tdd = Math.hypot(tdx,tdy) || 1;
      const turn = Math.min(1, dt*2.0);
      dp.jumpVx += ((tdx/tdd)*1400 - dp.jumpVx)*turn; dp.jumpVy += ((tdy/tdd)*1400 - dp.jumpVy)*turn;
      dp.x += dp.jumpVx*dt; dp.y += dp.jumpVy*dt;
      dp.facing = dp.jumpVx >= 0 ? 1 : -1;
      if (dist2(dp.x,dp.y,P.x,P.y) < 75*75) {
        // connects — slightly less force than Maeve's hit, no stun
        const kd = Math.hypot(P.x-dp.x, P.y-dp.y) || 1;
        P.grounded = false; P.hopping = false; P.knockT = 0.5;
        P.vx += (P.x-dp.x)/kd * 3200; P.vy += (P.y-dp.y)/kd * 3200;
        P.hurtFlash = 1; shake(18); sfxHit(); thump(65,0.3,0.3);
        dp.state = 'fall';
      } else if (dp.stateT <= 0) dp.state = 'fall';
    } else if (dp.state === 'fall') {
      dp.jumpVy += 1500*dt;
      dp.x += dp.jumpVx*0.4*dt; dp.y += dp.jumpVy*dt;
      if (dp.y >= GROUND_Y + 30) { splash(dp.x, 600); dp.state = 'lurk'; dp.jumpVx = 0; dp.jumpVy = 0; }
    } else if (dp.state === 'grabdash') {
      dp.stateT -= dt;
      const dx = P.x-dp.x, dy = P.y-dp.y, dd = Math.hypot(dx,dy) || 1;
      dp.x += (dx/dd)*1700*dt; dp.y += (dy/dd)*1700*dt;
      dp.facing = dx >= 0 ? 1 : -1;
      if (Math.random() < dt*20) bubbleAt(dp.x, dp.y);
      if (!inWater(P.x, P.y) || dp.stateT <= 0) dp.state = 'lurk';
      else if (dd < 55) { dp.state = 'carry'; P.carried = true; }
    } else if (dp.state === 'carry') {
      // hauls Homelander out of the water diagonally up-left, then hurls him
      dp.x -= 1050*dt; dp.y -= 1400*dt;
      P.x = dp.x + 14; P.y = dp.y - 6; P.vx = -1050; P.vy = -1400;
      P.stunT = Math.max(P.stunT, 0.2); P.dashT = 0; P.grounded = false;
      dp.facing = -1;
      if (dp.y < GROUND_Y && dp.y > GROUND_Y - 60) splash(dp.x, 700);
      if (dp.y <= GROUND_Y - 430) {
        P.carried = false; P.knockT = 0.6; P.stunT = 0.35;
        P.vx = -2400; P.vy = -450;
        P.hurtFlash = 1; shake(20); sfxHit(); thump(60,0.35,0.35);
        dp.state = 'fall'; dp.jumpVx = 300; dp.jumpVy = 200;
      }
    } else if (dp.state === 'volley') {
      dp.stateT -= dt;
      if (dp.stateT <= 0) {
        // a school of fish leaps out of the water in an arcing spread at you
        for (let k=0;k<5;k++) {
          const fx = clamp(dp.x + rand(-90,90), WATER_X+40, WORLD_W-40);
          const a = Math.atan2(P.y - GROUND_Y, P.x - fx);
          const sp = rand(680, 900);
          fishes.push({ x: fx, y: GROUND_Y+4, vx: Math.cos(a)*sp, vy: Math.sin(a)*sp - rand(120,260), life: 3, t: rand(0,9) });
          splash(fx, 150);
        }
        dp.state = 'lurk';
      }
    } else if (dp.state === 'dolphin') {
      dp.stateT -= dt;
      if (dp.stateT > 0) {
        dp.y += ((GROUND_Y - 4) - dp.y)*Math.min(1, dt*8);   // surfacing windup
      } else {
        dp.x += dp.chargeDir*1900*dt;
        dp.y = GROUND_Y - 10 + Math.sin(gameT*14)*4;
        dp.facing = dp.chargeDir;
        if (Math.random() < dt*30) sparks.push({ x: dp.x - dp.chargeDir*rand(10,30), y: GROUND_Y+2,
          vx: -dp.chargeDir*rand(30,110), vy: -rand(40,130), life: rand(0.2,0.45), c: '#cfe9f5' });
        if (dist2(dp.x, dp.y, P.x, P.y) < 62*62) {
          P.grounded = false; P.knockT = 0.45;
          P.vx += dp.chargeDir*2400; P.vy -= 350;
          P.hurtFlash = 1; shake(16); sfxHit(); thump(70,0.25,0.3);
          dp.state = 'lurk';
        } else if (dp.x < WATER_X + 90 || dp.x > WORLD_W - 90 || Math.abs(dp.x - P.x) > 1400) {
          dp.state = 'lurk';
        }
      }
    }
    dp.x = clamp(dp.x, WATER_X + 60, WORLD_W - 60);
    dp.y = clamp(dp.y, 120, WATER_FLOOR - 40);
  }
  deeps = deeps.filter(d => !d.dead);

  // ── The Deep's leaping fish ──
  for (const f of fishes) {
    f.t += dt; f.life -= dt;
    f.vy += 900*dt;
    f.x += f.vx*dt; f.y += f.vy*dt;
    if (dist2(f.x,f.y,P.x,P.y) < 22*22) {
      f.life = 0;
      const kd = Math.hypot(P.x-f.x,P.y-f.y) || 1;
      P.vx += (P.x-f.x)/kd*300; P.vy += (P.y-f.y)/kd*300;
      P.hurtFlash = 1; sfxHit();
    } else if (f.vy > 0 && f.y > GROUND_Y+4 && f.x > WATER_X) { splash(f.x, 80); f.life = 0; }
    else if (cellIntactAt(f.x, f.y) || f.y > GROUND_Y+8) f.life = 0;
  }
  fishes = fishes.filter(f => f.life > 0);

  // ── The Deep's tentacles (rise under a low-hovering player) ──
  for (const t of tentacles) {
    t.t -= dt;
    const canGrab = (t.phase === 'up' || t.phase === 'hold');
    if (t.phase === 'warn') {
      if (Math.random() < dt*18) rings.push({x: t.x, y: GROUND_Y, r: 4, life: 0.35, w: 2});
      if (t.t <= 0) { t.phase = 'up'; t.t = 0.2; splash(t.x, 300); }
    } else if (t.phase === 'up') {
      t.h = Math.min(215, t.h + 1500*dt);
      if (t.t <= 0) { t.phase = 'hold'; t.t = 0.3; }
    } else if (t.phase === 'hold') {
      if (t.t <= 0) t.phase = 'down';
    } else {
      t.h -= 900*dt;
      if (t.h <= 0) t.gone = true;
    }
    if (canGrab && !t.grabbed && Math.abs(P.x - t.x) < 44 && P.y > GROUND_Y - t.h - 20 && P.y < GROUND_Y) {
      // snags him and yanks him down to the surface for a beat
      t.grabbed = true;
      P.x = t.x; P.y = GROUND_Y - 30; P.vx *= 0.2; P.vy = 0; P.dashT = 0;
      P.stunT = Math.max(P.stunT, 0.45); P.hurtFlash = 1; shake(10); sfxHit();
    }
  }
  tentacles = tentacles.filter(t => !t.gone);

  // ── the docked ship: sink → wait → replacement sails in from the far right ──
  if (shipRespawnT === 0 && !sailShip && shipPieces.every(p => p.collapsed)) shipRespawnT = 20;
  if (shipRespawnT > 0) {
    shipRespawnT -= dt;
    if (shipRespawnT <= 0) { sailShip = { x: WORLD_W + 700 }; shipRespawnT = -1; }
  }
  if (sailShip) {
    sailShip.x -= 290*dt;
    if (Math.random() < dt*10) sparks.push({ x: sailShip.x - 20, y: GROUND_Y+2,
      vx: rand(20,80), vy: -rand(20,70), life: rand(0.2,0.4), c: '#cfe9f5' });
    if (sailShip.x <= SHIP_X) {
      resetShip(); sailShip = null; shipRespawnT = 0;
      thump(50, 1.4, 0.45);   // horn as she locks into the berth
    }
  }

  // ── elevated trains ──
  trainTimer -= dt;
  if (trainTimer <= 0 && trains.length < 2) { spawnTrain(); trainTimer = rand(22, 38); }
  for (const t of trains) {
    t.x += t.dir * t.sp * dt; t.t += dt;
    for (let i=0;i<t.cars.length;i++) {
      const c = t.cars[i]; if (c.dead) continue;
      const cxw = trainCarX(t, i);
      // plowing into a car (flying or dashing) wrecks it
      if (dist2(P.x, P.y, cxw, RAIL_Y-16) < 66*66) trainCarDeath(t, i, cxw);
    }
  }
  trains = trains.filter(t => {
    if (!t.cars.some(c => !c.dead)) return false;
    const tail = t.x - t.dir*(t.cars.length-1)*118;
    return t.dir > 0 ? tail < CITY_W + 300 : tail > -300;
  });
  // wrecked cars tear off the rail and crash into the street below
  for (const w of trainWrecks) {
    w.vy += 1300*dt;
    w.x += w.vx*dt; w.y += w.vy*dt; w.rot += w.vr*dt;
    const s = surfaceBelow(w.x, w.y - 20);
    if (w.y >= s - 14) {
      w.gone = true;
      explode(w.x, s-12, 88, 0.8);
      bakeScorch(w.x, s, 42);
    }
  }
  trainWrecks = trainWrecks.filter(w => !w.gone);

  // ── tanks (late-game armor escalation) ──
  if (kills > 500) {
    tankTimer -= dt;
    if (tankTimer <= 0 && tanks.length < 2) { spawnTank(); tankTimer = rand(28, 45); }
  }
  for (const tk of tanks) {
    if (tk.dead) continue;
    tk.t += dt; tk.fireCd -= dt; tk.muzzle -= dt;
    const dx = P.x - tk.x;
    if (Math.abs(dx) > 460) { tk.x += Math.sign(dx)*tk.sp*dt; tk.facing = Math.sign(dx) || 1; }
    tk.x = clamp(tk.x, 80, WATER_X - 120);
    // turret tracks you, slowly
    const want = Math.atan2(P.y - (tk.y-30), P.x - tk.x);
    let da = want - tk.turA;
    while (da > Math.PI) da -= Math.PI*2; while (da < -Math.PI) da += Math.PI*2;
    tk.turA += clamp(da, -1.6*dt, 1.6*dt);
    if (tk.fireCd <= 0 && Math.abs(tk.x-P.x) < VW*0.75) {
      tk.fireCd = rand(3.2, 4.6); tk.muzzle = 0.08;
      shells.push({ x: tk.x + Math.cos(tk.turA)*44, y: tk.y - 30 + Math.sin(tk.turA)*44,
        vx: Math.cos(tk.turA)*950, vy: Math.sin(tk.turA)*950, life: 2.6 });
      noiseBurst(0.3, 500, 0.2); thump(60, 0.3, 0.25); shake(4);
    }
  }
  tanks = tanks.filter(t => !t.dead);
  for (const sh of shells) {
    sh.life -= dt; sh.vy += 140*dt;
    sh.x += sh.vx*dt; sh.y += sh.vy*dt;
    if (Math.random() < 0.6) smokes.push({x:sh.x, y:sh.y, r:rand(3,6), vr:rand(8,16), vy:0, life:rand(0.25,0.5), c:'rgba(120,110,116,'});
    let boom = false;
    if (dist2(sh.x,sh.y,P.x,P.y) < 30*30) boom = true;
    if (sh.y >= GROUND_Y - 4) boom = true;
    if (cellIntactAt(sh.x, sh.y)) boom = true;
    if (sh.life <= 0) boom = true;
    // cellFrac 0: tank fire knocks YOU around but never wrecks buildings or kills civilians —
    // the city's destruction stays entirely Homelander's work
    if (boom) { explode(sh.x, Math.min(sh.y, GROUND_Y-4), 78, 0, true); sh.life = 0; }
  }
  shells = shells.filter(s => s.life > 0);

  // ── sharks: blood in the water draws them in to hunt the swimmers ──
  if (sharks.length < 3 && waterBloods.length > 2 && P.x > WATER_X - VW && Math.random() < dt*0.7) spawnShark();
  for (const s of sharks) {
    if (s.dead) continue;
    s.t += dt; s.feedT -= dt;
    let tx = null, best = 1e9;
    for (const c of civs) if (!c.dead && c.swim && !c.rescued && !c.rescueFall) {
      const d = Math.abs(c.x - s.x); if (d < best) { best = d; tx = c; }
    }
    if (tx && best < 900) {
      const dart = best < 260;
      if (dart) { tx.panic = 3; tx.dir = tx.x < s.x ? -1 : 1; }   // they see the fin coming
      s.vx += Math.sign(tx.x - s.x) * (dart ? 900 : 220) * dt;
      s.vx = clamp(s.vx, dart ? -520 : -180, dart ? 520 : 180);
      if (best < 24) {
        tx.dead = true; gibBurst(tx.x, GROUND_Y+22, 1.2); addKill();
        splash(tx.x, 500); s.feedT = 16;
      }
    } else {
      let bx = null, bb = 1e9;
      for (const w of waterBloods) { const d = Math.abs(w.x - s.x); if (d < bb) { bb = d; bx = w; } }
      if (bx) s.vx += Math.sign(bx.x - s.x) * 160 * dt;
      s.vx = clamp(s.vx, -160, 160);
    }
    s.x += s.vx*dt;
    s.facing = s.vx >= 0 ? 1 : -1;
    s.y = GROUND_Y + 40 + Math.sin(s.t*1.4)*10;
    s.x = clamp(s.x, WATER_X+60, WORLD_W-60);
    if (s.feedT <= 0) s.dead = true;   // nothing left to eat — slips back into the deep water
  }
  sharks = sharks.filter(s => !s.dead);

  // ── coast-guard rescue chopper ──
  rescueTimer -= dt;
  if (rescueTimer <= 0 && rescues.length < 1 && P.x > WATER_X - VW &&
      civs.some(c => c.swim && !c.dead && !c.rescued)) { spawnRescue(); rescueTimer = rand(20, 32); }
  for (const r of rescues) {
    r.t += dt;
    if (r.falling) {
      r.vy += 900*dt; r.rot += dt*6;
      r.x += r.vx*dt; r.y += r.vy*dt;
      r.smokeCd -= dt;
      if (r.smokeCd <= 0) { r.smokeCd = 0.05; smokes.push({x:r.x, y:r.y, r:rand(8,15), vr:rand(20,38), vy:rand(-25,0), life:rand(0.5,0.9), c:'rgba(96,90,100,'}); }
      if (r.y >= GROUND_Y - 12) { r.gone = true; explode(r.x, GROUND_Y-8, 80, 0.3, false, 0.8); splash(r.x, 900); }
      continue;
    }
    if (r.target && r.target.dead) { r.target = null; r.state = 'seek'; }
    if (r.state === 'seek') {
      if (!r.target) {
        let best = 1e9;
        for (const c of civs) if (c.swim && !c.dead && !c.rescued && !c.rescueFall) {
          const d = Math.abs(c.x - r.x); if (d < best) { best = d; r.target = c; }
        }
        if (!r.target) r.state = 'leave';
      }
      if (r.target) {
        const wy = GROUND_Y - 330;
        r.vx += clamp(r.target.x - r.x, -260, 260)*dt*1.5;
        r.vy += clamp(wy - r.y, -200, 200)*dt*1.5;
        r.vx -= r.vx*1.7*dt; r.vy -= r.vy*1.9*dt;
        r.x += r.vx*dt; r.y += r.vy*dt;
        if (Math.abs(r.x - r.target.x) < 26 && Math.abs(r.y - wy) < 40) r.state = 'lower';
      }
    } else if (r.state === 'lower') {
      r.vx *= 1 - 2*dt; r.vy *= 1 - 2*dt;
      r.x += r.vx*dt + (r.target ? clamp(r.target.x - r.x, -40, 40)*dt : 0);
      r.cable = Math.min(GROUND_Y - 8 - r.y, r.cable + 230*dt);
      if (r.target && r.y + r.cable >= GROUND_Y - 12 && Math.abs(r.x - r.target.x) < 24) {
        r.state = 'winch'; r.target.rescued = true;
      } else if (!r.target) { r.state = 'leave'; }
    } else if (r.state === 'winch') {
      r.cable -= 140*dt;
      if (r.target) { r.target.x = r.x; r.target.y = r.y + r.cable + 12; }
      if (r.cable <= 46) r.state = 'leave';
    } else {   // leave — climb away with (or without) the lucky one
      r.vx += 120*dt; r.vy -= 110*dt;
      r.vx = clamp(r.vx, -320, 320); r.vy = clamp(r.vy, -260, 60);
      r.x += r.vx*dt; r.y += r.vy*dt;
      if (r.target && r.target.rescued) { r.target.x = r.x; r.target.y = r.y + Math.max(r.cable, 24) + 12; }
      if (r.y < -250 || r.x > WORLD_W + 300) {
        r.gone = true;
        if (r.target && r.target.rescued) r.target.dead = true;   // safely away — no kill credit for you
      }
    }
  }
  rescues = rescues.filter(r => !r.gone);

  // ── rockets (fast, mildly homing, hostile) ──
  for (const r of rockets) {
    if (r.gone) continue;   // already detonated mid-air by the laser this frame
    r.t += dt; r.life -= dt;
    const dx = P.x - r.x, dy = P.y - r.y, d = Math.hypot(dx,dy)||1;
    r.vx += (dx/d)*150*dt; r.vy += (dy/d)*150*dt;
    const sp = Math.hypot(r.vx,r.vy), mx = 660;
    if (sp > mx) { r.vx *= mx/sp; r.vy *= mx/sp; }
    r.x += r.vx*dt; r.y += r.vy*dt;
    if (Math.random()<0.9) smokes.push({x:r.x, y:r.y, r:rand(4,8), vr:rand(10,20), vy:0, life:rand(0.35,0.7), c:'rgba(95,88,96,'});
    let boom = false;
    if (d < 34) boom = true;
    if (r.y >= GROUND_Y - 6) boom = true;
    if (cellIntactAt(r.x, r.y)) boom = true;
    if (r.life <= 0) boom = true;
    if (boom) { r.gone = true; explode(r.x, Math.min(r.y, GROUND_Y-4), 46, 0, true); }   // no building/civilian damage
  }
  rockets = rockets.filter(r => !r.gone);

  // ── bullets ──
  for (const b of bullets) {
    b.x += b.vx*dt; b.y += b.vy*dt; b.life -= dt;
    if (dist2(b.x,b.y,P.x,P.y) < 20*20) {
      b.life = 0; shake(1); sfxHit();
      sparks.push({x:b.x, y:b.y, vx:rand(-100,100), vy:rand(-100,100), life:0.15, c:'#ffe9a0'});
    } else if (cellIntactAt(b.x, b.y)) b.life = 0;
  }
  bullets = bullets.filter(b => b.life > 0);

  // ── Starlight's electric bolts (stun on hit) ──
  for (const eb of electroBolts) {
    eb.x += eb.vx*dt; eb.y += eb.vy*dt; eb.life -= dt;
    if (dist2(eb.x,eb.y,P.x,P.y) < 32*32) {
      eb.life = 0; P.stunT = 2; boltLockout = 2; P.hurtFlash = 1; shake(14); sfxHit(); thump(200, 0.3, 0.25);
      for (let i=0;i<10;i++) sparks.push({x:eb.x,y:eb.y,vx:rand(-160,160),vy:rand(-160,160),life:rand(0.2,0.4),c:'#fff35a'});
    } else if (cellIntactAt(eb.x, eb.y) || eb.y > GROUND_Y) eb.life = 0;
  }
  electroBolts = electroBolts.filter(eb => eb.life > 0);

  // ── Starlight's light balls (spawned from windows/lamps, weak homing) ──
  for (const lb of lightBalls) {
    const ldx = P.x-lb.x, ldy = P.y-lb.y, ld = Math.hypot(ldx,ldy)||1;
    lb.vx += (ldx/ld)*110*dt; lb.vy += (ldy/ld)*110*dt;
    const lsp = Math.hypot(lb.vx,lb.vy), lmx = 480;
    if (lsp > lmx) { lb.vx *= lmx/lsp; lb.vy *= lmx/lsp; }
    lb.x += lb.vx*dt; lb.y += lb.vy*dt; lb.life -= dt;
    if (dist2(lb.x,lb.y,P.x,P.y) < 18*18) {
      lb.life = 0; P.hurtFlash = 1; shake(8); sfxHit();
      const kd = Math.hypot(P.x-lb.x,P.y-lb.y)||1;
      P.vx += (P.x-lb.x)/kd*260; P.vy += (P.y-lb.y)/kd*260;
    } else if (cellIntactAt(lb.x, lb.y) || lb.y > GROUND_Y) lb.life = 0;
  }
  lightBalls = lightBalls.filter(lb => lb.life > 0);

  // ── gibs / debris (heavy chunks crush pedestrians) ──
  for (const g of gibs) {
    if (inWater(g.x, g.y)) {
      // underwater: heavy drag, slow sink, thin blood trail — no bouncing off the "surface"
      g.vx -= g.vx*2.6*dt; g.vy += (140 - g.vy)*1.4*dt;
      g.x += g.vx*dt; g.y += g.vy*dt; g.rot += g.vr*0.3*dt; g.life -= dt;
      if (Math.random() < dt*2.5) waterBlood(g.x, g.y, rand(3,7));
      if (g.y > WATER_FLOOR - 6) { g.y = WATER_FLOOR - 6; g.vy = 0; g.vx *= 0.8; }
      continue;
    }
    g.vy += 1500*dt;
    g.x += g.vx*dt; g.y += g.vy*dt; g.rot += g.vr*dt; g.life -= dt;
    if (g.x > WATER_X && g.y > GROUND_Y - 4 && g.vy > 100) splash(g.x, g.vy*0.4);
    if (g.x > WATER_X) continue;   // fell into the water zone — handled by the branch above next frame
    const s = surfaceBelow(g.x, g.y - 20);
    if (g.y > s - g.r) {
      g.y = s - g.r;
      if (Math.abs(g.vy) > 60) bakeSplat(g.x, s, rand(5,12), '#5e0c0c', rand(0.4,0.7));
      g.vy *= -0.35; g.vx *= 0.6; g.vr *= 0.6;
    }
  }
  gibs = gibs.filter(g => g.life > 0);
  if (gibs.length > 280) gibs.splice(0, gibs.length-280);
  for (const g of debris) {
    if (inWater(g.x, g.y)) {
      g.vx -= g.vx*2.6*dt; g.vy += (160 - g.vy)*1.4*dt;
      g.x += g.vx*dt; g.y += g.vy*dt; g.rot += g.vr*0.3*dt; g.life -= dt;
      if (g.y > WATER_FLOOR - 5) { g.y = WATER_FLOOR - 5; g.vy = 0; g.vx *= 0.8; }
      continue;
    }
    g.vy += 1400*dt;
    g.x += g.vx*dt; g.y += g.vy*dt; g.rot += g.vr*dt; g.life -= dt;
    if (g.x > WATER_X && g.y > GROUND_Y - 4 && g.vy > 120 && Math.random() < 0.5) splash(g.x, g.vy*0.3);
    if (g.x > WATER_X) continue;
    if (g.heavy && g.vy > 240) {
      for (const c of civs) if (!c.dead && dist2(g.x,g.y,c.x,c.y-14) < 18*18) { c.dead=true; gibBurst(c.x,c.y-14,1); addKill(); }
      for (const gr of grunts) if (!gr.dead && dist2(g.x,g.y,gr.x,gr.y-16) < 18*18) { gr.dead=true; gibBurst(gr.x,gr.y-16,1); addKill(); }
    }
    const s = surfaceBelow(g.x, g.y - 20);
    if (g.y > s - g.r) { g.y = s - g.r; g.vy *= -0.3; g.vx *= 0.6; }
  }
  debris = debris.filter(g => g.life > 0);
  if (debris.length > 300) debris.splice(0, debris.length-300);

  // ── blood ──
  for (const b of bloods) {
    b.vy += 1400*dt;
    b.x += b.vx*dt; b.y += b.vy*dt; b.life -= dt;
    if (b.x > WATER_X) {
      // hits the water: becomes a drifting cloud that lingers far longer than land blood
      if (b.y > GROUND_Y) { waterBlood(b.x, b.y, rand(5,11)); b.life = 0; }
      continue;
    }
    const s = surfaceBelow(b.x, b.y - 12);
    if (b.y >= s) { bakeSplat(b.x, s, rand(2.5, 9), '#5e0c0c', rand(0.4,0.75)); b.life = 0; }
  }
  bloods = bloods.filter(b => b.life > 0);
  if (bloods.length > 500) bloods.splice(0, bloods.length-500);

  // ── water blood clouds + bubbles ──
  for (const w of waterBloods) {
    w.x += w.vx*dt; w.y += w.vy*dt; w.r += w.vr*dt; w.life -= dt;
    w.y = clamp(w.y, GROUND_Y+6, WATER_FLOOR-10);
  }
  waterBloods = waterBloods.filter(w => w.life > 0);
  if (waterBloods.length > 130) waterBloods.splice(0, waterBloods.length-130);
  for (const b of bubbles) {
    b.x += b.vx*dt; b.y += b.vy*dt; b.life -= dt;
    if (b.y <= GROUND_Y + 3) b.life = 0;   // reached the surface — pop
  }
  bubbles = bubbles.filter(b => b.life > 0);
  if (bubbles.length > 120) bubbles.splice(0, bubbles.length-120);

  // ── fx ──
  for (const s of sparks) { s.x+=s.vx*dt; s.y+=s.vy*dt; s.vy+=800*dt; s.life-=dt; }

    vx: rand(-15,15), vy: rand(-70,-30), life: rand(2,4), r: rand(1,2.5) });
  for (const e of embers) { e.x += e.vx*dt; e.y += e.vy*dt; e.vx += Math.sin(gameT*2 + e.y*0.01)*8*dt; e.life -= dt; }
  embers = embers.filter(e => e.life > 0);
  if (embers.length > 140) embers.splice(0, embers.length-140);
  for (const b of fgBuildings) {
    if (b.burning && !b.collapsed && !b.collapsing && Math.abs(b.x-P.x) < VW*1.5 && Math.random() < dt*4) {
      smokes.push({ x: b.x + rand(0,b.w), y: b.roofY - rand(0,20), r: rand(14,30), vr: rand(18,36),
        vy: rand(-45,-20), life: rand(1.2,2.2), c: 'rgba(90,80,86,' });

}

    cx.fillStyle = '#f2ede2'; cx.font = 'bold 42px Georgia'; cx.textAlign = 'center';
    cx.fillText('PAUSED', VW/2, VH/2);
    cx.font = '16px Georgia'; cx.fillText('press P to resume', VW/2, VH/2+34);
    cx.textAlign = 'left';
  }
}

// ─── Main loop ───
let lastT = performance.now();
function frame(now) {
  const dt = Math.min(0.033, (now - lastT)/1000);
  lastT = now;
  if (freezeT > 0) { freezeT -= dt; draw(); requestAnimationFrame(frame); return; }
  if (!paused) update(dt);
  draw();
  requestAnimationFrame(frame);
}
for (let i=0;i<20;i++) spawnGrunt(false);
for (let i=0;i<5;i++) spawnGrunt(true);
for (let i=0;i<60;i++) spawnCiv();
for (let i=0;i<18;i++) spawnCar();
setTimeout(() => { const h = document.getElementById('hint'); if (h) h.style.opacity = '0'; }, 16000);
requestAnimationFrame(frame);
</script>
