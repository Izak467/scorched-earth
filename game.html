<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>SCORCHED EARTH</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  html,body { margin:0; padding:0; height:100%; overflow:hidden; background:#0a0a12; }
  canvas { display:block; width:100vw; height:100vh; cursor:crosshair; }
  #hud {
    position:fixed; top:14px; left:18px; color:#f2ede2; z-index:5;
    font-family:Georgia,'Times New Roman',serif; user-select:none; pointer-events:none;

  }
  #kills { font-size:30px; font-weight:bold; letter-spacing:1px; }
  #dmg { font-size:16px; color:#7fe08a; margin-top:1px; }

  #title {
    position:fixed; top:12px; left:50%; transform:translateX(-50%);
    color:rgba(242,237,226,.9); font-family:Georgia,serif; font-weight:bold;
    font-size:17px; letter-spacing:5px; z-index:5; user-select:none; pointer-events:none;
    text-shadow:0 2px 8px rgba(0,0,0,.9);
    opacity:0; transition:opacity 0.8s;
  }
  #hint {

    padding:7px 16px; border-radius:8px; font-family:Georgia,serif; font-size:12.5px;
    letter-spacing:.4px; z-index:5; user-select:none; pointer-events:none;
    transition:opacity 1.5s; white-space:nowrap;
    opacity:0;   /* hidden during the intro, faded in at handoff same as #hud/#title */
  }
</style>
</head>
<body>
<div id="title">SCORCHED EARTH</div>
<div id="hud"><div id="kills">0 KILLS</div><div id="dmg">$0 DAMAGE</div><div id="streak"></div></div>
<div id="hint">WASD/ARROWS fly (speed builds) · MOUSE aim · HOLD CLICK laser · DOUBLE-TAP dir DASH (hold a 2nd dir = diagonal) · dash DOWN into street = SLAM · SPACE thunderclap · M mute · P pause</div>
<canvas id="cv"></canvas>
<script>
'use strict';
// ═══════════════════ SCORCHED EARTH v3 ═══════════════════
// Granular destructible city with structural collapse, traffic,
// jetpack troopers, hostile rockets, physical thunderclap.

const cv = document.getElementById('cv');
const cx = cv.getContext('2d');
let VW = 0, VH = 0;
function resize() { VW = cv.width = window.innerWidth; VH = cv.height = window.innerHeight; }
window.addEventListener('resize', resize); resize();

// ─── World constants ───
// zone layout, left to right: city streets 0..CITY_W, working dock CITY_W..WATER_X,
// then open water out to the world edge. GROUND_Y doubles as the water surface level.
const WORLD_W = 36000;
const CITY_W = 28000;
const WATER_X = 30000;
const GROUND_Y = 1660;
const WATER_FLOOR = GROUND_Y + 520;   // the sea here is shallow — you can dip under, not dive
const CW = 17, CH = 23;              // structural cell (windows sit on 2x2 blocks)
const rand = (a,b) => a + Math.random()*(b-a);
const randi = (a,b) => Math.floor(rand(a,b+1));
const clamp = (v,a,b) => v<a?a:v>b?b:v;
const dist2 = (ax,ay,bx,by) => { const dx=ax-bx, dy=ay-by; return dx*dx+dy*dy; };
const angDiff = (a,b) => { let d = a-b; while (d > Math.PI) d -= Math.PI*2; while (d < -Math.PI) d += Math.PI*2; return d; };
function segDist(px,py,ax,ay,bx,by) {
  const abx=bx-ax, aby=by-ay;
  const t = clamp(((px-ax)*abx + (py-ay)*aby) / (abx*abx + aby*aby || 1), 0, 1);
  return Math.sqrt(dist2(px,py, ax+abx*t, ay+aby*t));
}

// ─── Permanent gore: baked decal canvas ───
// only covers land (city + dock) — nothing bakes onto water; blood out there is the
// transient drifting-cloud system instead, which is also what keeps the 40K world affordable
const DS = 0.5;
const decalCv = document.createElement('canvas');
decalCv.width = Math.ceil(WATER_X*DS); decalCv.height = Math.ceil((GROUND_Y+140)*DS);
const dcx = decalCv.getContext('2d');
function bakeSplat(x, y, r, color, alpha) {
  if (x > WATER_X - 4) return;
  dcx.globalAlpha = alpha;
  dcx.fillStyle = color;
  dcx.beginPath(); dcx.ellipse(x*DS, (y+1)*DS, r*DS, r*0.34*DS, 0, 0, 7); dcx.fill();
  dcx.globalAlpha = 1;
}
function bakeScorch(x, y, r) {
  if (x > WATER_X - 4) return;
  // permanent, so a circle straddling the shoreline would sit there half-clipped by the water
  // rendering forever instead of fading — clamp it to stay entirely on dry land
  r = Math.min(r, WATER_X - x);
  if (r <= 1) return;
  dcx.globalAlpha = 0.5; dcx.fillStyle = '#0c0a0a';
  dcx.beginPath(); dcx.arc(x*DS, y*DS, r*DS, 0, 7); dcx.fill();
  dcx.globalAlpha = 1;
}
// ─── Water FX: splashes, drifting blood clouds, rising bubbles ───
let waterBloods = [], bubbles = [], ripples = [];
function splash(x, mag) {
  const n = Math.round(clamp(6 + mag*0.02, 6, 18));
  for (let i=0;i<n;i++) sparks.push({ x: x+rand(-14,14), y: GROUND_Y+2,
    vx: rand(-90,90), vy: -rand(80, 140 + mag*0.5), life: rand(0.25,0.55),
    c: Math.random()<0.5 ? '#bfe2f2' : '#e8f6fc' });
  // a water-colored ripple, not a fireball ring — every civilian death out here was reading as
  // an "explosion" because it reused the same big orange shockwave the actual blasts use
  const maxR = clamp(20 + mag*0.12, 18, 110);
  ripples.push({ x, y: GROUND_Y, r: 4, maxR, life: 0.5, maxLife: 0.5 });
  if (mag > 300) thump(70, 0.25, 0.2);
}
function waterBlood(x, y, r) {
  // lives much longer than a land blood pool — the whole hold-then-fade curve in the draw loop
  // scales off this duration, so stretching it out slows the actual fade, not just the timer
  waterBloods.push({ x, y: Math.max(y, GROUND_Y+8), r, vr: rand(3,7),
    vx: rand(-9,9), vy: rand(3,10), life: rand(85,120), maxLife: 100 });
}
function bubbleAt(x, y) {
  bubbles.push({ x, y, vy: -rand(35,85), vx: rand(-10,10), r: rand(1.2,3), life: rand(0.6,1.6) });
}
// transient scorch: for heli/rocket/car blasts — fades out instead of staying baked forever
let scorchFx = [];
function flashScorch(x, y, r) { if (x > WATER_X) return; scorchFx.push({x, y, r: Math.min(r, WATER_X - x), life: 1.3, maxLife: 1.3}); }

// ─── City generation ───
const fgBuildings = [];
// purely decorative rooflines, drawn above roofY same as the existing watertower/antenna — the
// destructible cell grid never changes shape, this is just what breaks up the skyline silhouette
// so knocking a building down doesn't always look like the same box every time
function pickRoofStyle(archetype) {
  const r = Math.random();
  if (archetype === 'construction') return null;   // reads as unfinished — no cap fits that
  if (archetype === 'glass') return r < 0.5 ? 'spire' : r < 0.8 ? 'setback' : null;
  if (archetype === 'brick') return r < 0.45 ? 'sawtooth' : r < 0.6 ? 'mechanical' : null;
  // default grid buildings — a mix, but most still stay plain flat
  if (r < 0.14) return 'setback';
  if (r < 0.26) return 'spire';
  if (r < 0.38) return 'sawtooth';
  if (r < 0.46) return 'mechanical';
  return null;
}
// individually destructible pieces for the roofline cap — geometry here has to stay in exact sync
// with how drawCity renders each style (both index off the same chunk array), since a chunk's
// offset/size IS its hitbox and IS what disappears when it dies. same idea as the ship's own
// destructible edge detail, just for the rooftop caps.
function makeRoofChunks(w, style, rubbleSeed) {
  const chunks = [];
  if (style === 'setback') {
    let tw = w*0.7, oy = 0;
    for (let t=0;t<3;t++) { const th=16; chunks.push({ox:(w-tw)/2, oy:oy-th, w:tw, h:th, hp:26, dead:false}); oy -= th; tw *= 0.72; }
  } else if (style === 'spire') {
    const sh = 70 + rubbleSeed*40;
    chunks.push({ox: w*0.5-10, oy: -sh*0.5, w:20, h: sh*0.5, hp:20, dead:false});
    chunks.push({ox: w*0.5-2, oy: -sh, w:4, h: sh*0.5, hp:14, dead:false});
  } else if (style === 'sawtooth') {
    const teeth = Math.max(3, Math.round(w/40)), tw = w/teeth;
    for (let i=0;i<teeth;i++) chunks.push({ox: i*tw, oy: -14, w: tw, h: 14, hp:16, dead:false});
  } else if (style === 'mechanical') {
    const mw = Math.min(60, w*0.4);
    chunks.push({ox: w*0.5-mw/2, oy: -22, w: mw, h: 22, hp:34, dead:false});
  }
  return chunks;
}
function roofChunkPop(rc, wx, wy) {
  if (rc.dead) return;
  rc.dead = true;
  for (let i=0;i<5;i++) debris.push({ x: wx+rand(-6,6), y: wy+rand(-6,6), vx: rand(-120,120), vy: rand(-180,20),
    rot: rand(0,7), vr: rand(-7,7), r: rand(2,4.5), c: ['#2e2638','#241e2e','#3a3346'][randi(0,2)], life: rand(1,2) });
  if (Math.random()<0.5) sparks.push({x:wx,y:wy,vx:rand(-80,80),vy:rand(-100,-10),life:rand(0.12,0.25),c:'#ffdd66'});
  sfxCrack();
}
(function genCity(){
  let x = -100;
  while (x < CITY_W - 500) {
    const cols = 2*randi(5, 11), rows = 2*randi(7, 20);
    const w = cols*CW, h = rows*CH;
    const cells = new Float32Array(cols*rows);
    const wins = [];
    const bigCols = cols/2, bigRows = rows/2;
    for (let c=0;c<bigCols;c++) for (let r=0;r<bigRows;r++)
      if (Math.random()<0.55) wins.push({c, r, warm:Math.random()<0.75, civ:Math.random()<0.22});
    // most buildings are the plain window-grid default; the rest get a distinct archetype so the
    // single most-repeated action in the game (knocking one down) doesn't always play out the same
    const archRoll = Math.random();
    const archetype = archRoll < 0.15 ? 'glass' : archRoll < 0.3 ? 'brick' : archRoll < 0.4 ? 'construction' : null;
    const roofStyle = pickRoofStyle(archetype), rubbleSeed = Math.random();
    fgBuildings.push({x, w, h, cols, rows, roofY: GROUND_Y-h, shade: randi(0,2), wins, cells,
      destroyed: 0, collapsed: false, rubbleSeed, dirty: false, supActive: false, supT: 0,
      ant: Math.random()<0.4, ac: Math.random()<0.6 ? rand(20,w-50) : -1, burning: Math.random()<0.07,
      watertower: w > 200 && Math.random()<0.08, archetype, roofStyle, roofChunks: makeRoofChunks(w, roofStyle, rubbleSeed)});
    x += w + rand(180, 460);
  }
})();
// ─── Vought Tower: the tallest building in the city, planted at city center — the intro
// cinematic starts here, and later collapses/regrowths (see the building-respawn system, below
// in update()) reuse this exact same field-setup so the tower always comes back as itself
// instead of rerolling into a generic building.
let voughtTower = null;
function applyTowerFields(b) {
  // roughly 35% taller than the tallest normal building (920) — unmistakably the tallest thing
  // in the city, but still comfortably inside the player's actual altitude ceiling (P.y is
  // clamped to a minimum of 60 in update(), ~line 1367 — a much taller tower would put its own
  // roof, and the V on top of it, permanently above where the player can ever fly)
  const rows = 54, h = rows*CH;   // even, matching every other building's `2*randi(...)` row count
  const cols = b.cols;
  const cells = new Float32Array(cols*rows);
  const wins = [];
  const bigCols = cols/2, bigRows = rows/2;
  for (let c=0;c<bigCols;c++) for (let r=0;r<bigRows;r++)
    if (Math.random()<0.6) wins.push({c, r, warm:Math.random()<0.8, civ:false});
  Object.assign(b, {
    h, rows, roofY: GROUND_Y - h, cells, wins, shade: 0, archetype: 'tower', roofStyle: null, roofChunks: [],
    ant: false, ac: -1, watertower: false, burning: false,
    destroyed: 0, collapsed: false, collapsing: false, rubbleSeed: Math.random(), dirty: false, supActive: false, supT: 0,
    isTower: true, glassIntact: true, collapsedAtT: undefined
  });
}
(function plantVoughtTower(){
  // whichever generated building is closest to city center (preferring the widest nearby
  // candidate for a sturdier-looking footprint) becomes the tower — overwritten in place so its
  // x stays put and the sorted array `findBuildingAt` depends on is never disturbed
  const centerX = CITY_W/2;
  let best = null, bestW = -1;
  for (const b of fgBuildings) {
    if (Math.abs((b.x+b.w/2) - centerX) < 2200 && b.w > bestW) { best = b; bestW = b.w; }
  }
  if (best) { applyTowerFields(best); voughtTower = best; }
})();
// resets a collapsed building back to intact, in place (same x/w/array slot) — used by the
// building-respawn system in update() once a building is safely off-screen and aged out. rerolls
// height/windows/archetype/roofline/decorations so it reads as something new having gone up,
// not the identical building blinking back — except the tower, which restores its own gold/V-glass
// identity instead of rerolling into a generic building
function respawnBuilding(b) {
  if (b.isTower) { applyTowerFields(b); return; }
  const cols = b.cols, rows = 2*randi(7, 20), h = rows*CH;
  const cells = new Float32Array(cols*rows);
  const wins = [];
  const bigCols = cols/2, bigRows = rows/2;
  for (let c=0;c<bigCols;c++) for (let r=0;r<bigRows;r++)
    if (Math.random()<0.55) wins.push({c, r, warm:Math.random()<0.75, civ:Math.random()<0.22});
  const archRoll = Math.random();
  const archetype = archRoll < 0.15 ? 'glass' : archRoll < 0.3 ? 'brick' : archRoll < 0.4 ? 'construction' : null;
  const roofStyle = pickRoofStyle(archetype), rubbleSeed = Math.random();
  Object.assign(b, {
    h, rows, roofY: GROUND_Y-h, cells, wins, shade: randi(0,2),
    destroyed: 0, collapsed: false, collapsing: false, rubbleSeed, dirty: false, supActive: false, supT: 0,
    ant: Math.random()<0.4, ac: Math.random()<0.6 ? rand(20,b.w-50) : -1, burning: Math.random()<0.07,
    watertower: b.w > 200 && Math.random()<0.08, archetype, roofStyle, roofChunks: makeRoofChunks(b.w, roofStyle, rubbleSeed),
    collapsedAtT: undefined, respawnGate: undefined
  });
}
// ─── The docked ship: three adjacent "buildings" (stern hull, bridge tower, bow hull) pushed
// after the city so fgBuildings stays sorted — all the laser/cell/collapse physics come free.
const SHIP_X = WATER_X + 400;
const shipPieces = [];
function makeShipPiece(x, cols, rows, opts) {
  const w = cols*CW, h = rows*CH;
  const wins = [];
  for (let c=0;c<cols/2;c++) for (let r=0;r<rows/2;r++)
    if (Math.random()<0.6) wins.push({c, r, warm:Math.random()<0.7, civ:Math.random()<0.3});
  const b = {x, w, h, cols, rows, roofY: GROUND_Y-h, shade: 0, wins, cells: new Float32Array(cols*rows),
    destroyed: 0, collapsed: false, rubbleSeed: Math.random(), dirty: false, supActive: false, supT: 0,
    ant: !!(opts&&opts.ant), ac: -1, burning: false, ship: true, bow: !!(opts&&opts.bow), stern: !!(opts&&opts.stern),
    roofStyle: null, roofChunks: []};
  fgBuildings.push(b); shipPieces.push(b);
  return b;
}
(function genShip(){
  let sx = SHIP_X;
  const stern = makeShipPiece(sx, 36, 12, {stern:true}); sx += stern.w;
  const tower = makeShipPiece(sx, 14, 26, {ant:true}); sx += tower.w;
  makeShipPiece(sx, 34, 12, {bow:true});
})();
function resetShip() {
  for (const b of shipPieces) {
    b.cells.fill(0); b.destroyed = 0; b.collapsed = false; b.collapsing = false;
    b.dirty = false; b.supActive = false; b.supT = 0; b.burning = false;
    b.wins = [];
    for (let c=0;c<b.cols/2;c++) for (let r=0;r<b.rows/2;r++)
      if (Math.random()<0.6) b.wins.push({c, r, warm:Math.random()<0.7, civ:Math.random()<0.3});
  }
}
// ─── Street furniture: sparse, one-hit, no AI — texture between building-scale destruction ───
const streetProps = [];
(function genStreetProps(){
  let x = 60;
  while (x < CITY_W - 100) {
    const r = Math.random();
    if (r < 0.09) streetProps.push({ x, type: 'light', dead: false });
    else if (r < 0.15) streetProps.push({ x, type: 'hydrant', dead: false, geyserT: 0 });
    x += rand(220, 420);
  }
})();
function streetLightBoom(p) {
  if (p.dead) return;
  p.dead = true;
  for (let i=0;i<4;i++) debris.push({ x: p.x+rand(-4,4), y: GROUND_Y-118, vx: rand(-90,90), vy: rand(-140,-20),
    rot: rand(0,7), vr: rand(-6,6), r: rand(3,6), c: '#2a2634', life: rand(1,2) });
  for (let i=0;i<6;i++) sparks.push({x:p.x, y:GROUND_Y-118, vx:rand(-100,100), vy:rand(-120,20), life:rand(0.15,0.35), c:'#ffdd66'});
  sfxCrack(); shake(3);
}
function hydrantBoom(p) {
  if (p.dead || p.geyserT > 0) return;
  p.geyserT = rand(3.5, 5);
  splash(p.x, 260);
  sfxCrack();
}
// ─── Dock containers: destructible stacked props — cuttable, dashable, topple and crush ───
const containers = [];
(function genDock(){
  // just the train's own four colors — its red, its blue, its stripe gold, and one grey
  const CONTAINER_COLORS = ['#5d2d33','#3d4a5d','#c98a3a','#4a5568'];
  // pure per-container random picks let the same color (often one of the two grey/blue-grey ones)
  // land right next to itself, vertically in a stack or horizontally between stacks — pick avoiding
  // both neighbors so no two touching crates ever match
  function pickColor(exclude) {
    let c;
    do { c = CONTAINER_COLORS[randi(0,3)]; } while (exclude.includes(c));
    return c;
  }
  let x = CITY_W + 140;
  let prevStackColors = [];
  while (x < WATER_X - 300) {
    if (Math.random() < 0.92) {
      const stack = randi(3, 7);
      const curColors = [];
      for (let s=0;s<stack;s++) {
        const exclude = [];
        if (s > 0) exclude.push(curColors[s-1]);
        if (prevStackColors[s] !== undefined) exclude.push(prevStackColors[s]);
        const c = pickColor(exclude);
        curColors.push(c);
        containers.push({ x, y: GROUND_Y - (s+1)*46, w: 118, h: 46,
          c, dead: false, vy: 0, vx: 0,
          hp: 170, maxHp: 170, settled: true });
      }
      prevStackColors = curColors;
      x += 122;
    } else { x += rand(30, 70); prevStackColors = []; }
  }
})();
function containerBoom(ct) {
  if (ct.dead) return;
  ct.dead = true;
  addDamage(35000);
  // anything that was resting on this one loses its support and needs to recompute a rest height
  for (const o of containers) if (!o.dead && Math.abs(o.x-ct.x) < ct.w*0.7 && o.y < ct.y) o.settled = false;
  for (let i=0;i<10;i++) debris.push({ x: ct.x+rand(0,ct.w), y: ct.y+rand(0,ct.h),
    vx: rand(-200,200), vy: rand(-260,-40), rot: rand(0,7), vr: rand(-7,7),
    r: rand(3,7), c: ct.c, life: rand(1.2,2.4) });
  for (let i=0;i<8;i++) sparks.push({ x: ct.x+ct.w/2, y: ct.y+ct.h/2, vx: rand(-160,160), vy: rand(-180,-20),
    life: rand(0.15,0.35), c: ['#ffdd66','#ff8833'][randi(0,1)] });
  sfxCrack(); shake(4);
}
function makeLayer(minH, maxH, minW, maxW) {
  const arr = []; let x = -300;
  while (x < CITY_W + 200) {
    const w = rand(minW,maxW), h = rand(minH,maxH);
    arr.push({x,w,h}); x += w + rand(10,80);
  }
  return arr;
}
const farLayer = makeLayer(500, 1100, 120, 260);
const midLayer = makeLayer(350, 850, 140, 300);
const clouds = [];
const N_CLOUDS = Math.round(14 * WORLD_W/7000);
for (let i=0;i<N_CLOUDS;i++) clouds.push({x:rand(0,WORLD_W), y:rand(60,600), s:rand(0.6,1.8), v:rand(3,10)});

function cellIdx(b, wx, wy) {
  const ci = Math.floor((wx - b.x)/CW), cj = Math.floor((wy - b.roofY)/CH);
  if (ci<0||ci>=b.cols||cj<0||cj>=b.rows) return -1;
  return cj*b.cols + ci;
}
// fgBuildings is generated left-to-right with gaps and never overlaps, so both
// b.x and b.x+b.w are monotonically increasing across the array — binary search
// beats a linear scan once the world (and building count) gets large.
function findBuildingAt(x) {
  let lo = 0, hi = fgBuildings.length - 1;
  while (lo <= hi) {
    const mid = (lo+hi) >> 1;
    const b = fgBuildings[mid];
    if (x < b.x) hi = mid - 1;
    else if (x > b.x + b.w) lo = mid + 1;
    else return b;
  }
  return null;
}
function findBuildingIndexAt(x) {
  let lo = 0, hi = fgBuildings.length - 1;
  while (lo <= hi) {
    const mid = (lo+hi) >> 1;
    const b = fgBuildings[mid];
    if (x < b.x) hi = mid - 1;
    else if (x > b.x + b.w) lo = mid + 1;
    else return mid;
  }
  return -1;
}
function firstBuildingIndexEndingAtOrAfter(xMin) {
  let lo = 0, hi = fgBuildings.length;
  while (lo < hi) {
    const mid = (lo+hi) >> 1;
    if (fgBuildings[mid].x + fgBuildings[mid].w < xMin) lo = mid + 1; else hi = mid;
  }
  return lo;
}
function cellIntactAt(wx, wy) {
  const b = findBuildingAt(wx);
  if (!b || b.collapsed || b.collapsing || wy < b.roofY || wy > GROUND_Y) return null;
  const i = cellIdx(b, wx, wy);
  return (i >= 0 && b.cells[i] < 1) ? b : null;
}
function surfaceBelow(x, y) {
  const b = findBuildingAt(x);
  if (b && !b.collapsed && !b.collapsing) {
    const ci = Math.floor((x - b.x)/CW);
    if (ci >= 0 && ci < b.cols) {
      const startJ = Math.max(0, Math.floor((y - b.roofY)/CH));
      for (let cj = startJ; cj < b.rows; cj++) {
        if (b.cells[cj*b.cols+ci] < 1) {
          const top = b.roofY + cj*CH;
          if (top >= y) return top;
          break;
        }
      }

}

window.addEventListener('keydown', e => {
  if (e.code==='Space' || e.code.slice(0,5)==='Arrow') e.preventDefault();

// ─── Audio ───
let AC = null, muted = false, master = null, laserGain = null;
function audioBoot() {
  if (AC) return;
  try {
    AC = new (window.AudioContext||window.webkitAudioContext)();
    master = AC.createGain(); master.gain.value = 0.4;
    // limiter on the bus — the dock especially can fire several booms/thumps in the same frame
    // (containers, sharks, tanks all going off near each other), and without this they just sum
    // and clip at the destination, which reads as crackle/pop rather than "loud"
    const limiter = AC.createDynamicsCompressor();
    limiter.threshold.value = -20; limiter.knee.value = 14; limiter.ratio.value = 14;
    limiter.attack.value = 0.003; limiter.release.value = 0.25;
    master.connect(limiter); limiter.connect(AC.destination);
    const osc = AC.createOscillator(); osc.type='triangle'; osc.frequency.value=68;
    const lfo = AC.createOscillator(); lfo.frequency.value=17;
    const lfoG = AC.createGain(); lfoG.gain.value=10;
    lfo.connect(lfoG); lfoG.connect(osc.frequency); lfo.start();
    const filt = AC.createBiquadFilter(); filt.type='lowpass'; filt.frequency.value=380;
    laserGain = AC.createGain(); laserGain.gain.value=0;
    osc.connect(filt); filt.connect(laserGain); laserGain.connect(master);
    osc.start();
  } catch(e) { AC = null; }
}
function noiseBurst(dur, freq, vol, type) {
  if (!AC || muted) return;
  const n = AC.sampleRate * dur, buf = AC.createBuffer(1, n, AC.sampleRate);
  const d = buf.getChannelData(0);
  for (let i=0;i<n;i++) d[i] = (Math.random()*2-1) * (1 - i/n);
  const src = AC.createBufferSource(); src.buffer = buf;
  const f = AC.createBiquadFilter(); f.type = type||'lowpass'; f.frequency.value = freq;
  const g = AC.createGain(); g.gain.value = vol;
  src.connect(f); f.connect(g); g.connect(master); src.start();
}
function thump(freq, dur, vol) {
  if (!AC || muted) return;
  const o = AC.createOscillator(); o.type='sine'; o.frequency.setValueAtTime(freq, AC.currentTime);
  o.frequency.exponentialRampToValueAtTime(Math.max(28,freq*0.4), AC.currentTime+dur);
  const g = AC.createGain(); g.gain.setValueAtTime(vol, AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime+dur);
  o.connect(g); g.connect(master); o.start(); o.stop(AC.currentTime+dur);
}
const sfxSplat = () => { noiseBurst(0.14, 420, 0.16); thump(110, 0.12, 0.12); };
// both of these fire constantly in combat (every dash, every single hit connecting) — high-frequency
// bandpass/highpass noise reads as a sibilant hiss, and at the old freq/volume that adds up fast
const sfxDash  = () => noiseBurst(0.25, 950, 0.1, 'bandpass');
const sfxHit   = () => noiseBurst(0.04, 1700, 0.035, 'highpass');
const sfxBoom  = () => { noiseBurst(0.5, 240, 0.35); thump(52, 0.45, 0.3); };
const sfxCrack = () => noiseBurst(0.08, 900, 0.07);

function startDash(dir) {
  if (paused || P.stunT > 0 || introActive) return;
  // while a continuous down-slam is in progress, double-tapping up cancels it instead of
  // starting a new dash
  if (P.dashT > 0 && P.vertDash === 'down' && dir === 'up') {
    P.dashT = 0; P.vertDash = null; P.dashCoastT = 0.5;
    return;
  }
  if (P.dashCd > 0) return;
  const V = {left:{x:-1,y:0}, right:{x:1,y:0}, up:{x:0,y:-1}, down:{x:0,y:1}}[dir];
  let dx = V.x, dy = V.y;
  if (dx !== 0) {
    if (keys.KeyW||keys.ArrowUp) dy = -1;
    else if (keys.KeyS||keys.ArrowDown) dy = 1;
  } else {
    if (keys.KeyA||keys.ArrowLeft) dx = -1;
    else if (keys.KeyD||keys.ArrowRight) dx = 1;
  }
  const m = Math.hypot(dx,dy);
  P.dashDir = {x:dx/m, y:dy/m};

  // altitude — give it a generous duration cap instead of the normal short dash window, and let the
  // ground-proximity check below end it the instant it actually gets there. Straight up is just the
  // regular dash-punch, held a hair longer than normal for a bit of extra height.
  P.vertDash = (dir === 'down') ? dir : null;
  if (P.vertDash) P.slamStartY = P.y;   // remembered so the landing can scale its punch with how far he actually fell
  P.dashT = P.vertDash ? 3 : (dir === 'up' ? 0.38 : 0.30);

  // a dash lasts several frames, and anything with real HP (as opposed to fodder that just dies
  // outright) could still be inside the hit radius on the next frame if it wasn't shoved clear in
  // time — without this, one dash could quietly land its damage 3-5x on a boss. one hit per swing.
  P.dashHitSet.clear();

}

// hostile=true → enemy ordnance: wrecks buildings + knocks YOU, no kill credit / no friendly fire
// scale (0-1) trims the particle-heavy visuals for frequent/small blasts (cars) without touching gameplay radius
function explode(x, y, r, cellFrac, hostile, scale, noRing) {
  scale = scale === undefined ? 1 : scale;
  // an explosion should only read as an explosion (fireball, boom, shake) when it's actually
  // damaging the ship/dock structure — anything landing in open water is just a splash, not a blast
  const shipHere = x > WATER_X && (() => { const b = findBuildingAt(x); return b && !b.collapsed && !b.collapsing; })();
  const openWater = x > WATER_X && y > GROUND_Y - 20 && !shipHere;
  if (!openWater) {
    if (!noRing) rings.push({x, y, r: 6, life: 0.45, w: 4});
    const nSparks = Math.round(26*scale);
    for (let i=0;i<nSparks;i++) {
      const a = rand(0,7), sp = rand(60, 420);
      sparks.push({ x, y, vx: Math.cos(a)*sp, vy: Math.sin(a)*sp - 60, life: rand(0.15,0.5),
        c: ['#ffdd66','#ff8833','#ff4422'][randi(0,2)] });
    }
    const nSmoke = Math.round(8*scale);
    for (let i=0;i<nSmoke;i++) smokes.push({ x: x+rand(-14,14), y: y+rand(-14,14), r: rand(10,22),
      vr: rand(26,50), vy: rand(-50,-15), life: rand(0.5,1.0), c: 'rgba(105,94,106,' });
  }
  if (!hostile) {
    for (const g of grunts) if (!g.dead && dist2(g.x,g.y-16,x,y) < r*r) { g.dead=true; gibBurst(g.x,g.y-16,1.2); addKill(); }
    for (const c of civs) if (!c.dead && dist2(c.x,c.y-14,x,y) < r*r) { c.dead=true; gibBurst(c.x,c.y-14,1.1); addKill(); }
    for (const car of cars) if (!car.dead && dist2(car.x,car.y-10,x,y) < r*r) carBoom(car);
    for (const s of supes) if (s.hp>0 && dist2(s.x,s.y,x,y) < r*r) { s.hp -= 55; if (s.hp<=0) { gibBurst(s.x,s.y,1.5,true); addKill(); if (s.boss) { starlightTimer = rand(140, 190); announceBossKill('STARLIGHT', s.x, s.y); } } }
  }
  if (dist2(P.x,P.y,x,y) < (r+30)*(r+30)) {
    const d = Math.hypot(P.x-x,P.y-y)||1;
    P.vx += (P.x-x)/d*520; P.vy += (P.y-y)/d*520;
    P.hurtFlash = 1; shake(10);
  }
  damageCellsInRadius(x, y, r*0.85, cellFrac === undefined ? 1 : cellFrac);
  flashScorch(x, Math.min(y, GROUND_Y), r*0.5);
  if (x > WATER_X && y > GROUND_Y - r) {
    splash(x, openWater ? r*2.5 : r*6);
    for (let i=0;i<(openWater?3:8);i++) bubbleAt(x+rand(-r,r)*0.6, Math.max(y, GROUND_Y+10)+rand(-20,20));
  }
  if (!openWater) { shake(8); sfxBoom(); }
  panicNear(x, 800);
}
function carBoom(car) {
  if (car.dead) return;
  car.dead = true;
  addDamage(car.police ? 65000 : car.kind==='truck' ? 48000 : 22000);
  addKill();  // driver
  const big = car.kind === 'truck';
  gibBurst(car.x, car.y-12, big ? 1.1 : 0.85);
  // no fireball for cars — just a quick spark pop, no AOE/splash, no smoke/ring particles
  for (let i=0;i<6;i++) sparks.push({ x: car.x, y: car.y-8, vx: rand(-120,120), vy: rand(-160,-20),
    life: rand(0.15,0.35), c: ['#ffdd66','#ff8833'][randi(0,1)] });
  flashScorch(car.x, GROUND_Y, big ? 34 : 24);
  if (car.kind === 'boat') { splash(car.x, 500); waterBlood(car.x, GROUND_Y+16, 12); }
  shake(big ? 6 : 4); sfxBoom();
}
function heliDeath(h) {
  if (h.dead) return;
  h.dead = true; h.falling = true; h.hp = 0;
  addKill(); addDamage(3.2e6);
  // crew and blood thrown clear right away, same as a train car losing its passengers —
  // the hull itself still catches fire and rides the crash down separately below
  const tops = ['#7a8fae','#ae7a7a','#7aae8b','#aea77a'];
  for (let k=0;k<4;k++) fallers.push({ x: h.x+rand(-16,16), y: h.y+rand(-8,8),
    vx: rand(-90,90), vy: rand(-100,-20), skin: '#c8a080', top: tops[randi(0,3)], life: 6, dead: false });
  gibBurst(h.x, h.y, 1, false, 0, -40);
  // a small burst at the kill itself, same beat trains/jets already get — hostile so it doesn't
  // also chain-kill nearby fodder (the crew's already been thrown clear above), and noticeably
  // smaller than the real impact explosion still waiting for it when it actually hits the ground
  explode(h.x, h.y, 45, 0, true, 0.45, true);
  for (let i=0;i<10;i++) sparks.push({ x: h.x+rand(-20,20), y: h.y+rand(-10,10),
    vx: rand(-160,160), vy: rand(-140,40), life: rand(0.2,0.5), c: ['#ffdd66','#ff8833','#ff4422'][randi(0,2)] });
  for (let i=0;i<5;i++) smokes.push({ x: h.x+rand(-14,14), y: h.y, r: rand(8,16),
    vr: rand(20,36), vy: rand(-30,0), life: rand(0.5,0.9), c: 'rgba(80,72,84,' });
  noiseBurst(0.3, 700, 0.18, 'bandpass'); shake(6);
  h.vy = -60; h.vx = rand(-80,80);
}

// ─── Gore ───
const GIB_COLORS = ['#a01818','#7d1010','#b32222','#5e0c0c'];
const GIB_SHAPES = ['rect', 'blob', 'scrap'];   // limb-like, rounder torso-like, small irregular scrap
function gibBurst(x, y, power, big, bvx, bvy) {
  bvx = bvx||0; bvy = bvy||0;
  const n = big ? 14 : randi(7,10);
  for (let i=0;i<n;i++) {
    const a = rand(0, Math.PI*2), sp = rand(80, 280)*power;
    gibs.push({ x, y, vx: Math.cos(a)*sp + rand(-40,40) + bvx, vy: Math.sin(a)*sp - rand(60,220) + bvy,
      rot: rand(0,Math.PI*2), vr: rand(-9,9), r: rand(3, big?9:6.5),
      c: GIB_COLORS[randi(0,3)], life: rand(2.5,4), head: i===0 && Math.random()<0.7,
      shape: GIB_SHAPES[randi(0,2)] });
  }
  const bn = big ? 42 : 26;
  for (let i=0;i<bn;i++) {
    const a = rand(0, Math.PI*2), sp = rand(60, 420)*power;
    bloods.push({ x, y, vx: Math.cos(a)*sp + bvx*0.7, vy: Math.sin(a)*sp - rand(0,150) + bvy*0.7, life: rand(0.5,1.6) });
  }
  // instant splat right at the kill point only makes sense near a surface — for an airborne kill
  // (jetpack grunt, flying supe) the real surface is far below, and the falling blood particles
  // above already land and bake there naturally, so don't also bake one floating at the death point
  if (x > WATER_X && y > GROUND_Y - 45) {
    // in the water OR right at the surface (swimmer heads, boat gunners sit a few px above the
    // waterline) — bloom the lingering cloud straight away rather than waiting for droplets to land
    waterBlood(x, Math.max(y, GROUND_Y + 14), rand(10,18));
    splash(x, 200);
    waterMayhem++;   // The Deep is counting
  } else {
    const groundS = surfaceBelow(x, y);
    if (groundS - y < 60) bakeSplat(x, groundS, rand(8,16), '#5e0c0c', 0.55);
  }
  shake(big ? 8 : 3);
  if (big) sfxBoom(); else sfxSplat();
  panicNear(x, 480);
}

// ─── Update ───
function update(dt) {
  gameT += dt;
  P.dashCd = Math.max(0, P.dashCd - dt);
  P.clapCd = Math.max(0, P.clapCd - dt);
  P.stunT = Math.max(0, P.stunT - dt);
  boltLockout = Math.max(0, boltLockout - dt);
  fireballLockout = Math.max(0, fireballLockout - dt);
  P.hurtFlash = Math.max(0, P.hurtFlash - dt*3);
  if (streakT > 0) { streakT -= dt; if (streakT <= 0) streak = 0; }
  document.getElementById('streak').textContent = streak >= 2 ? ('⚔ STREAK x' + streak) : '';
  if (bossBanner) { bossBanner.life -= dt; if (bossBanner.life <= 0) bossBanner = null; }
  bossFlashT = Math.max(0, bossFlashT - dt*2.2);

  const mWX = mouseSX + camX, mWY = mouseSY + camY;

  // ── movement ──
  let ix = 0, iy = 0;
  if (P.stunT <= 0) {
    if (keys.KeyA||keys.ArrowLeft) ix -= 1;
    if (keys.KeyD||keys.ArrowRight) ix += 1;
    if (keys.KeyW||keys.ArrowUp) iy -= 1;
    if (keys.KeyS||keys.ArrowDown) iy += 1;
  }
  const moving = (ix!==0 || iy!==0);
  P.boost = clamp(P.boost + (moving ? dt/1.3 : -dt*1.9), 0, 1);

  if (P.dashT > 0) {
    P.dashT -= dt;
    if (P.dashT <= 0) P.dashCoastT = 0.5;   // dash just ended — coast out gradually instead of snapping to a stop
    const dspd = P.bigLaunch ? 1150 : 1650;   // triple-tap-up launch travels slower but for much longer, clearing the tallest building
    P.vx = P.dashDir.x * dspd; P.vy = P.dashDir.y * dspd;
    afterimages.push({x:P.x, y:P.y, f:P.facing, a:0.5});
    for (const g of grunts) if (!g.dead && dist2(P.x,P.y,g.x,g.y-16) < 62*62) { g.dead=true; gibBurst(g.x,g.y-16,1.3,false,P.dashDir.x*300,P.dashDir.y*300); addKill(); }
    for (const c of civs) if (!c.dead && dist2(P.x,P.y,c.x,c.y-14) < 58*58) { c.dead=true; gibBurst(c.x,c.y-14,1.1,false,P.dashDir.x*300,P.dashDir.y*300); addKill(); }
    for (const car of cars) if (!car.dead && dist2(P.x,P.y,car.x,car.y-10) < 64*64) carBoom(car);
    for (const p of streetProps) if (!p.dead) {
      if (p.type === 'light' && dist2(P.x,P.y,p.x,GROUND_Y-118) < 60*60) streetLightBoom(p);
      else if (p.type === 'hydrant' && p.geyserT <= 0 && dist2(P.x,P.y,p.x,GROUND_Y-10) < 50*50) hydrantBoom(p);
    }
    // destructible roofline pieces — a dash through one pops it instantly, same as a streetlight
    for (const b of fgBuildings) {
      if (b.collapsed || b.collapsing || !b.roofChunks.length) continue;
      for (const rc of b.roofChunks) {
        if (rc.dead) continue;
        const rcx = b.x+rc.ox+rc.w/2, rcy = b.roofY+rc.oy+rc.h/2, rr = Math.max(rc.w,rc.h)/2+40;
        if (dist2(P.x,P.y,rcx,rcy) < rr*rr) roofChunkPop(rc, rcx, rcy);
      }
    }
    for (const s of supes) if (s.hp>0 && dist2(P.x,P.y,s.x,s.y) < 72*72) {
      // non-boss supes die outright either way, so the once-per-swing guard only actually matters
      // for a boss — but checking it either way costs nothing and keeps this branch uniform
      if (s.boss && P.dashHitSet.has(s)) continue;
      P.dashHitSet.add(s);

      // from an earlier hit, not just this one

      if (s.hp<=0) { gibBurst(s.x,s.y,1.6,true,P.dashDir.x*350,P.dashDir.y*350); addKill(); if (s.boss) { starlightTimer = rand(140, 190); announceBossKill('STARLIGHT', s.x, s.y); } }
    }
    for (const h of helis) if (!h.dead && dist2(P.x,P.y,h.x,h.y) < 105*105) heliDeath(h);
    // a dash lasts several frames — without a once-per-swing guard, a boss that isn't shoved clear
    // of the hit radius immediately could take this flat damage 3-5x off a single punch instead of once
    for (const a of atrains) if (!a.dead && !P.dashHitSet.has(a) && dist2(P.x,P.y,a.x,a.y-16) < 72*72) {
      P.dashHitSet.add(a);

      dp.hp -= 260*DASH_DMG_MULT*deepDamageMult(dp);

      if (dp.hp<=0) deepDeath(dp);
    }

      l.hp -= 380*DASH_DMG_MULT*(isJuggled(l) ? JUGGLE_DMG_MULT : 1);
      l.vx += P.dashDir.x*400; l.vy += P.dashDir.y*400;
      if (P.dashDir.y < -0.3) l.launchedT = 0.9;
      rings.push({x:l.x,y:l.y,r:10,life:0.4,w:3});
      if (l.hp<=0) lamplighterDeath(l);
    }
    for (const ct of containers) if (!ct.dead && dist2(P.x,P.y,ct.x+ct.w/2,ct.y+ct.h/2) < 82*82) containerBoom(ct);
    for (const tk of tanks) if (!tk.dead && !P.dashHitSet.has(tk) && dist2(P.x,P.y,tk.x,tk.y-20*TANK_SCALE) < (78*TANK_SCALE)*(78*TANK_SCALE)) {
      P.dashHitSet.add(tk);
      tk.hp -= 400*DASH_DMG_MULT;
      rings.push({x:tk.x,y:tk.y-20*TANK_SCALE,r:10,life:0.4,w:3});
      if (tk.hp <= 0) tankDeath(tk);
    }
    for (const s of sharks) if (!s.dead && dist2(P.x,P.y,s.x,s.y) < (70*SHARK_SCALE)*(70*SHARK_SCALE)) sharkDeath(s);

    // a slam from just above the ground and a slam from the top of the tallest building used to
    // land identically — scale the payoff with how far he actually fell, 1x for a short hop up to
    // 2x for clearing real altitude, so climbing high before slamming is worth it

      if (P.y >= WATER_FLOOR - 70) {
        P.dashT = 0; P.vertDash = null; P.y = WATER_FLOOR - 50; P.vy = 0;
        for (let i=0;i<12;i++) bubbleAt(P.x + rand(-40,40), P.y + rand(-10,10));
        thump(40, 0.4, 0.3); shake(8*slamScale);
      }
    } else if (P.dashDir.y > 0.5 && P.y >= GROUND_Y - 60) {

      rings.push({x:P.x, y:GROUND_Y-8, r:12*slamScale, life:0.55, w:6});
      bakeScorch(P.x, GROUND_Y, 60*slamScale);
      for (let i=0;i<14;i++) smokes.push({ x:P.x+rand(-60,60), y:GROUND_Y-rand(0,26), r:rand(12,26), vr:rand(30,55), vy:rand(-40,-10), life:rand(0.7,1.4), c:'rgba(110,95,105,' });

      const R = 300*slamScale;
      for (const g of grunts) if (!g.dead && g.y > GROUND_Y-140 && Math.abs(g.x-P.x) < R) { g.dead=true; gibBurst(g.x,g.y-16,1.4,false,(g.x<P.x?-1:1)*300,-260); addKill(); }
      for (const c of civs) if (!c.dead && Math.abs(c.x-P.x) < R) { c.dead=true; gibBurst(c.x,c.y-14,1.2,false,(c.x<P.x?-1:1)*300,-260); addKill(); }
      for (const car of cars) if (!car.dead && Math.abs(car.x-P.x) < R) carBoom(car);
      damageCellsInRadius(P.x, GROUND_Y-40, 120*slamScale, 0.5);
    }
  } else if (P.grounded) {
    // ── grounded: running along whatever surface he's standing on, small hops in place.
    // any dash-punch (see startDash) clears P.grounded and launches him back into full flight.
    const RACC = 3400, RDRAG = 6.0, RMAX = 650;
    P.vx += ix*RACC*dt;
    P.vx -= P.vx*RDRAG*dt;
    const rsp = Math.abs(P.vx);
    if (rsp > RMAX) P.vx *= RMAX/rsp;
    // running on a rooftop specifically (well above street level) and there's no longer a building
    // under him — walked off the edge. this used to keep tracking "whatever surface is below" and
    // just glide him straight down to the street; now it kicks him back into normal flight instead,
    // same as if he'd stepped off any other ledge
    const bAtX = findBuildingAt(P.x);
    if (P.y < GROUND_Y - 100 && (!bAtX || bAtX.collapsed || bAtX.collapsing)) {
      P.grounded = false; P.hopping = false;
    } else {
      const surf = surfaceBelow(P.x, P.y - 4) - 26;
      if (P.hopping) {
        P.vy += 2100*dt;
        P.y += P.vy*dt;
        if (P.y >= surf) { P.y = surf; P.vy = 0; P.hopping = false; }
      } else if (iy < 0) {
        P.vy = -880; P.hopping = true; P.y += P.vy*dt;
      } else {
        P.vy = 0;
        P.y += clamp(surf - P.y, -1900*dt, 1900*dt);
      }
    }
  } else {
    if (P.dashCoastT > 0) P.dashCoastT -= dt;
    if (P.knockT > 0) P.knockT -= dt;
    const swim = inWater(P.x, P.y);
    const ACC = (2600 + 1900*P.boost) * (swim ? 0.45 : 1);
    const DRAG = swim ? 6.5 : (P.dashCoastT > 0 ? 1.7 : 5.0);
    // acceleration curve (ACC) is untouched — only the ceiling on top speed moved, to 1.08x what it was
    const MAX = 1.08 * (480 + 620*Math.pow(P.boost, 1.35)) * (swim ? 0.55 : 1);
    let nx = ix, ny = iy;
    if (nx&&ny) { nx*=0.7071; ny*=0.7071; }
    P.vx += nx*ACC*dt; P.vy += ny*ACC*dt;
    P.vx -= P.vx*DRAG*dt; P.vy -= P.vy*DRAG*dt;
    if (swim) {
      P.vy -= 230*dt;   // buoyancy — he drifts back toward the surface unless he swims down
      if (Math.random() < dt*14) bubbleAt(P.x + rand(-10,10), P.y - rand(0,20));
    }
    const sp = Math.hypot(P.vx,P.vy);
    // a big knockback (Maeve's lunge) is exempt from the normal max-speed clamp while it plays out —
    // otherwise it gets capped back down to ordinary flight speed within a single frame and the extra
    // power is never actually felt
    if (P.knockT <= 0 && sp > MAX) { P.vx *= MAX/sp; P.vy *= MAX/sp; }
    if (!moving && sp < 40) P.vy += Math.sin(gameT*2.2)*14*dt*20;
    if (sp > 620 && !swim) afterimages.push({x:P.x, y:P.y, f:P.facing, a:0.22});
  }
  P.x = clamp(P.x + P.vx*dt, 30, WORLD_W-30);
  if (P.grounded && P.x > WATER_X) { P.grounded = false; P.hopping = false; }   // ran off the dock edge
  if (!P.grounded) {
    const wasAbove = P.y <= GROUND_Y;
    const maxY = P.x > WATER_X ? WATER_FLOOR - 30 : GROUND_Y - 26;
    P.y = clamp(P.y + P.vy*dt, 60, maxY);
    // splash crossing the water surface in either direction
    if (P.x > WATER_X && wasAbove !== (P.y <= GROUND_Y) && Math.abs(P.vy) > 120) splash(P.x, Math.abs(P.vy));
    // touched down at street level under his own power (not mid-dash) — land and start running
    if (P.x <= WATER_X && P.dashT <= 0 && P.vy >= 0 && P.y >= GROUND_Y - 26 - 0.5) { P.grounded = true; P.hopping = false; P.vy = 0; }
  }
  // The Deep watches for anyone lingering below the surface
  if (inWater(P.x, P.y) && P.y > GROUND_Y + 30) P.underwaterT += dt; else P.underwaterT = 0;

  shipGraceT = Math.max(0, shipGraceT - dt);
  if (P.dashT <= 0) {
    const hitB = cellIntactAt(P.x, P.y);
    if (hitB && hitB.ship && shipGraceT > 0) {
      // freshly arrived and possibly with the player standing inside it — lasable, not solid, for a bit
    } else if (hitB) {
      const leftD = P.x - hitB.x, rightD = hitB.x + hitB.w - P.x, topD = P.y - hitB.roofY;
      if (topD < 30) {
        const wasFalling = P.vy >= 0;
        P.y = hitB.roofY - 27; P.vy = Math.min(0, P.vy);
        if (!P.grounded && wasFalling) { P.grounded = true; P.hopping = false; P.vy = 0; }
      }
      else {
        // clamp (don't teleport) to the outer edge — a hard reset every frame is what caused the backward "glitch"
        let cwx;
        if (leftD < rightD) { cwx = hitB.x + 8; P.x = Math.min(P.x, hitB.x - 16); P.vx = Math.min(0, P.vx); }
        else { cwx = hitB.x + hitB.w - 8; P.x = Math.max(P.x, hitB.x + hitB.w + 16); P.vx = Math.max(0, P.vx); }
        // drilling in by hand does the same damage-per-second as the laser, continuously, not a one-off impact crack
        const ci = cellIdx(hitB, cwx, P.y);
        if (ci >= 0 && hitB.cells[ci] < 1) {
          hitB.cells[ci] += dt * LASER_CELL_RATE;
          if (hitB.cells[ci] >= 1) { hitB.cells[ci] = 0.999; destroyCell(hitB, ci, cwx, P.y); }
          else if (Math.random() < 0.4) debris.push({ x: cwx, y: P.y, vx: rand(-60,60), vy: rand(-120,0),
            rot: rand(0,7), vr: rand(-6,6), r: rand(2,4), c: '#2e2638', life: rand(0.8,1.6) });
        }
      }
    }
  }
  P.facing = (mWX >= P.x) ? 1 : -1;
  P.bank += ((P.dashT>0 ? P.dashDir.x*0.5 : P.vx*0.0006) - P.bank) * Math.min(1, dt*8);

  camX += (clamp(P.x + P.vx*0.22 - VW/2, 0, WORLD_W - VW) - camX) * Math.min(1, dt*5);
  const camBot = Math.max(-100, (P.x > WATER_X - 300 ? WATER_FLOOR + 140 : GROUND_Y + 120) - VH);
  camY += (clamp(P.y + P.vy*0.15 - VH/2, -100, camBot) - camY) * Math.min(1, dt*5);
  shakeMag = Math.max(0, shakeMag - dt*44);

  // ── structural checks / collapse animation ──
  for (const b of fgBuildings) {
    if (b.collapsing) {
      b.collapseT += dt;
      const p = b.collapseT / b.collapseDur;
      if (Math.random() < dt*30) smokes.push({ x: rand(b.x,b.x+b.w), y: GROUND_Y - rand(0, b.collapseFromH*(1-p)),
        r: rand(14,30), vr: rand(20,40), vy: rand(-30,-10), life: rand(0.5,1), c:'rgba(120,110,124,' });
      if (b.collapseT >= b.collapseDur) { b.collapsing = false; b.collapsed = true; b.collapsedAtT = gameT; b.respawnGate = rand(90, 150); }
      continue;
    }
    if (b.collapsed || !b.supActive) continue;
    b.supT -= dt;
    if (b.supT <= 0) { b.supT = 0.13; runSupport(b); }
  }

  // ── building respawn: buildings are the one thing in this world that doesn't come back on
  // its own the way traffic/ships/enemies do. same principle real open-world games use to recycle
  // destroyed props without it ever reading as fake — a building only becomes eligible once it's
  // safely outside the camera's view AND has sat collapsed for a while, and even then a low-odds
  // roll spreads the actual moment out so a batch that went down together doesn't pop back in sync.
  // the player is never structurally in a position to see it happen.
  buildingRespawnCd -= dt;
  if (buildingRespawnCd <= 0) {
    buildingRespawnCd = 2;
    for (const b of fgBuildings) {
      if (b.ship || b.isTower || !b.collapsed) continue;   // ship pieces have their own cycle; Vought Tower never comes back once it falls
      if (Math.abs((b.x + b.w/2) - (camX + VW/2)) < VW*2.2) continue;   // not safely off-screen (measured from viewport center)
      if (gameT - b.collapsedAtT < b.respawnGate) continue;
      if (Math.random() < 0.2) respawnBuilding(b);
    }
  }

  // ── falling bodies (ejected from collapsing buildings) ──
  for (const f of fallers) {
    if (f.dead) continue;
    f.vy += 1400*dt;
    f.x += f.vx*dt; f.y += f.vy*dt; f.life -= dt;
    const s = surfaceBelow(f.x, f.y - 10);
    if (f.y >= s || f.life <= 0) {
      // splashing down in the water gibs just under the surface so the blood clouds out there
      gibBurst(f.x, f.x > WATER_X ? GROUND_Y + 30 : s, 1.1, false, f.vx*0.3, 0);
      addKill(); f.dead = true;
    }
  }
  fallers = fallers.filter(f => !f.dead);

  // ── laser (stops on buildings AND on tanky enemies; pierces fodder) ──
  const canFire = firing && P.stunT <= 0;
  if (laserGain) laserGain.gain.value = (canFire && !muted) ? 0.05 : 0;
  let beamEndX = mWX, beamEndY = mWY;
  mirrorBeam = null;
  if (canFire) {
    const ex = P.x + P.facing*6, ey = P.y - 24;
    const tdx = mWX - ex, tdy = mWY - ey;
    const tlen = Math.hypot(tdx,tdy) || 1;
    const ux = tdx/tlen, uy = tdy/tlen;
    // nearest building cell along the beam
    let stopD = tlen, hitB = null, hitI = -1;
    if (uy > 0.001) {                     // ground is solid — beam can't pass through it
      const groundD = (GROUND_Y - ey) / uy;
      // ...but only on land. Over the water the surface just sizzles and the beam keeps going,
      // stopping at the sea floor instead.
      if (groundD > 0 && groundD < stopD && ex + ux*groundD < WATER_X) stopD = groundD;
      const floorD = (WATER_FLOOR - ey) / uy;
      if (floorD > 0 && floorD < stopD && ex + ux*floorD >= WATER_X) stopD = floorD;
    }
    for (let d = 30; d < stopD; d += 9) {
      const px = ex + ux*d, py = ey + uy*d;
      const b = cellIntactAt(px, py);
      if (b) { stopD = d; hitB = b; hitI = cellIdx(b, px, py); break; }
    }
    // a supe or heli in the way blocks the beam before the wall does
    let hitSupe = null, hitHeli = null;
    for (const s of supes) {
      if (s.hp <= 0) continue;
      const t = clamp((s.x-ex)*ux + (s.y-ey)*uy, 0, tlen);
      if (t < stopD && Math.hypot(ex+ux*t - s.x, ey+uy*t - s.y) < 22) {
        stopD = t; hitSupe = s; hitHeli = null; hitB = null;
      }
    }
    for (const h of helis) {
      if (h.dead) continue;
      const t = clamp((h.x-ex)*ux + (h.y-ey)*uy, 0, tlen);
      if (t < stopD && Math.hypot(ex+ux*t - h.x, ey+uy*t - h.y) < 42) {
        stopD = t; hitHeli = h; hitSupe = null; hitB = null;
      }
    }
    // trains are drawn in front of the buildings behind them, so they need to block the beam
    // the same way — otherwise the beam visually crosses right over a car without ever "hitting" it
    let hitTrain = null;
    for (const tr of trains) {
      for (let i=0;i<tr.cars.length;i++) {
        const c = tr.cars[i]; if (c.dead) continue;
        const cxw = trainCarX(tr, i), cyw = RAIL_Y - CAR_CENTER_OFF;
        const t = clamp((cxw-ex)*ux + (cyw-ey)*uy, 0, tlen);
        if (t < stopD && Math.hypot(ex+ux*t - cxw, ey+uy*t - cyw) < CAR_HIT_R) {
          stopD = t; hitTrain = { tr, i, cxw }; hitHeli = null; hitSupe = null; hitB = null;
        }
      }
    }
    // same story as the train: a jet checked only against the (possibly already-clipped) beam end
    // could sit closer than whatever the beam stopped on and still never register a hit. the jet's
    // sprite is a long, low fuselage+wings shape, not a disc, so a circular radius left the nose,
    // tail and wingtips un-blockable while the center registered fine — use an elliptical footprint
    // that actually matches the drawn silhouette instead
    let hitJet = null;
    const JET_RX = 78*JET_SCALE, JET_RY = 30*JET_SCALE;
    for (const j of jets) {
      if (j.dead) continue;
      const t = clamp((j.x-ex)*ux + (j.y-ey)*uy, 0, tlen);
      if (t >= stopD) continue;
      const dx = ex+ux*t - j.x, dy = ey+uy*t - j.y;
      if ((dx*dx)/(JET_RX*JET_RX) + (dy*dy)/(JET_RY*JET_RY) <= 1) {
        stopD = t; hitJet = j; hitHeli = null; hitSupe = null; hitB = null; hitTrain = null;
      }
    }
    // sharks got the same treatment last time this bit them: checked only against the beam's
    // already-clipped endpoint, the beam visually sailed right through them without ever stopping
    let hitShark = null;
    for (const s of sharks) {
      if (s.dead) continue;
      const t = clamp((s.x-ex)*ux + (s.y-ey)*uy, 0, tlen);
      if (t < stopD && Math.hypot(ex+ux*t - s.x, ey+uy*t - s.y) < 20*SHARK_SCALE) {
        stopD = t; hitShark = s; hitHeli = null; hitSupe = null; hitB = null; hitTrain = null; hitJet = null;
      }
    }
    // everything below used to only be checked with segDist against the beam's already-clipped
    // endpoint (a post-hoc "did the beam happen to pass near this" test), which meant none of it
    // actually stopped the beam — containers and tanks visibly had the laser cut straight through
    // their hull to whatever was behind them. same priority-blocking treatment as everything above.
    let hitContainer = null;
    for (const ct of containers) {
      if (ct.dead) continue;
      const cx2 = ct.x+ct.w/2, cy2 = ct.y+ct.h/2;
      const t = clamp((cx2-ex)*ux + (cy2-ey)*uy, 0, tlen);
      if (t < stopD && Math.hypot(ex+ux*t - cx2, ey+uy*t - cy2) < 56) {
        stopD = t; hitContainer = ct; hitHeli = null; hitSupe = null; hitB = null; hitTrain = null; hitJet = null; hitShark = null;
      }
    }
    let hitTank = null;
    for (const tk of tanks) {
      if (tk.dead) continue;
      const tky = tk.y-20*TANK_SCALE;
      const t = clamp((tk.x-ex)*ux + (tky-ey)*uy, 0, tlen);
      if (t < stopD && Math.hypot(ex+ux*t - tk.x, ey+uy*t - tky) < 34*TANK_SCALE) {
        stopD = t; hitTank = tk; hitHeli = null; hitSupe = null; hitB = null; hitTrain = null; hitJet = null; hitShark = null; hitContainer = null;
      }
    }
    let hitATrain = null;
    for (const a of atrains) {
      if (a.dead) continue;
      const ay = a.y-20;
      const t = clamp((a.x-ex)*ux + (ay-ey)*uy, 0, tlen);
      if (t < stopD && Math.hypot(ex+ux*t - a.x, ey+uy*t - ay) < 20) {
        stopD = t; hitATrain = a; hitHeli = null; hitSupe = null; hitB = null; hitTrain = null; hitJet = null; hitShark = null; hitContainer = null; hitTank = null;
      }
    }
    let hitMaeve = null;
    for (const a of maeves) {
      if (a.dead) continue;
      const ay = a.y-20;
      const t = clamp((a.x-ex)*ux + (ay-ey)*uy, 0, tlen);
      if (t < stopD && Math.hypot(ex+ux*t - a.x, ey+uy*t - ay) < 20) {
        stopD = t; hitMaeve = a; hitHeli = null; hitSupe = null; hitB = null; hitTrain = null; hitJet = null; hitShark = null; hitContainer = null; hitTank = null; hitATrain = null;
      }
    }
    let hitDeep = null;
    for (const dp of deeps) {
      if (dp.dead) continue;
      const dy = dp.y-12;
      const t = clamp((dp.x-ex)*ux + (dy-ey)*uy, 0, tlen);
      if (t < stopD && Math.hypot(ex+ux*t - dp.x, ey+uy*t - dy) < 24*DEEP_SCALE) {
        stopD = t; hitDeep = dp; hitHeli = null; hitSupe = null; hitB = null; hitTrain = null; hitJet = null; hitShark = null; hitContainer = null; hitTank = null; hitATrain = null; hitMaeve = null;
      }
    }
    let hitLamp = null;
    for (const l of lamplighters) {
      if (l.dead) continue;
      const t = clamp((l.x-ex)*ux + (l.y-ey)*uy, 0, tlen);
      if (t < stopD && Math.hypot(ex+ux*t - l.x, ey+uy*t - l.y) < 22) {
        stopD = t; hitLamp = l; hitHeli = null; hitSupe = null; hitB = null; hitTrain = null; hitJet = null; hitShark = null; hitContainer = null; hitTank = null; hitATrain = null; hitMaeve = null; hitDeep = null;
      }
    }
    beamEndX = ex + ux*stopD; beamEndY = ey + uy*stopD;
    const DPS = 315 * LASER_DMG_MULT;
    if (hitB && hitI >= 0) {
      hitB.cells[hitI] += dt * LASER_CELL_RATE;
      if (hitB.cells[hitI] >= 1) { hitB.cells[hitI] = 0.999; destroyCell(hitB, hitI, beamEndX, beamEndY); }
      if (Math.random()<0.3) smokes.push({ x:beamEndX, y:beamEndY, r:rand(4,9), vr:rand(14,26), vy:rand(-40,-15), life:rand(0.4,0.8), c:'rgba(80,72,84,' });
      // glowing embers mixed into the smoke/debris while the beam is actively cutting into
      // masonry or hull plating — reads as hot material, not just generic smoke
      if (Math.random()<0.35) embers.push({ x:beamEndX+rand(-6,6), y:beamEndY+rand(-6,6), vx:rand(-25,25), vy:rand(-90,-30), life:rand(0.4,0.8), r:rand(1,2.2) });
    } else if (hitSupe) {
      const s = hitSupe;
      s.hp -= DPS*dt*(isJuggled(s) ? JUGGLE_DMG_MULT : 1); s.smokeT = 0.1; s.flash = 0.1;
      if (Math.random()<0.7) sparks.push({ x:beamEndX+rand(-5,5), y:beamEndY+rand(-6,6), vx:rand(-140,140), vy:rand(-180,20), life:rand(0.12,0.3), c:Math.random()<0.5?'#ffbb44':'#ff5533' });
      if (Math.random()<0.35) smokes.push({ x:s.x+rand(-8,8), y:s.y+rand(-10,6), r:rand(4,8), vr:rand(12,22), vy:rand(-50,-20), life:rand(0.35,0.7), c:'rgba(70,62,74,' });
      if (s.hp <= 0) { gibBurst(s.x, s.y, 1.5, true); addKill(); if (s.boss) { starlightTimer = rand(140, 190); announceBossKill('STARLIGHT', s.x, s.y); } }
    } else if (hitHeli) {
      const h = hitHeli;
      h.hp -= 450*dt*LASER_DMG_MULT; h.hurt = 0.1;
      if (Math.random()<0.7) sparks.push({ x:beamEndX+rand(-6,6), y:beamEndY+rand(-6,6), vx:rand(-160,160), vy:rand(-180,20), life:rand(0.12,0.3), c:Math.random()<0.5?'#ffdd66':'#ff5533' });
      if (h.hp <= 0) heliDeath(h);
    } else if (hitTrain) {
      const c = hitTrain.tr.cars[hitTrain.i];
      c.hp -= 450*dt*LASER_DMG_MULT;
      if (Math.random()<0.6) sparks.push({x:beamEndX+rand(-10,10),y:beamEndY+rand(-8,8),vx:rand(-140,140),vy:rand(-160,20),life:rand(0.12,0.3),c:'#ffdd66'});
      if (c.hp <= 0) trainCarDeath(hitTrain.tr, hitTrain.i, hitTrain.cxw);
    } else if (hitJet) {
      // same durability as a helicopter — the beam burns it down rather than instantly detonating it
      hitJet.hp -= 450*dt*LASER_DMG_MULT;
      if (Math.random()<0.7) sparks.push({ x:beamEndX+rand(-8,8), y:beamEndY+rand(-8,8), vx:rand(-160,160), vy:rand(-120,40), life:rand(0.12,0.3), c:Math.random()<0.5?'#ffdd66':'#ff5533' });
      if (hitJet.hp <= 0) jetDeath(hitJet);
    } else if (hitShark) {
      const s = hitShark;
      s.hp -= 450*dt*LASER_DMG_MULT;
      if (Math.random()<0.6) bubbleAt(s.x+rand(-10,10), s.y-rand(0,10));
      if (s.hp <= 0) sharkDeath(s);
    } else if (hitContainer) {
      const ct = hitContainer;
      ct.hp -= 450*dt*LASER_DMG_MULT;
      ct.vx += ux*260*dt;
      ct.settled = false;   // being shoved sideways — its rest height may no longer be valid
      if (Math.random()<0.4) sparks.push({x:beamEndX+rand(-10,10),y:beamEndY+rand(-8,8),vx:rand(-100,100),vy:rand(-120,20),life:rand(0.12,0.3),c:'#ffdd66'});
      if (ct.hp <= 0) containerBoom(ct);
    } else if (hitTank) {
      const tk = hitTank;
      tk.hp -= 450*dt*LASER_DMG_MULT;
      if (Math.random()<0.6) sparks.push({x:beamEndX+rand(-16,16),y:beamEndY,vx:rand(-140,140),vy:rand(-160,20),life:rand(0.12,0.3),c:'#ffbb44'});
      if (tk.hp <= 0) tankDeath(tk);
    } else if (hitATrain) {
      const a = hitATrain;
      a.hp -= 380*dt*LASER_DMG_MULT;
      a.laserHitT += dt; a.hitFlag = true;
      if (a.laserHitT > 1) a.fleeing = true;   // held on him too long — he bolts off-screen
      if (Math.random()<0.5) sparks.push({x:beamEndX,y:beamEndY,vx:rand(-100,100),vy:rand(-140,20),life:rand(0.15,0.3),c:'#ffbb44'});
      if (a.hp <= 0) atrainDeath(a);
    } else if (hitMaeve) {
      const a = hitMaeve;
      if (maeveBraced(a)) {
        // real mirror physics: reflect off the point where the primary beam actually stopped (her
        // shield now genuinely blocks it, instead of a synthetic point) — the reflected beam is a
        // real second raycast, cutting buildings, fodder and cars, not just throwing cosmetic sparks
        const reflA = Math.PI - Math.atan2(uy, ux);
        const rux = Math.cos(reflA), ruy = Math.sin(reflA);
        const rex = beamEndX, rey = beamEndY;
        let rStop = 1000, rHitB = null, rHitI = -1;
        for (let d = 20; d < rStop; d += 9) {
          const px = rex + rux*d, py = rey + ruy*d;
          const b = cellIntactAt(px, py);
          if (b) { rStop = d; rHitB = b; rHitI = cellIdx(b, px, py); break; }
        }
        const rEndX = rex + rux*rStop, rEndY = rey + ruy*rStop;
        if (rHitB && rHitI >= 0) {
          rHitB.cells[rHitI] += dt * LASER_CELL_RATE;
          if (rHitB.cells[rHitI] >= 1) { rHitB.cells[rHitI] = 0.999; destroyCell(rHitB, rHitI, rEndX, rEndY); }
        }
        for (const g of grunts) if (!g.dead && segDist(g.x, g.y-16, rex, rey, rEndX, rEndY) < 16) { g.dead = true; gibBurst(g.x, g.y-16, 1); addKill(); }
        for (const c of civs) if (!c.dead && segDist(c.x, c.y-14, rex, rey, rEndX, rEndY) < 14) { c.dead = true; gibBurst(c.x, c.y-14, 1); addKill(); }
        for (const car of cars) if (!car.dead && segDist(car.x, car.y-10, rex, rey, rEndX, rEndY) < 20) carBoom(car);
        mirrorBeam = { x1: rex, y1: rey, x2: rEndX, y2: rEndY };
        if (Math.random() < 0.7) {
          for (let i=0;i<3;i++) {
            const sp = rand(300, 700), sa = reflA + rand(-0.35, 0.35);
            sparks.push({ x: a.x, y: a.y-20, vx: Math.cos(sa)*sp, vy: Math.sin(sa)*sp,
              life: rand(0.15,0.3), c: '#f2f6ff' });
          }
        }
      } else if (a.state === 'dodge') {
        // a real evasion window, not just cosmetic repositioning — she's still the thing that
        // physically stops the beam (blocks it like anything else in the priority raycast), but
        // moving fast enough mid-dodge that it doesn't land clean. without this the dodge did
        // nothing but look nice while she quietly ate full damage the whole time anyway, which is
        // exactly why standing on the ground and holding the beam on her still melted her fast
        if (Math.random()<0.4) sparks.push({x:beamEndX,y:beamEndY,vx:rand(-80,80),vy:rand(-100,20),life:rand(0.12,0.25),c:'#e0e8ff'});
      } else {
        a.hp -= 380*dt*LASER_DMG_MULT;
        if (Math.random()<0.5) sparks.push({x:beamEndX,y:beamEndY,vx:rand(-100,100),vy:rand(-140,20),life:rand(0.15,0.3),c:'#ffbb44'});
        // held the beam on her long enough — she throws the shield up in reaction instead of just
        // standing there and taking it, rather than only ever bracing on her own fixed timer
        a.laserHitT += dt; a.hitFlag = true;
        if (a.laserHitT > 0.6 && a.state !== 'brace') {
          a.state = 'brace'; a.stateT = 1.3; a.braceTele = 0.35; a.braceCd = rand(5.5, 7.5); a.laserHitT = 0;
        }
        if (a.hp <= 0) maeveDeath(a);
      }
    } else if (hitDeep) {
      const dp = hitDeep;
      if (dp.dolphinHp > 0) {
        // he's mounted (leaping breach or the dolphin-charge) — the dolphin is riding point-blank
        // in front of him, so it eats the beam instead of him until it's shot out from under him
        dp.dolphinHp -= 450*dt*LASER_DMG_MULT;
        if (Math.random()<0.6) bubbleAt(dp.x+rand(-10,10), dp.y+rand(0,10));
        if (dp.dolphinHp <= 0) {
          dp.dolphinHp = 0;
          splash(dp.x, 500); shake(10); sfxCrack();
          for (let i=0;i<7;i++) debris.push({ x: dp.x+rand(-14,14), y: dp.y+rand(-6,10), vx: rand(-140,140), vy: rand(-180,-20), rot: rand(0,7), vr: rand(-8,8), r: rand(2,5), c: '#7d8a94', life: rand(0.5,1) });
          dp.hp -= 80;   // dumped hard when it goes out from under him
          if (dp.state === 'jump') dp.state = 'fall';
          else if (dp.state === 'dolphin') dp.state = 'lurk';
          if (dp.hp <= 0) deepDeath(dp);
        }
      } else {
        dp.hp -= 380*dt*LASER_DMG_MULT*deepDamageMult(dp);
        if (inWater(dp.x, dp.y)) { if (Math.random()<0.7) bubbleAt(dp.x+rand(-10,10), dp.y-rand(0,16)); }
        else if (Math.random()<0.5) sparks.push({x:beamEndX,y:beamEndY,vx:rand(-100,100),vy:rand(-140,20),life:rand(0.15,0.3),c:'#ffbb44'});
        if (dp.hp <= 0) deepDeath(dp);
      }
    } else if (hitLamp) {
      const l = hitLamp;
      l.hp -= 380*dt*LASER_DMG_MULT*(isJuggled(l) ? JUGGLE_DMG_MULT : 1); l.smokeT = 0.1; l.flash = 0.1;
      if (Math.random()<0.6) sparks.push({x:beamEndX,y:beamEndY,vx:rand(-140,140),vy:rand(-160,20),life:rand(0.15,0.3),c:'#ff8a3a'});
      if (l.hp <= 0) lamplighterDeath(l);
    }
    // fodder caught anywhere along the (possibly shortened) beam still melts
    for (const g of grunts) if (!g.dead && segDist(g.x, g.y-16, ex, ey, beamEndX, beamEndY) < 16) {
      g.dead = true; gibBurst(g.x, g.y-16, 1); addKill();
    }
    for (const c of civs) if (!c.dead && segDist(c.x, c.y-14, ex, ey, beamEndX, beamEndY) < 14) {
      c.dead = true; gibBurst(c.x, c.y-14, 1); addKill();
    }
    for (const car of cars) if (!car.dead && segDist(car.x, car.y-10, ex, ey, beamEndX, beamEndY) < 20) carBoom(car);
    for (const p of streetProps) if (!p.dead) {
      if (p.type === 'light' && segDist(p.x, GROUND_Y-118, ex, ey, beamEndX, beamEndY) < 12) streetLightBoom(p);
      else if (p.type === 'hydrant' && p.geyserT <= 0 && segDist(p.x, GROUND_Y-10, ex, ey, beamEndX, beamEndY) < 14) hydrantBoom(p);
    }
    // destructible roofline pieces — sustained beam contact wears a chunk's hp down and pops it,
    // same "chip away, don't just instant-pop" treatment containers/tanks already get
    for (const b of fgBuildings) {
      if (b.collapsed || b.collapsing || !b.roofChunks.length) continue;
      for (const rc of b.roofChunks) {
        if (rc.dead) continue;
        const rcx = b.x+rc.ox+rc.w/2, rcy = b.roofY+rc.oy+rc.h/2;
        if (segDist(rcx, rcy, ex, ey, beamEndX, beamEndY) < Math.max(rc.w,rc.h)/2 + 6) {
          rc.hp -= 200*dt*LASER_DMG_MULT;
          if (Math.random()<0.3) sparks.push({x:rcx,y:rcy,vx:rand(-80,80),vy:rand(-100,-10),life:rand(0.12,0.25),c:'#ffdd66'});
          if (rc.hp <= 0) roofChunkPop(rc, rcx, rcy);
        }
      }
    }
    for (const r of rockets) if (!r.gone && segDist(r.x, r.y, ex, ey, beamEndX, beamEndY) < 16) {
      r.gone = true; explode(r.x, r.y, 46, 0, true);
    }
    for (const rb of atrainDebris) if (!rb.gone && segDist(rb.x, rb.y, ex, ey, beamEndX, beamEndY) < 16) {
      rb.gone = true;
      for (let i=0;i<7;i++) debris.push({ x: rb.x+rand(-8,8), y: rb.y+rand(-8,8), vx: rand(-100,100), vy: -rand(40,140), rot: rand(0,7), vr: rand(-6,6), r: rand(2.5,5), c: '#2e2638', life: rand(0.5,1) });
      sfxCrack();
    }
    for (const fb of fireballs) if (fb.life > 0 && segDist(fb.x, fb.y, ex, ey, beamEndX, beamEndY) < 16) {
      fb.life = 0;
      for (let i=0;i<6;i++) sparks.push({x:fb.x,y:fb.y,vx:rand(-100,100),vy:rand(-100,100),life:rand(0.15,0.3),c:'#ff8a3a'});
    }
    for (const f of fallers) if (!f.dead && segDist(f.x, f.y-10, ex, ey, beamEndX, beamEndY) < 14) {
      f.dead = true; gibBurst(f.x, f.y-10, 1); addKill();
    }
    // containers/tanks/atrains/maeves/deep are now resolved up in the priority-blocking raycast
    // above (they stop the beam like buildings/supes/etc do) — only true fodder still gets a
    // post-hoc segDist check against whatever the beam actually reached
    for (const f of fishes) if (segDist(f.x, f.y, ex, ey, beamEndX, beamEndY) < 14) f.life = 0;
    if (Math.random() < 0.8) sparks.push({ x: beamEndX+rand(-4,4), y: beamEndY+rand(-4,4),
      vx: rand(-160,160), vy: rand(-200,40), life: rand(0.1,0.35), c: Math.random()<0.5?'#ffdd66':'#ff5533' });
    // beam crossing the water surface boils it — steam burst at the crossing, bubbles below
    if (Math.abs(uy) > 0.001) {
      const surfD = (GROUND_Y - ey) / uy;
      if (surfD > 0 && surfD < stopD) {
        const sxw = ex + ux*surfD;
        if (sxw > WATER_X) {
          if (Math.random() < 0.5) smokes.push({ x: sxw+rand(-6,6), y: GROUND_Y-4, r: rand(5,10),
            vr: rand(16,30), vy: rand(-60,-30), life: rand(0.4,0.8), c: 'rgba(220,230,235,' });
          if (Math.random() < 0.6) bubbleAt(ex + ux*rand(surfD, stopD), ey + uy*rand(surfD, stopD));
        }
      }
    }
  }
  P.beamEndX = beamEndX; P.beamEndY = beamEndY;

  // ── spawn director (packed city) ──
  const groundTarget = Math.min(34, 18 + Math.floor(kills/8));
  const airTarget = Math.min(10, 4 + Math.floor(kills/25));
  const nAir = grunts.filter(g=>g.air).length;
  if (grunts.length - nAir < groundTarget && Math.random() < dt*5) spawnGrunt(false);
  if (nAir < airTarget && Math.random() < dt*2.5) spawnGrunt(true);
  if (civs.length < 90 && Math.random() < dt*14) spawnCiv();
  if (cars.filter(c=>!c.dead).length < 26 && Math.random() < dt*6) spawnCar();
  supeTimer -= dt;
  const supeCap = Math.min(6, 1 + Math.floor(kills/25));
  if (supeTimer <= 0 && supes.filter(s=>!s.boss).length < supeCap) { spawnSupe(); supeTimer = rand(8, 13); }
  heliTimer -= dt;
  const heliCap = Math.min(3, 1 + Math.floor(kills/50));
  if (heliTimer <= 0 && helis.filter(h=>!h.dead).length < heliCap) { spawnHeli(); heliTimer = rand(8, 14); }
  // villain timers only start ticking once their kill threshold is reached — hitting the
  // milestone kicks off the countdown, it isn't running quietly since the start of the game.

  // apart than before so the whole cast doesn't show up in a pile within the first few minutes
  if (kills > 50) {

  }

  if (jetTimer <= 0 && jets.filter(j=>!j.dead).length < 2) { spawnJet(); jetTimer = rand(18, 30); }
  if (kills > 140) {

    if (lamplighterTimer <= 0 && lamplighters.length === 0) { spawnLamplighter(); lamplighterTimer = rand(60, 90); }
  }
  if (kills > 240) {
    starlightTimer -= dt;
    if (starlightTimer <= 0 && !supes.some(s=>s.boss)) { spawnStarlight(); starlightTimer = rand(55, 85); }
  }
  if (kills > 350) {
    maeveTimer -= dt;

  }
  // The Deep has no kill gate — his very first appearance is instead timed off first reaching
  // the dock at all (fast: 20-30s), rather than waiting on enough waterMayhem to pile up, which
  // could leave him absent for a long time if the player hadn't caused trouble in the water yet.
  // after that first fight, waterMayhem (permanently true once crossed) keeps him reactive to
  // carnage in his own water for every appearance after
  if (deepArrivalT < 0 && P.x > CITY_W) { deepArrivalT = gameT; deepTimer = rand(20, 30); }
  if (waterMayhem > 25 || deepArrivalT >= 0) {
    deepTimer -= dt;
    if (deepTimer <= 0 && deeps.length === 0 && P.x > WATER_X - VW*0.6) { spawnDeep(); deepTimer = rand(50, 80); }
  }

  // ── grunts (ground + jetpack) ──
  for (const g of grunts) {
    if (g.dead) continue;
    g.stepT += dt;
    if (g.air) {
      g.bobT += dt;
      const want = P.x + (g.x > P.x ? rand(180,420) : -rand(180,420));
      g.vx += clamp(want - g.x, -120, 120)*dt*0.8;
      g.vx -= g.vx*1.2*dt;
      g.x += g.vx*dt;
      g.y = clamp(g.anchor + Math.sin(g.bobT*1.7)*26, 200, GROUND_Y-120);
      if (Math.random() < dt*0.2) g.anchor = clamp(g.anchor + rand(-90,90), GROUND_Y-800, GROUND_Y-240);
    } else if (g.boatG) {
      // patrol-boat gunner: drifts on the swell, stays in open water
