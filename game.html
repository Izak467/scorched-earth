  for (const p of streetProps) if (!p.dead) drawStreetProp(p);
  for (const car of cars) if (car.dir < 0) drawCar(car);
  for (const c of civs) drawCiv(c);
  for (const g of grunts) drawGrunt(g);
  for (const tk of tanks) if (!tk.dead) drawTank(tk);
  for (const a of atrains) if (!a.dead) drawATrain(a);
  for (const a of maeves) if (!a.dead) drawMaeve(a);
  for (const d of deeps) if (!d.dead) drawDeep(d);
  for (const car of cars) if (car.dir > 0) drawCar(car);
  for (const s of supes) drawSupe(s);
  for (const l of lamplighters) if (!l.dead) drawLamplighter(l);
  for (const h of helis) drawHeli(h);
  drawFx();
  // during the intro, he's rising up inside the tower below the glass — drawPlayer() has no
  // concept of "behind the building," it just draws on top of whatever drawCity already put down,
  // so without this he'd be visible through the tower's own facade the whole way up instead of
  // staying hidden until he actually bursts through
  if (!introActive || introShattered) drawPlayer();
  drawLaser();
  // underwater tint: everything below the surface out in the water zone reads blue-green
  {
    const wl = clamp(WATER_X - camX, 0, VW), wgy = GROUND_Y - camY;
    if (wl < VW && wgy < VH) {
      cx.fillStyle = 'rgba(18,58,88,0.30)';
      cx.fillRect(wl, Math.max(0, wgy), VW - wl, VH - Math.max(0, wgy));
    }
  }
  cx.restore();
  const v = cx.createRadialGradient(VW/2,VH/2,VH*0.45, VW/2,VH/2,VH*0.95);
  v.addColorStop(0,'rgba(0,0,0,0)'); v.addColorStop(1,'rgba(0,0,0,0.42)');
  cx.fillStyle = v; cx.fillRect(0,0,VW,VH);
  if (P.hurtFlash > 0) { cx.fillStyle = 'rgba(180,20,10,'+(P.hurtFlash*0.12)+')'; cx.fillRect(0,0,VW,VH); }
  if (bossFlashT > 0) { cx.fillStyle = 'rgba(255,225,120,'+(bossFlashT*0.5)+')'; cx.fillRect(0,0,VW,VH); }
  if (bossBanner) {
    const p = bossBanner.life / bossBanner.maxLife;
    const fade = p > 0.75 ? (1-p)/0.25 : p < 0.25 ? p/0.25 : 1;
    cx.textAlign = 'center';
    cx.fillStyle = 'rgba(0,0,0,'+(fade*0.5)+')'; cx.fillRect(0, VH*0.28, VW, 68);
    cx.fillStyle = 'rgba(255,225,120,'+fade+')';
    cx.font = 'bold 40px Georgia';
    cx.shadowColor = 'rgba(255,150,40,0.8)'; cx.shadowBlur = 18;
    cx.fillText(bossBanner.text, VW/2, VH*0.28+46);
    cx.shadowBlur = 0;
    cx.textAlign = 'left';
  }
  if (paused) {
    cx.fillStyle = 'rgba(0,0,0,0.55)'; cx.fillRect(0,0,VW,VH);
    cx.fillStyle = '#f2ede2'; cx.font = 'bold 42px Georgia'; cx.textAlign = 'center';
    cx.fillText('PAUSED', VW/2, VH/2);
    cx.font = '16px Georgia'; cx.fillText('press P to resume', VW/2, VH/2+34);
    cx.textAlign = 'left';
  }
}

// ─── Main loop ───
let lastT = performance.now();
// ─── Cold open: Vought Tower, glass shatters, Homelander bursts up through it ───
// A dedicated scripted update, run instead of the real update() while introActive — nothing in
// the normal game needs to be guarded against "what if the player hasn't spawned in yet." Reuses
// the real draw() unchanged (camX/camY and P.x/P.y are just data it reads), so no separate intro
// draw path is needed — scripting the camera and the player is enough.
const INTRO_ASCENT_START = 1.4, INTRO_SHOOT_END = 1.9, INTRO_SETTLE_END = 2.5, INTRO_HOLD_END = 3.3;
function updateIntro(dt) {
  introT += dt;
  gameT += dt;   // keeps ambient animation phases (window lights, the V's blinking beacon) moving
  const tX = voughtTower ? voughtTower.x + voughtTower.w/2 : CITY_W/2;
  const roofY = voughtTower ? voughtTower.roofY : GROUND_Y - 900;
  const glassY = roofY - 73;   // mid-height of the (now lower) V's glass wedge — the shatter trigger line
  camX = tX - VW/2;
  camY = roofY - VH*0.42;
  const startY = roofY + 420, endY = roofY - 190, overshootY = endY - 45;
  if (introT < INTRO_ASCENT_START) {
    // ESTABLISH — parked out of view below the glass, camera holds on the tower alone
    P.x = tX; P.y = startY; P.vx = 0; P.vy = 0;
  } else if (introT < INTRO_SHOOT_END) {
    // SHOOT — a real fast burst up through the glass, overshooting past his final resting height
    // rather than easing straight onto it. this is also where the shatter triggers.
    const t = clamp((introT - INTRO_ASCENT_START) / (INTRO_SHOOT_END - INTRO_ASCENT_START), 0, 1);
    const eased = 1 - Math.pow(1-t, 4);
    const prevY = P.y;
    P.x = tX; P.y = startY + (overshootY-startY)*eased;
    P.vx = 0; P.vy = (P.y - prevY)/dt;   // real instantaneous velocity so the existing speed-line FX kicks in
    if (!introShattered && P.y <= glassY) {
      introShattered = true;
      if (voughtTower) voughtTower.glassIntact = false;
      shake(16); sfxCrack(); sfxBoom();
      for (let i=0;i<28;i++) debris.push({ x: tX+rand(-70,70), y: glassY+rand(-10,10),
        vx: rand(-260,260), vy: rand(-320,-40), rot: rand(0,7), vr: rand(-10,10),
        r: rand(2,4.5), c: ['#bcd8e8','#8fb8cc','#e8f4fa'][randi(0,2)], life: rand(1,1.8), shard: true });
      for (let i=0;i<16;i++) sparks.push({ x: tX+rand(-40,40), y: glassY, vx: rand(-180,180), vy: rand(-220,-40), life: rand(0.2,0.4), c: '#eaf6ff' });
    }
  } else if (introT < INTRO_SETTLE_END) {
    // SETTLE — floats back down a touch onto where he actually holds, instead of landing dead-on
    // the target the instant the rise finishes
    const t = clamp((introT - INTRO_SHOOT_END) / (INTRO_SETTLE_END - INTRO_SHOOT_END), 0, 1);
    const eased = 1 - Math.pow(1-t, 2);
    const prevY = P.y;
    P.x = tX; P.y = overshootY + (endY-overshootY)*eased;
    P.vx = 0; P.vy = (P.y - prevY)/dt;
  } else if (introT < INTRO_HOLD_END) {
    // HOLD — above the tower now, a small idle bob instead of dead-still so it doesn't go rigid
    P.x = tX; P.y = endY + Math.sin((introT-INTRO_SETTLE_END)*2.4)*3; P.vx = 0; P.vy = 0;
  } else {
    // HANDOFF — hand control back; the normal camera-follow easing (update(), ~line 1357) takes
    // it from here, and since P is already sitting right at the tower this continues smoothly
    // into real gameplay instead of needing a manual blend
    introActive = false;
    P.x = tX; P.y = endY; P.vx = 0; P.vy = 0; P.facing = 1;
    const hud = document.getElementById('hud'); if (hud) hud.style.opacity = '1';
    const title = document.getElementById('title'); if (title) title.style.opacity = '1';
    const hint = document.getElementById('hint'); if (hint) hint.style.opacity = '1';
  }
  shakeMag = Math.max(0, shakeMag - dt*44);
  // shatter shards/sparks still need to fall and fade even though the real update() isn't running
  for (const d of debris) { d.vy += 1400*dt; d.x += d.vx*dt; d.y += d.vy*dt; d.rot += d.vr*dt; d.life -= dt; }
  for (const s of sparks) { s.vy += 800*dt; s.x += s.vx*dt; s.y += s.vy*dt; s.life -= dt; }
  debris = debris.filter(d => d.life > 0);
  sparks = sparks.filter(s => s.life > 0);
}
function frame(now) {
  const dt = Math.min(0.033, (now - lastT)/1000);
  lastT = now;
  if (freezeT > 0) { freezeT -= dt; draw(); requestAnimationFrame(frame); return; }
  if (introActive) { updateIntro(dt); draw(); requestAnimationFrame(frame); return; }
  if (!paused) update(dt);
  draw();
  requestAnimationFrame(frame);
}
for (let i=0;i<20;i++) spawnGrunt(false);
for (let i=0;i<5;i++) spawnGrunt(true);
for (let i=0;i<60;i++) spawnCiv();
for (let i=0;i<18;i++) spawnCar();
setTimeout(() => { const h = document.getElementById('hint'); if (h) h.style.opacity = '0'; }, 16000);
requestAnimationFrame(frame);
</script>
</body>
</html>
